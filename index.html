<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreateWebsite</title>
  <meta name="description" content="メモを書くようにサイトを作って共有できるサービス" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <style>
    :root{
      color-scheme: light;
      --bg:#f6f7fb;
      --card:rgba(255,255,255,.92);
      --ink:#1c2430;
      --muted:#667085;
      --line:#e4e7ec;
      --brand:#5f63f2;
      --brand-dark:#494de4;
      --accent:#18a999;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(28,36,48,.12);
      --radius:22px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(95,99,242,.18), transparent 34rem),
        radial-gradient(circle at 100% 10%, rgba(24,169,153,.15), transparent 28rem),
        var(--bg);
      color:var(--ink);
    }

    button,input,textarea,select{ font:inherit; }
    button{ cursor:pointer; border:0; }
    textarea{ resize:vertical; }

    .app-shell{
      width:min(1120px,100%);
      margin:0 auto;
      padding:20px 16px 112px;
    }

    .hidden{ display:none !important; }

    .hero{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
      margin:12px 0 20px;
    }

    .panel{
      background:var(--card);
      border:1px solid rgba(255,255,255,.74);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter:blur(14px);
    }

    .eyebrow{
      color:var(--brand);
      font-weight:800;
      letter-spacing:.08em;
      font-size:.78rem;
    }

    h1,h2,h3{ margin:0; line-height:1.15; }
    h1{
      font-size:clamp(2rem,7vw,4.5rem);
      letter-spacing:-.06em;
      margin-top:8px;
    }
    h2{ font-size:clamp(1.35rem,4vw,2.1rem); }
    h3{ font-size:1.15rem; }
    p{ color:var(--muted); line-height:1.8; }

    .hero-actions,.toolbar,.tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      background:#fff;
      color:var(--ink);
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .btn.primary{
      background:var(--brand);
      color:#fff;
      box-shadow:0 10px 24px rgba(95,99,242,.28);
    }
    .btn.primary:hover{ background:var(--brand-dark); }
    .btn.danger{ color:#fff; background:var(--danger); box-shadow:none; }
    .btn.ghost{ background:transparent; }
    .btn.small{ min-height:36px; padding:0 12px; font-size:.9rem; }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }

    .site-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .site-card{
      text-align:left;
      width:100%;
      border-radius:20px;
      padding:16px;
      background:#fff;
      border:1px solid var(--line);
      transition:transform .15s, box-shadow .15s;
    }
    .site-card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(28,36,48,.1);
    }
    .site-card strong{
      display:block;
      font-size:1.08rem;
      margin-bottom:8px;
    }
    .site-card span{
      color:var(--muted);
      font-size:.9rem;
      word-break:break-all;
    }

    .editor-layout{ display:grid; gap:16px; align-items:start; }
    .editor-top,.viewer-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }

    .field{
      display:grid;
      gap:7px;
      margin:12px 0;
    }
    .field label{
      font-weight:800;
      font-size:.92rem;
    }
    .field input,.field textarea,.field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:#fff;
      color:var(--ink);
    }

    .canvas{
      min-height:52vh;
      padding:18px;
      background:rgba(255,255,255,.58);
      border:1px dashed #cdd3df;
      border-radius:var(--radius);
    }

    .empty{
      text-align:center;
      padding:60px 14px;
      color:var(--muted);
    }

    .block{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }

    .block-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
    }

    .rendered-text{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
    }

    .rich-editor{
      min-height:180px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:#fff;
      line-height:1.8;
      outline:none;
    }
    .rich-editor:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(95,99,242,.12);
    }

    .bottom-add-bar{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(760px, calc(100% - 28px));
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:12px;
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:var(--shadow);
      z-index:30;
    }
    .bottom-add-bar span{
      color:var(--muted);
      font-weight:700;
      padding-left:12px;
    }

    dialog{
      width:min(620px, calc(100% - 24px));
      border:0;
      border-radius:26px;
      padding:0;
      box-shadow:var(--shadow);
    }
    dialog::backdrop{
      background:rgba(15,23,42,.42);
      backdrop-filter:blur(4px);
    }
    .dialog-body{ padding:22px; }
    .qr-box{
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      margin:10px auto 16px;
      border-radius:20px;
      background:#f2f4f7;
      color:var(--muted);
      overflow:hidden;
    }
    .share-url{
      word-break:break-all;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .tab{
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:9px 14px;
      font-weight:800;
    }
    .tab.active{
      color:#fff;
      background:var(--accent);
      border-color:var(--accent);
    }
    .tab:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .id-pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
    }
    .notice{
      background:#eef2ff;
      color:#3730a3;
      border-radius:16px;
      padding:12px;
      line-height:1.7;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      font-weight:800;
      font-size:.88rem;
    }
    .status-pill.good{
      color:#0f766e;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }
    .status-pill.warn{
      color:#92400e;
      background:#fffbeb;
      border-color:#fcd34d;
    }
    .status-pill.bad{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .input-search{
      width:100%;
      min-width:220px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:#fff;
      color:var(--ink);
    }

    @media (max-width:820px){
      .hero,.editor-layout{ grid-template-columns:1fr; }
      .editor-top,.viewer-top{
        align-items:stretch;
        flex-direction:column;
      }
      .toolbar .btn{ flex:1; }
      .bottom-add-bar{
        border-radius:24px;
        align-items:stretch;
        flex-direction:column;
      }
      .bottom-add-bar span{
        padding-left:0;
        text-align:center;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>

  <dialog id="blockDialog">
    <div class="dialog-body">
      <h2 id="blockDialogTitle">テキストブロック</h2>
      <p>太字はPCなら Ctrl+B、スマホなら文字選択後の標準フォーマット機能で変更できます。色は <code>'#ff0000赤文字'</code> のように書けます。</p>
      <div class="field">
        <label for="blockInput">本文</label>
        <div id="blockInput" class="rich-editor" contenteditable="true"></div>
      </div>
      <div class="toolbar">
        <button class="btn" id="blockCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="blockSaveBtn" type="button">反映</button>
      </div>
    </div>
  </dialog>

  <dialog id="idDialog">
    <div class="dialog-body">
      <h2>自分のID</h2>
      <p>IDは作成したサイトの持ち主判定に使います。普段は伏せて表示します。</p>
      <button class="id-pill" id="ownerIdBtn" type="button">ID: ••••</button>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyIdBtn" type="button">IDコピー</button>
        <button class="btn danger" id="mergeIdBtn" type="button">ID統合</button>
        <button class="btn" id="closeIdBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-body">
      <h2>共有</h2>
      <div class="tabs" id="shareTabs">
        <button class="tab active" data-share-tab="view" type="button">閲覧用</button>
        <button class="tab" data-share-tab="edit" type="button">共同編集用</button>
      </div>
      <p class="notice" id="shareNotice">共有リンクを確認できます。</p>
      <div class="qr-box" id="qrBox">生成中…</div>
      <div class="share-url" id="shareUrl"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyShareBtn" type="button">URLコピー</button>
        <button class="btn primary" id="webShareBtn" type="button">共有する</button>
        <button class="btn" id="closeShareBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      setDoc,
      updateDoc,
      doc,
      arrayUnion
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYRh2cUMa4ecUmU9tpOT_ExrZcsYdVyHI",
      authDomain: "createwebsite-274dd.firebaseapp.com",
      projectId: "createwebsite-274dd",
      storageBucket: "createwebsite-274dd.firebasestorage.app",
      messagingSenderId: "646970295160",
      appId: "1:646970295160:web:a3f9b6f07c067a1782be8d",
      measurementId: "G-RN71HFCTGL"
    };

    const COLLECTION = "websites";
    const OWNER_COOKIE = "createwebsiteCreatorId";

    const appRoot = document.getElementById("app");
    const blockDialog = document.getElementById("blockDialog");
    const blockDialogTitle = document.getElementById("blockDialogTitle");
    const blockInput = document.getElementById("blockInput");
    const idDialog = document.getElementById("idDialog");
    const ownerIdBtn = document.getElementById("ownerIdBtn");
    const shareDialog = document.getElementById("shareDialog");
    const shareTabs = document.getElementById("shareTabs");
    const shareUrlEl = document.getElementById("shareUrl");
    const shareNoticeEl = document.getElementById("shareNotice");
    const qrBox = document.getElementById("qrBox");

    const state = {
      db: null,
      uid: "",
      ready: false,
      mode: "loading", // loading | home | viewer | editor | missing | denied
      homeSites: [],
      homeSearch: "",
      homeTab: "mine",
      current: null,
      currentSaved: false,
      currentAccess: "view", // view | owner | collaborator | key
      editingBlockId: null,
      shareMode: "view"
    };

    function uid8() {
      if (crypto?.randomUUID) return crypto.randomUUID().replace(/-/g, "").slice(0, 8);
      return Math.random().toString(36).slice(2, 10);
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function sanitizeRichHtml(value) {
      const template = document.createElement("template");
      template.innerHTML = String(value ?? "");

      template.content.querySelectorAll("*").forEach((node) => {
        if (!["BR", "STRONG", "B", "SPAN"].includes(node.tagName)) {
          node.replaceWith(...node.childNodes);
          return;
        }

        if (node.tagName === "SPAN") {
          const color = node.style.color;
          node.removeAttribute("style");
          if (color) node.style.color = color;
        } else {
          [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
        }
      });

      return template.innerHTML;
    }

    function renderFormattedBlock(html) {
      const sanitized = sanitizeRichHtml(html);
      return sanitized.replace(/'#([0-9a-fA-F]{6})(.*?)'/g, '<span style="color:#$1">$2</span>');
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts) {
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
      }
      return "";
    }

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function creatorId() {
      let id = getCookie(OWNER_COOKIE);
      if (!id) {
        id = uid8();
        setCookie(OWNER_COOKIE, id);
      }
      return id;
    }

    function basePageUrl() {
      return `${location.origin}${location.pathname.replace(/index\.html$/, "")}`;
    }

    function siteUrl(siteId, key = null) {
      if (!siteId) return basePageUrl();
      return `${basePageUrl()}#/${siteId}${key ? `/${key}` : ""}`;
    }

    function parseRoute() {
      const hash = decodeURI(location.hash || "");
      if (!hash.startsWith("#/")) return { siteId: null, key: null, name: "home" };
      const [siteId = null, key = null] = hash.slice(2).split("/");
      if (siteId === "create") return { name: "create" };
      return { siteId, key, name: "site" };
    }

    function normalizeSite(siteId, data = {}) {
      return {
        siteId: siteId || data.siteId || uid8(),
        title: data.title || "無題のサイト",
        key: data.key || "",
        ownerUid: data.ownerUid || "",
        creatorId: data.creatorId || creatorId(),
        collaborators: Array.isArray(data.collaborators) ? data.collaborators : [],
        blocks: Array.isArray(data.blocks) ? data.blocks : [],
        isPublic: data.isPublic !== false,
        collaborative: Boolean(data.collaborative || data.key),
        createdAt: data.createdAt || Date.now(),
        updatedAt: data.updatedAt || Date.now()
      };
    }

    function isMine(site) {
      if (!site) return false;
      return Boolean(site.ownerUid && site.ownerUid === state.uid);
    }

    function isCollaborator(site) {
      if (!site) return false;
      return Array.isArray(site.collaborators) && site.collaborators.includes(state.uid);
    }

    function canEditCurrent() {
      const site = state.current;
      if (!site) return false;
      if (site.key && state.currentAccess === "key") return true;
      return isMine(site) || isCollaborator(site);
    }

    function currentShareUrl() {
      if (!state.currentSaved || !state.current) return "";
      const key = state.shareMode === "edit" && state.current.key ? state.current.key : null;
      return siteUrl(state.current.siteId, key);
    }

    function setHomeStatus(text, kind = "") {
      const className =
        kind === "good" ? "status-pill good" :
        kind === "warn" ? "status-pill warn" :
        kind === "bad" ? "status-pill bad" : "status-pill";
      return `<span class="${className}">${esc(text)}</span>`;
    }

    function siteSearchText(site) {
      const blockText = (site.blocks || []).map((b) => String(b.html || "").replace(/<[^>]+>/g, " ")).join(" ");
      return `${site.title || ""} ${blockText}`.toLowerCase();
    }

    function filterSites(list, query) {
      const q = String(query || "").trim().toLowerCase();
      if (!q) return list.slice();
      const terms = q.split(/\s+/).filter(Boolean);
      return list.filter((site) => {
        const blob = siteSearchText(site);
        return terms.every((term) => blob.includes(term));
      });
    }

    function mineSites() {
      return state.homeSites
        .filter((site) => isMine(site) || isCollaborator(site))
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function publicSites() {
      return state.homeSites
        .filter((site) => site.isPublic !== false)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function renderHome() {
      const mine = filterSites(mineSites(), state.homeSearch);
      const pub = filterSites(publicSites(), state.homeSearch);

      const tabMine = state.homeTab === "mine" ? "active" : "";
      const tabPub = state.homeTab === "public" ? "active" : "";

      const list = state.homeTab === "mine" ? mine : pub;
      const listHtml = list.length
        ? list.map((site) => {
            const badge = isMine(site) ? "自分" : isCollaborator(site) ? "共同編集" : "公開";
            return `
              <button class="site-card" data-open-site="${esc(site.siteId)}">
                <strong>${esc(site.title)}</strong>
                <span>${esc(siteUrl(site.siteId))}<br>${esc(badge)}</span>
              </button>
            `;
          }).join("")
        : `<p class="empty">${state.homeTab === "mine" ? "まだサイトがありません。" : "公開サイトがありません。"}</p>`;

      appRoot.innerHTML = `
        <div class="hero">
          <div class="panel">
            <div class="eyebrow">CreateWebsite</div>
            <h1>メモを書くように、サイトを作ろう。</h1>
            <p>テキストを積んで保存するだけで、共有できるWebページを作れます。保存先はFirebaseだけです。</p>
            <div class="hero-actions">
              <button class="btn primary" id="newSiteBtn" ${state.ready ? "" : "disabled"}>＋ 新規作成</button>
              <button class="btn" id="showIdBtn" ${state.ready ? "" : "disabled"}>自分のIDを見る</button>
            </div>
          </div>

          <div class="panel">
            <h2>自分のサイト一覧</h2>
            <p>このアカウントが作成したサイトと、共同編集者として追加されたサイトを表示します。</p>
            <div class="toolbar" style="margin:8px 0 12px">
              <button class="tab ${tabMine}" data-home-tab="mine" type="button">自分のサイト</button>
              <button class="tab ${tabPub}" data-home-tab="public" type="button">公開サイト</button>
              <input id="homeSearchInput" class="input-search" type="text" placeholder="検索" value="${esc(state.homeSearch)}">
              <button class="btn" id="homeRefreshBtn" type="button">↻</button>
            </div>
            ${setHomeStatus(state.ready ? "Firebaseに接続しました。" : "Firebase接続中…", state.ready ? "good" : "warn")}
            <div class="site-grid" id="siteList">${listHtml}</div>
          </div>
        </div>
      `;
    }

    function renderViewer() {
      const site = state.current;
      const blocks = (site?.blocks || []).map((block) => `
        <article class="block">
          <div class="rendered-text">${renderFormattedBlock(block.html || "")}</div>
        </article>
      `).join("");

      const statusHtml = canEditCurrent()
        ? setHomeStatus(state.currentAccess === "key" ? "共同編集モード" : "編集可能", "good")
        : setHomeStatus("閲覧モード", "warn");

      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn">← 一覧へ</button>
            <div class="toolbar" style="justify-content:flex-end">
              ${statusHtml}
              <button class="btn" id="viewerShareBtn">共有</button>
              <button class="btn primary" id="viewerEditBtn" ${canEditCurrent() ? "" : "hidden"}>編集する</button>
            </div>
          </div>
          <h2>${esc(site?.title || "サイト")}</h2>
          <div class="canvas" style="margin-top:14px">
            ${blocks || '<div class="empty">本文がありません。</div>'}
          </div>
        </div>
      `;
    }

    function renderEditor() {
      const site = state.current;
      const blocks = (site?.blocks || []).map((block, index) => `
        <article class="block" data-block-id="${esc(block.id)}">
          <div class="block-head">
            <div style="color:var(--muted);font-weight:900">ブロック ${index + 1}</div>
            <div class="toolbar">
              <button class="btn small" data-block-action="edit" data-block-id="${esc(block.id)}">編集</button>
              <button class="btn small" data-block-action="copy" data-block-id="${esc(block.id)}">複製</button>
              <button class="btn small" data-block-action="up" data-block-id="${esc(block.id)}">↑</button>
              <button class="btn small" data-block-action="down" data-block-id="${esc(block.id)}">↓</button>
              <button class="btn small danger" data-block-action="delete" data-block-id="${esc(block.id)}">削除</button>
            </div>
          </div>
          <div class="rendered-text">${renderFormattedBlock(block.html || "")}</div>
        </article>
      `).join("");

      const backLabel = state.currentSaved ? "← 戻る" : "← 一覧へ";

      appRoot.innerHTML = `
        <div class="editor-top">
          <div>
            <button class="btn ghost" id="backBtn">${backLabel}</button>
            <h2 id="editorHeading">${esc(site?.title || "無題のサイト")}</h2>
          </div>
          <div class="toolbar">
            <button class="btn" id="shareBtn">共有</button>
            <button class="btn primary" id="saveBtn">保存</button>
          </div>
        </div>

        <div class="editor-layout">
          <section class="panel">
            <h3>共同編集設定</h3>
            <p class="notice">Keyがあるリンクを開くと、その人が共同編集者として追加されます。</p>
            <div class="field">
              <label for="titleInput">サイトタイトル</label>
              <input id="titleInput" placeholder="例：自己紹介" value="${esc(site?.title || "")}">
            </div>
            <div class="field">
              <label for="editKeyInput">共同編集Key</label>
              <input id="editKeyInput" placeholder="例：abc123" value="${esc(site?.key || "")}">
            </div>
          </section>

          <section class="panel">
            <div class="toolbar" style="justify-content:space-between;margin-bottom:12px">
              <h3>本文</h3>
              <button class="btn primary" id="addBlockBtn" type="button">＋ 追加</button>
            </div>
            <div class="canvas" id="blockCanvas">${blocks || '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>'}</div>
          </section>
        </div>
      `;
    }

    function renderLoading() {
      appRoot.innerHTML = `
        <div class="hero">
          <div class="panel">
            <div class="eyebrow">CreateWebsite</div>
            <h1>読み込み中…</h1>
            <p>Firebase からデータを取っています。</p>
            <div class="hero-actions">
              <button class="btn primary" disabled>＋ 新規作成</button>
              <button class="btn" disabled>自分のIDを見る</button>
            </div>
          </div>
          <div class="panel">
            <h2>準備中</h2>
            <p>${esc(state.errorMessage || "接続を待っています。")}</p>
            <div class="site-grid">
              <div class="empty">しばらくしても動かない場合は Firebase 設定を確認してね。</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMissingScreen(message = "このリンクのサイトは見つかりませんでした。") {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn">← 一覧へ</button>
          </div>
          <h2>サイトが見つかりません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">${esc(message)}</div>
          </div>
        </div>
      `;
    }

    function renderDeniedScreen() {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn">← 一覧へ</button>
          </div>
          <h2>アクセスできません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。</div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.mode === "loading") renderLoading();
      else if (state.mode === "home") renderHome();
      else if (state.mode === "viewer") renderViewer();
      else if (state.mode === "editor") renderEditor();
      else if (state.mode === "missing") renderMissingScreen();
      else if (state.mode === "denied") renderDeniedScreen();
    }

    function makeDraftSite() {
      const id = uid8();
      return normalizeSite(id, {
        siteId: id,
        title: "無題のサイト",
        ownerUid: state.uid,
        creatorId: creatorId(),
        key: "",
        blocks: [
          { id: uid8(), html: "こんにちは<br><strong>太字</strong><br>'#ff0000赤文字'" }
        ],
        isPublic: true,
        collaborative: false,
        collaborators: [],
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    async function loadAllSites() {
      if (!state.db) return [];
      const snapshot = await getDocs(collection(state.db, COLLECTION));
      state.homeSites = snapshot.docs.map((d) => normalizeSite(d.id, d.data() || {}));
      return state.homeSites;
    }

    async function loadSiteById(siteId) {
      if (!state.db || !siteId) return null;
      const snap = await getDoc(doc(state.db, COLLECTION, siteId));
      if (snap.exists()) return normalizeSite(snap.id, snap.data() || {});
      const all = await getDocs(collection(state.db, COLLECTION));
      return all.docs
        .map((d) => normalizeSite(d.id, d.data() || {}))
        .find((site) => site.siteId === siteId || site.title === siteId) || null;
    }

    function setCurrentSite(site, saved = true) {
      state.current = site ? structuredClone(normalizeSite(site.siteId, site)) : null;
      state.currentSaved = !!saved;
      state.editingBlockId = null;
    }

    function openHome() {
      state.mode = "home";
      render();
    }

    function openViewer(site, access = "view") {
      setCurrentSite(site, true);
      state.currentAccess = access;
      state.mode = "viewer";
      render();
    }

    function openEditor(site, saved = true, access = "view") {
      setCurrentSite(site, saved);
      state.currentAccess = access;
      state.mode = "editor";
      render();
    }

    function openNewDraft() {
      if (!state.ready) return;
      const draft = makeDraftSite();
      openEditor(draft, false, "owner");
      location.hash = "#/create";
    }

    function openBlockDialog(blockId = null) {
      if (!state.current) return;
      state.editingBlockId = blockId;
      const block = blockId ? state.current.blocks.find((b) => b.id === blockId) : null;
      blockDialogTitle.textContent = blockId ? "テキストブロックを編集" : "テキストブロックを追加";
      blockInput.innerHTML = block?.html || "";
      blockDialog.showModal();
      requestAnimationFrame(() => blockInput.focus());
    }

    function closeBlockDialog() {
      blockDialog.close();
      state.editingBlockId = null;
    }

    function saveBlockDialog() {
      if (!state.current) return;
      const html = sanitizeRichHtml(blockInput.innerHTML.trim()) || "新しいテキスト";
      if (state.editingBlockId) {
        const target = state.current.blocks.find((b) => b.id === state.editingBlockId);
        if (target) target.html = html;
      } else {
        state.current.blocks.push({ id: uid8(), html });
      }
      closeBlockDialog();
      render();
    }

    async function saveCurrentSite() {
      if (!state.current || !state.db) {
        alert("先にサイトを作ってね");
        return;
      }

      const titleInput = document.getElementById("titleInput");
      const keyInput = document.getElementById("editKeyInput");

      const title = String(titleInput?.value || "").trim() || "無題のサイト";
      const key = String(keyInput?.value || "").trim();

      state.current.title = title;
      state.current.key = key;
      state.current.collaborative = Boolean(key);
      state.current.updatedAt = Date.now();
      state.current.ownerUid = state.current.ownerUid || state.uid;
      state.current.creatorId = state.current.creatorId || creatorId();

      const payload = {
        ...state.current,
        blocks: state.current.blocks.map((b) => ({ id: b.id || uid8(), html: String(b.html || "") })),
        collaborators: Array.isArray(state.current.collaborators) ? state.current.collaborators : [],
        updatedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), payload, { merge: true });

      state.currentSaved = true;
      state.current = normalizeSite(state.current.siteId, payload);
      await loadAllSites();
      location.hash = `#/${state.current.siteId}`;
      openViewer(state.current, canEditCurrent() ? "owner" : "view");
      alert("保存しました。");
    }

    async function openSiteById(siteId, key = null) {
      if (!state.ready) return;
      const site = await loadSiteById(siteId);
      if (!site) {
        state.mode = "missing";
        state.current = null;
        render();
        return;
      }

      if (key && site.key && key === site.key) {
        try {
          await updateDoc(doc(state.db, COLLECTION, site.siteId), {
            collaborators: arrayUnion(state.uid),
            collaborative: true
          });
          site.collaborators = Array.from(new Set([...(site.collaborators || []), state.uid]));
          site.collaborative = true;
          state.currentAccess = "key";
        } catch (error) {
          console.error(error);
          state.currentAccess = "key";
          alert("共同編集者の登録に失敗しました。Firestoreルールを確認してね。");
        }
      } else if (isMine(site)) {
        state.currentAccess = "owner";
      } else if (isCollaborator(site)) {
        state.currentAccess = "collaborator";
      } else {
        state.currentAccess = "view";
      }

      state.current = site;
      state.currentSaved = true;

      if (site.isPublic === false && !canEditCurrent()) {
        state.mode = "denied";
        render();
        return;
      }

      state.mode = "viewer";
      render();
    }

    async function refreshHomeSites() {
      await loadAllSites();
      if (state.mode === "home") render();
    }

    function openShareDialog() {
      if (!state.current) {
        alert("先にサイトを開いてください。");
        return;
      }
      if (!state.currentSaved) {
        alert("先に保存してね。");
        return;
      }

      state.shareMode = "view";
      shareTabs.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.shareTab === "view"));
      shareTabs.querySelector('[data-share-tab="edit"]').disabled = !state.current.key;
      syncShareDialog();
      shareDialog.showModal();
    }

    function syncShareDialog() {
      const url = currentShareUrl();
      shareUrlEl.textContent = url || "保存後に共有リンクが出るよ";
      if (!state.current) {
        shareNoticeEl.textContent = "先にサイトを開いてください。";
      } else if (!state.currentSaved) {
        shareNoticeEl.textContent = "先に保存してね。";
      } else if (state.shareMode === "edit" && !state.current.key) {
        shareNoticeEl.textContent = "共同編集Keyが未設定です。";
      } else if (state.shareMode === "edit") {
        shareNoticeEl.textContent = "このリンクを開くと共同編集者として追加されます。";
      } else {
        shareNoticeEl.textContent = "このリンクは閲覧用です。";
      }

      qrBox.innerHTML = "生成中…";
      setTimeout(() => {
        qrBox.innerHTML = "";
        if (window.QRCode && url) {
          new QRCode(qrBox, { text: url, width: 200, height: 200 });
        } else {
          qrBox.textContent = "QRライブラリを読み込めませんでした";
        }
      }, 120);
    }

    async function initFirebase() {
      if (!firebaseConfig.apiKey || !firebaseConfig.authDomain || !firebaseConfig.projectId || !firebaseConfig.appId) {
        state.ready = false;
        state.mode = "loading";
        state.errorMessage = "Firebase設定がありません。firebaseConfig を入れてください。";
        render();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        state.db = getFirestore(app);
        const auth = getAuth(app);

        const timeout = setTimeout(() => {
          if (!state.ready) {
            state.errorMessage = "Firebase接続に時間がかかっています…";
            state.mode = "loading";
            render();
          }
        }, 10000);

        const cred = await signInAnonymously(auth);
        clearTimeout(timeout);

        state.uid = cred.user?.uid || auth.currentUser?.uid || "";
        state.ready = true;
        state.errorMessage = "";
        await loadAllSites();

        const route = parseRoute();
        if (route.name === "site") {
          await openSiteById(route.siteId, route.key || null);
        } else if (route.name === "create") {
          openNewDraft();
        } else {
          state.mode = "home";
          render();
        }
      } catch (error) {
        console.error(error);
        state.ready = false;
        state.errorMessage = "Firebase接続に失敗しました。認証や設定を確認してください。";
        state.mode = "loading";
        render();
      }
    }

    appRoot.addEventListener("click", async (event) => {
      const target = event.target;

      const openSiteBtn = target.closest("[data-open-site]");
      if (openSiteBtn) {
        const siteId = openSiteBtn.getAttribute("data-open-site");
        if (siteId) await openSiteById(siteId);
        return;
      }

      const blockActionBtn = target.closest("[data-block-action]");
      if (blockActionBtn && state.mode === "editor") {
        const action = blockActionBtn.getAttribute("data-block-action");
        const blockId = blockActionBtn.getAttribute("data-block-id");
        if (!state.current || !blockId) return;

        const index = state.current.blocks.findIndex((b) => b.id === blockId);
        if (index < 0) return;

        if (action === "edit") {
          openBlockDialog(blockId);
        } else if (action === "copy") {
          state.current.blocks.splice(index + 1, 0, { ...structuredClone(state.current.blocks[index]), id: uid8() });
          render();
        } else if (action === "delete") {
          if (confirm("このブロックを削除しますか？")) {
            state.current.blocks.splice(index, 1);
            render();
          }
        } else if (action === "up" && index > 0) {
          const [item] = state.current.blocks.splice(index, 1);
          state.current.blocks.splice(index - 1, 0, item);
          render();
        } else if (action === "down" && index < state.current.blocks.length - 1) {
          const [item] = state.current.blocks.splice(index, 1);
          state.current.blocks.splice(index + 1, 0, item);
          render();
        }
        return;
      }

      if (target.closest("#newSiteBtn")) {
        openNewDraft();
        return;
      }

      if (target.closest("#showIdBtn")) {
        ownerIdBtn.textContent = "ID: ••••";
        idDialog.showModal();
        return;
      }

      if (target.closest("#viewerHomeBtn") || target.closest("#backBtn")) {
        if (state.mode === "editor" && !state.currentSaved) {
          if (!confirm("保存していない内容があるけど戻る？")) return;
        }
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = "view";
        location.hash = "";
        state.mode = "home";
        render();
        await refreshHomeSites();
        return;
      }

      if (target.closest("#viewerEditBtn")) {
        if (!state.current) return;
        if (canEditCurrent()) {
          state.mode = "editor";
          render();
        } else {
          const entered = prompt("Key を入力して編集", "");
          if (entered === null) return;
          if ((entered || "").trim() === (state.current.key || "")) {
            state.currentAccess = "key";
            state.mode = "editor";
            render();
          } else {
            alert("Key が違うよ");
          }
        }
        return;
      }

      if (target.closest("#viewerShareBtn") || target.closest("#shareBtn")) {
        openShareDialog();
        return;
      }

      if (target.closest("#saveBtn")) {
        await saveCurrentSite();
        return;
      }

      if (target.closest("#addBlockBtn")) {
        openBlockDialog();
        return;
      }

      if (target.closest("#blockCancelBtn")) {
        closeBlockDialog();
        return;
      }

      if (target.closest("#blockSaveBtn")) {
        saveBlockDialog();
        return;
      }

      if (target.closest("#copyIdBtn")) {
        try {
          await navigator.clipboard.writeText(creatorId());
          alert("IDをコピーしました");
        } catch {
          prompt("コピーできない場合はこれを使ってね", creatorId());
        }
        return;
      }

      if (target.closest("#closeIdBtn")) {
        idDialog.close();
        return;
      }

      if (target.closest("#mergeIdBtn")) {
        alert("この版ではID統合はデモだけです。");
        return;
      }

      if (target.closest("#closeShareBtn")) {
        shareDialog.close();
        return;
      }

      if (target.closest("#copyShareBtn")) {
        const url = currentShareUrl();
        if (!url) {
          alert("先に保存してね。");
          return;
        }
        try {
          await navigator.clipboard.writeText(url);
          alert("コピーしました");
        } catch {
          prompt("コピーできないときはこれを使ってね", url);
        }
        return;
      }

      if (target.closest("#webShareBtn")) {
        const url = currentShareUrl();
        if (!url) {
          alert("先に保存してね。");
          return;
        }
        if (navigator.share) {
          try {
            await navigator.share({ title: state.current?.title || "CreateWebsite", url });
          } catch {}
        } else {
          alert("このブラウザはWeb Share APIに対応していません。");
        }
        return;
      }

      const tabBtn = target.closest("[data-home-tab]");
      if (tabBtn) {
        state.homeTab = tabBtn.getAttribute("data-home-tab") || "mine";
        render();
        return;
      }

      const shareTab = target.closest("[data-share-tab]");
      if (shareTab) {
        state.shareMode = shareTab.getAttribute("data-share-tab") || "view";
        shareTabs.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab === shareTab));
        syncShareDialog();
        return;
      }
    });

    appRoot.addEventListener("input", (event) => {
      const target = event.target;
      if (target && target.id === "homeSearchInput") {
        state.homeSearch = target.value;
        render();
        return;
      }

      if (target && target.id === "titleInput" && state.current) {
        state.current.title = target.value;
        const heading = document.getElementById("editorHeading");
        if (heading) heading.textContent = target.value || "無題のサイト";
        return;
      }

      if (target && target.id === "editKeyInput" && state.current) {
        state.current.key = target.value;
        state.current.collaborative = Boolean(String(target.value || "").trim());
        return;
      }
    });

    blockDialog.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeBlockDialog();
    });

    document.getElementById("blockSaveBtn").addEventListener("click", saveBlockDialog);
    document.getElementById("blockCancelBtn").addEventListener("click", closeBlockDialog);
    document.getElementById("ownerIdBtn").addEventListener("click", (e) => {
      e.currentTarget.textContent = `ID: ${creatorId()}`;
    });

    async function bootstrap() {
      state.mode = "loading";
      render();
      await initFirebase();
    }

    window.addEventListener("hashchange", async () => {
      const route = parseRoute();
      if (!state.ready) return;

      if (route.name === "home") {
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = "view";
        state.mode = "home";
        render();
        return;
      }

      if (route.name === "create") {
        openNewDraft();
        return;
      }

      if (route.name === "site") {
        await openSiteById(route.siteId, route.key || null);
      }
    });

    bootstrap();
  </script>
</body>
</html>
