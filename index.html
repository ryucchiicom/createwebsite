    const blockRowsInput = document.getElementById('blockRowsInput');
    const blockFileNameField = document.getElementById('blockFileNameField');
    const blockFileNameInput = document.getElementById('blockFileNameInput');
    const blockFilePreviewField = document.getElementById('blockFilePreviewField');
    const blockFilePreviewToggle = document.getElementById('blockFilePreviewToggle');
    const filePreviewDialog = document.getElementById('filePreviewDialog');
    const filePreviewTitle = document.getElementById('filePreviewTitle');
    const filePreviewMeta = document.getElementById('filePreviewMeta');
    const filePreviewBody = document.getElementById('filePreviewBody');
    const filePreviewCloseBtn = document.getElementById('filePreviewCloseBtn');
    const filePreviewDownloadBtn = document.getElementById('filePreviewDownloadBtn');
    const mergeDialog = document.getElementById('mergeDialog');
    const mergeTargetInput = document.getElementById('mergeTargetInput');
    const idDialog = document.getElementById('idDialog');
    const ownerIdBtn = document.getElementById('ownerIdBtn');
    const shareDialog = document.getElementById('shareDialog');
    const shareTabs = document.getElementById('shareTabs');
    const shareUrlEl = document.getElementById('shareUrl');
    const shareNoticeEl = document.getElementById('shareNotice');
    const qrBox = document.getElementById('qrBox');

    const state = {
      db: null,
      uid: '',
      ready: false,
      mode: 'loading', // loading | home | viewer | editor | missing | denied | boot-failed
      homeSites: [],
      homeTab: 'mine',
      homeSearch: '',
      current: null,
      currentSaved: false,
      currentAccess: 'view', // view | owner | collaborator | key
      editingBlockId: null,
      shareMode: 'view',
      authError: '',
      pendingBlockSettingsId: null,
      addMenuOpen: false,
      previewFileBlockId: null,
      addBarOpacity: (() => { const v = Number(localStorage.getItem(ADD_BAR_OPACITY_KEY)); return Number.isFinite(v) ? v : 0.92; })(),
      moveBlockId: null
    };

    let longPressTimer = null;
    let longPressCandidateId = null;

    function uid8() {
      if (crypto?.randomUUID) return crypto.randomUUID().replace(/-/g, '').slice(0, 8);
      return Math.random().toString(36).slice(2, 10);
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function htmlToPlainText(html) {
      const div = document.createElement('div');
      div.innerHTML = String(html ?? '');
      return div.innerText || div.textContent || '';
    }

    function sanitizeRichHtml(value) {
      const template = document.createElement('template');
      template.innerHTML = String(value ?? '');

      template.content.querySelectorAll('*').forEach((node) => {
        if (!['BR', 'STRONG', 'B', 'SPAN'].includes(node.tagName)) {
          node.replaceWith(...node.childNodes);
          return;
        }

        if (node.tagName === 'SPAN') {
          const color = node.style.color;
          const fontSize = node.style.fontSize;
          node.removeAttribute('style');
          if (color) node.style.color = color;
          if (fontSize) node.style.fontSize = fontSize;
        } else {
          [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
        }
      });

      return template.innerHTML;
    }

    function getStandaloneStyleCommand(input) {
      const text = String(input ?? '').replace(/\r\n?/g, '\n');
      const colorMatch = text.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
      if (colorMatch) {
        return { type: 'color', value: `#${colorMatch[1]}` };
      }

      const sizeMatch = text.match(/^S(\d{1,3})$/);
      if (sizeMatch) {
        return { type: 'size', value: String(Math.max(1, Math.min(256, Number(sizeMatch[1]) || 16))) };
      }

      return null;
    }

    function renderStandaloneStyleCommand(command) {
      if (!command) return '';
      if (command.type === 'color') {
        return `<span style="color:${esc(command.value)}"></span>`;
      }
      if (command.type === 'size') {
        return `<span style="font-size:${esc(command.value)}px"></span>`;
      }
      return '';
    }

    function parseStyledSource(input) {
      const text = String(input ?? '').replace(/\r\n?/g, '\n');
      let html = '';

      for (let i = 0; i < text.length;) {
        const rest = text.slice(i);

        if (rest[0] === '\n') {
          html += '<br>';
          i += 1;
          continue;
        }

        const fileMatch = rest.match(/^file\(([^)]+)\)'([^']*)'/i);
        if (fileMatch) {
          const name = String(fileMatch[1] || '').trim();
          const label = String(fileMatch[2] || '').trim();
          html += `<a href="#" data-file-link="${esc(name)}">${esc(label || name || 'ファイル')}</a>`;
          i += fileMatch[0].length;
          continue;
        }

        const colorQuoted = rest.match(/^#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})'([^']*)'/);
        if (colorQuoted) {
          const color = `#${colorQuoted[1]}`;
          const body = colorQuoted[2] || '';
          html += `<span style="color:${esc(color)}">${esc(body)}</span>`;
          i += colorQuoted[0].length;
          continue;
        }

        const sizeQuoted = rest.match(/^#(\d{1,3})'([^']*)'/);
        if (sizeQuoted) {
          const size = Math.max(1, Math.min(256, Number(sizeQuoted[1]) || 16));
          const body = sizeQuoted[2] || '';
          html += `<span style="font-size:${size}px">${esc(body)}</span>`;
          i += sizeQuoted[0].length;
          continue;
        }

        html += esc(rest[0]);
        i += 1;
      }

      return html || '<br>';
    }

    function looksLikeHtml(text) {
      const value = String(text ?? '').trim();
      if (!value) return false;
      if (/^<!doctype\s+html/i.test(value)) return true;
      if (/<(?:html|body|div|span|p|br|a|img|video|audio|iframe|script|style)[\s>]/i.test(value)) return true;
      return /<[^>]+>/.test(value) && /[<>]/.test(value);
    }

    function isProbablyUrl(text) {
      const value = String(text ?? '').trim();
      if (!value) return false;
      try {
        const url = new URL(value, location.href);
        return ['http:', 'https:', 'mailto:', 'tel:'].includes(url.protocol);
      } catch {
        return /^https?:\/\//i.test(value) || /^\/\//.test(value);
      }
    }

    function safeUrlHref(url) {
      const value = String(url ?? '').trim();
      if (!value) return '';
      try {
        const parsed = new URL(value, location.href);
        if (!['http:', 'https:', 'mailto:', 'tel:'].includes(parsed.protocol)) return '';
        return parsed.href;
      } catch {
        return '';
      }
    }

    function sanitizePreviewHtml(value) {
      const template = document.createElement('template');
      template.innerHTML = String(value ?? '');
      template.content.querySelectorAll('script,style,meta,link').forEach((node) => node.remove());
      template.content.querySelectorAll('*').forEach((node) => {
        const tag = node.tagName;
        [...node.attributes].forEach((attr) => {
          const name = attr.name.toLowerCase();
          if (name.startsWith('on')) node.removeAttribute(attr.name);
          if (tag !== 'A' && tag !== 'IMG' && tag !== 'VIDEO' && tag !== 'AUDIO' && tag !== 'IFRAME' && name === 'srcdoc') node.removeAttribute(attr.name);
          if (tag !== 'A' && tag !== 'SPAN' && tag !== 'B' && tag !== 'STRONG' && tag !== 'EM' && tag !== 'I' && tag !== 'U' && name === 'style') node.removeAttribute(attr.name);
        });
        if (tag === 'A') {
          const href = safeUrlHref(node.getAttribute('href') || '');
          if (href) {
            node.setAttribute('href', href);
            node.setAttribute('target', '_blank');
            node.setAttribute('rel', 'noopener noreferrer');
          } else {
            node.removeAttribute('href');
          }
        }
      });
      return template.innerHTML;
    }

    function fileExtFromMime(mimeType, fileName = '') {
      const value = String(mimeType || '').toLowerCase();
      if (value.includes('png')) return 'png';
      if (value.includes('jpeg') || value.includes('jpg')) return 'jpg';
      if (value.includes('webp')) return 'webp';
      if (value.includes('gif')) return 'gif';
      if (value.includes('html')) return 'html';
      if (value.includes('json')) return 'json';
      if (value.includes('xml')) return 'xml';
      if (value.startsWith('text/')) return 'txt';
      if (value.includes('pdf')) return 'pdf';
      if (value.includes('mp4')) return 'mp4';
      if (value.includes('webm')) return 'webm';
      if (value.includes('mp3')) return 'mp3';
      if (value.includes('wav')) return 'wav';
      const fromName = String(fileName || '').toLowerCase().match(/\.([a-z0-9]{1,8})$/);
      return fromName ? fromName[1] : 'bin';
    }

    function fileNameWithExt(baseName, ext) {
      const name = String(baseName || 'file').trim() || 'file';
      const suffix = String(ext || '').replace(/^\./, '');
      if (!suffix) return name;
      if (new RegExp(`\\.${suffix}$`, 'i').test(name)) return name;
      return `${name}.${suffix}`;
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName || 'download';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function dataUrlToBlob(dataUrl) {
      const value = String(dataUrl || '');
      const match = value.match(/^data:([^;,]+)?(;base64)?,([\s\S]*)$/);
      if (!match) return new Blob([value], { type: 'application/octet-stream' });
      const mimeType = match[1] || 'application/octet-stream';
      const isBase64 = !!match[2];
      const data = match[3] || '';
      if (isBase64) {
        const bin = atob(data);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i);
        return new Blob([bytes], { type: mimeType });
      }
      return new Blob([decodeURIComponent(data)], { type: mimeType });
    }

    function filePayloadKind(payload) {
      if (!payload) return 'text';
      if (payload.kind === 'upload') return 'upload';
      if (payload.kind === 'html') return 'html';
      if (payload.kind === 'url') return 'url';
      return 'text';
    }

    function normalizeFilePayload(input) {
      if (!input) {
        return { kind: 'text', text: '', html: '', url: '', dataUrl: '', fileName: '', mimeType: '', size: 0, preview: true };
      }
      if (typeof input === 'object' && input.kind) {
        return {
          kind: filePayloadKind(input),
          text: String(input.text || ''),
          html: String(input.html || ''),
          url: String(input.url || ''),
          dataUrl: String(input.dataUrl || ''),
          fileName: String(input.fileName || input.originalName || ''),
          mimeType: String(input.mimeType || input.mime || ''),
          size: Number(input.size || 0) || 0,
          originalName: String(input.originalName || input.fileName || ''),
          preview: input.preview !== false
        };
      }
      const kind = String(input.fileKind || input.kind || '').toLowerCase();
      if (kind === 'upload') {
        return {
          kind: 'upload',
          text: String(input.fileText || input.text || ''),
          html: String(input.fileHtml || input.html || ''),
          url: String(input.fileUrl || input.url || ''),
          dataUrl: String(input.fileDataUrl || input.dataUrl || ''),
          fileName: String(input.fileName || input.originalName || 'file'),
          mimeType: String(input.fileMime || input.mimeType || input.mime || ''),
          size: Number(input.size || 0) || 0,
          originalName: String(input.fileOriginalName || input.originalName || input.fileName || 'file'),
          preview: input.preview !== false
        };
      }
      const raw = String(input.fileText || input.text || input.fileHtml || input.html || input.fileUrl || input.url || '');
      if (looksLikeHtml(raw) || looksLikeHtml(input.fileHtml || input.html || '')) {
        return { kind: 'html', html: String(input.fileHtml || input.html || raw), text: raw, url: '', dataUrl: '', fileName: String(input.fileName || 'file'), mimeType: 'text/html', size: 0, preview: input.preview !== false };
      }
      if (isProbablyUrl(raw) || isProbablyUrl(input.fileUrl || input.url || '')) {
        return { kind: 'url', url: String(input.fileUrl || input.url || raw).trim(), text: raw, html: '', dataUrl: '', fileName: String(input.fileName || 'file'), mimeType: 'text/uri-list', size: 0, preview: input.preview !== false };
      }
      return {
        kind: 'text',
        text: raw,
        html: '',
        url: '',
        dataUrl: '',
        fileName: String(input.fileName || 'file'),
        mimeType: String(input.fileMime || input.mimeType || input.mime || ''),
        size: Number(input.size || 0) || 0,
        originalName: String(input.fileOriginalName || input.originalName || input.fileName || 'file'),
        preview: input.preview !== false
      };
    }

    function safeTextFromPayload(payload) {
      if (!payload) return '';
      if (typeof payload.text === 'string' && payload.text.trim()) return payload.text;
      if (typeof payload.url === 'string' && payload.url.trim()) return payload.url;
      if (typeof payload.html === 'string' && payload.html.trim()) return htmlToPlainText(payload.html);
      return '';
    }

    function renderFilePreviewContent(payload, fileName = '') {
      const kind = filePayloadKind(payload);
      if (kind === 'html') {
        return `<div class="file-preview-html">${sanitizePreviewHtml(payload.html || '')}</div>`;
      }
      if (kind === 'url') {
        const href = safeUrlHref(payload.url || '');
        const label = esc(href || payload.url || '');
        return href
          ? `<p style="margin:0 0 12px"><a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${label}</a></p>`
          : `<pre>${label}</pre>`;
      }
      if (kind === 'upload') {
        const mime = String(payload.mimeType || '').toLowerCase();
        if (mime.startsWith('image/') && payload.dataUrl) return `<img class="file-preview-media" src="${esc(payload.dataUrl)}" alt="${esc(fileName || payload.fileName || 'file')}">`;
        if (mime.startsWith('video/') && payload.dataUrl) return `<video class="file-preview-media" controls playsinline src="${esc(payload.dataUrl)}"></video>`;
        if (mime.startsWith('audio/') && payload.dataUrl) return `<audio class="file-preview-media" controls src="${esc(payload.dataUrl)}"></audio>`;
        if ((mime.includes('pdf') || String(payload.fileName || '').toLowerCase().endsWith('.pdf')) && payload.dataUrl) return `<iframe class="file-preview-frame" src="${esc(payload.dataUrl)}" title="${esc(fileName || payload.fileName || 'file')}"></iframe>`;
        const text = safeTextFromPayload(payload);
        if (text) return `<pre>${esc(text)}</pre>`;
        if (payload.dataUrl) return `<p style="margin:0">ファイル内容を表示できない形式だよ。ダウンロードして開いてね。</p>`;
      }
      const text = safeTextFromPayload(payload);
      if (text) return `<pre>${esc(text)}</pre>`;
      return '<p style="margin:0">内容がありません。</p>';
    }

    function fileDownloadInfo(block) {
      const payload = normalizeFilePayload(block.file || block);
      const kind = filePayloadKind(payload);
      if (kind === 'upload') {
        const ext = fileExtFromMime(payload.mimeType || '', payload.fileName || payload.originalName || block.name || 'file');
        return {
          name: fileNameWithExt(block.name || payload.fileName || 'file', ext),
          blob: payload.dataUrl ? dataUrlToBlob(payload.dataUrl) : new Blob([safeTextFromPayload(payload)], { type: payload.mimeType || 'application/octet-stream' }),
          openUrl: ''
        };
      }
      if (kind === 'html') {
        return {
          name: fileNameWithExt(block.name || payload.fileName || 'file', 'html'),
          blob: new Blob([payload.html || ''], { type: 'text/html;charset=utf-8' }),
          openUrl: ''
        };
      }
      if (kind === 'url') {
        const href = safeUrlHref(payload.url || '');
        return {
          name: fileNameWithExt(block.name || payload.fileName || 'file', 'url'),
          blob: new Blob([`${payload.url || ''}\\n`], { type: 'text/plain;charset=utf-8' }),
          openUrl: href
        };
      }
      return {
        name: fileNameWithExt(block.name || payload.fileName || 'file', 'txt'),
        blob: new Blob([safeTextFromPayload(payload)], { type: 'text/plain;charset=utf-8' }),
        openUrl: ''
      };
    }

    function renderFileBlockMini(block) {
      const payload = normalizeFilePayload(block.file || block);
      const kind = filePayloadKind(payload);
      const meta = kind === 'upload'
        ? `${payload.fileName || payload.originalName || 'ファイル'} / ${payload.mimeType || 'unknown'}`
        : kind === 'html'
          ? 'HTML'
          : kind === 'url'
            ? 'URL'
            : 'テキスト';
      const body = renderFilePreviewContent(payload, block.name || payload.fileName || '');
      return `
        <div class="file-preview-mini">
          <div class="file-meta">${esc(meta)}</div>
          <div>${body}</div>
        </div>
      `;
    }

    async function readFileFromClipboard() {
      if (!navigator.clipboard || !navigator.clipboard.read) return null;
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          if (item.types.includes('text/html')) {
            const blob = await item.getType('text/html');
            return { kind: 'html', html: await blob.text() };
          }
          if (item.types.includes('text/plain')) {
            const blob = await item.getType('text/plain');
            const text = await blob.text();
            return isProbablyUrl(text)
              ? { kind: 'url', url: text.trim() }
              : looksLikeHtml(text)
                ? { kind: 'html', html: text }
                : { kind: 'text', text };
          }
          for (const type of item.types) {
            if (!type.startsWith('image/') && !type.startsWith('audio/') && !type.startsWith('video/') && !type.startsWith('application/')) continue;
            try {
              const blob = await item.getType(type);
              const ext = fileExtFromMime(type);
              const fileName = `clipboard.${ext}`;
              return { kind: 'upload', file: new File([blob], fileName, { type }) };
            } catch {}
          }
        }
      } catch {}
      return null;
    }

    async function readTextClipboard() {
      try {
        if (navigator.clipboard?.readText) return await navigator.clipboard.readText();
      } catch {}
      return null;
    }

    async function getPastedPayload() {
      const fileClip = await readFileFromClipboard();
      if (fileClip?.kind === 'upload' && fileClip.file) return fileClip;
      const text = await readTextClipboard();
      if (typeof text === 'string' && text.length) {
        if (looksLikeHtml(text)) return { kind: 'html', html: text };
        if (isProbablyUrl(text)) return { kind: 'url', url: text.trim() };
        return { kind: 'text', text };
      }
      return null;
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('ファイル読み込みに失敗したよ'));
        reader.readAsDataURL(file);
      });
    }

    async function normalizeUploadedFile(file) {
      const dataUrl = await fileToDataUrl(file);
      let text = '';
      let html = '';
      const type = String(file.type || '').toLowerCase();
      if (type.startsWith('text/') || type.includes('json') || type.includes('xml') || /(txt|html?|json|xml|md|csv|js|css|svg)$/i.test(file.name || '')) {
        try {
          text = await file.text();
          if (looksLikeHtml(text)) html = text;
        } catch {}
      }
      return {
        kind: 'upload',
        fileName: file.name || 'file',
        mimeType: file.type || '',
        dataUrl,
        text,
        html,
        url: '',
        size: Number(file.size || 0) || 0,
        originalName: file.name || 'file',
        preview: true
      };
    }

    function normalizeFileKindFromText(text) {
      const value = String(text ?? '').trim();
      if (!value) return { kind: 'text', value: '' };
      if (isProbablyUrl(value)) return { kind: 'url', value };
      if (looksLikeHtml(value)) return { kind: 'html', value: sanitizePreviewHtml(value) };
      return { kind: 'text', value };
    }

    function openFilePreview(blockId) {
      if (!state.current || !blockId || !filePreviewDialog) return;
      const block = state.current.blocks.find((item) => item.id === blockId && item.type === 'file');
      if (!block) return;
      const payload = normalizeFilePayload(block.file || block);
      const kind = filePayloadKind(payload);

      state.previewFileBlockId = blockId;
      filePreviewTitle.textContent = block.name || 'ファイル';
      filePreviewMeta.textContent = kind === 'upload'
        ? `${payload.fileName || block.name || 'ファイル'} / ${payload.mimeType || 'unknown'}`
        : kind === 'html'
          ? 'HTMLとして表示しています。'
          : kind === 'url'
            ? 'URLとして表示しています。'
            : 'テキストとして表示しています。';
      filePreviewBody.innerHTML = renderFilePreviewContent(payload, block.name || payload.fileName || '');
      const info = fileDownloadInfo(block);
      filePreviewDownloadBtn.textContent = kind === 'url' ? 'URLを開く' : 'ダウンロード';
      filePreviewDownloadBtn.dataset.blockId = blockId;
      filePreviewDownloadBtn.dataset.openUrl = info.openUrl || '';
      if (!filePreviewDialog.open) filePreviewDialog.showModal();
    }

    function closeFilePreview() {
      state.previewFileBlockId = null;
      if (filePreviewDialog?.open) filePreviewDialog.close();
    }

    async function setFileBlockFromFile(blockId, file) {
      if (!state.current || !blockId || !file) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId && b.type === 'file');
      if (idx < 0) return;
      const payload = await normalizeUploadedFile(file);
      state.current.blocks[idx].file = payload;
      if (!String(state.current.blocks[idx].name || '').trim()) state.current.blocks[idx].name = file.name || 'ファイル';
      state.current.blocks[idx].fileKind = 'upload';
      state.currentSaved = false;
      renderApp();
    }

    async function setFileBlockFromClipboard(blockId) {
      if (!state.current || !blockId) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId && b.type === 'file');
      if (idx < 0) return;
      const payload = await getPastedPayload();
      if (!payload) {
        alert('クリップボードから取得できなかったよ');
        return;
      }
      if (payload.kind === 'upload' && payload.file) {
        await setFileBlockFromFile(blockId, payload.file);
        return;
      }
      const normalized = normalizeFilePayload(payload);
      state.current.blocks[idx].file = normalized;
      state.current.blocks[idx].fileKind = normalized.kind;
      if (!String(state.current.blocks[idx].name || '').trim()) state.current.blocks[idx].name = 'ファイル';
      state.currentSaved = false;
      renderApp();
    }

    function openFileReferenceFromText(fileName) {
      const name = String(fileName || '').trim();
      if (!name || !state.current?.blocks) return;
      const block = state.current.blocks.find((item) => item.type === 'file' && String(item.name || '').trim() === name);
      if (!block) {
        alert(`「${name}」というファイルブロックが見つからないよ`);
        return;
      }
      if (block.previewEnabled !== false) {
        openFilePreview(block.id);
        return;
      }
      const info = fileDownloadInfo(block);
      if (info.openUrl) {
        window.open(info.openUrl, '_blank', 'noopener');
        return;
      }
      downloadBlob(info.blob, info.name);
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split('; ') : [];
      for (const part of parts) {
        const idx = part.indexOf('=');
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : '');
      }
      return '';
    }

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function creatorId() {
      let id = getCookie(OWNER_COOKIE);
      if (!id) {
        id = uid8();
        setCookie(OWNER_COOKIE, id);
      }
      return id;
    }

    function setCreatorId(newId) {
      const normalized = String(newId || '').trim().slice(0, 32);
      if (!normalized) return false;
      setCookie(OWNER_COOKIE, normalized);
      return true;
    }

    function basePageUrl() {
      return `${location.origin}${location.pathname.replace(/index\.html$/, '')}`;
    }

    function siteUrl(siteId, key = null) {
      if (!siteId) return basePageUrl();
      return `${basePageUrl()}#/${siteId}${key ? `/${key}` : ''}`;
    }

    function parseRoute() {
      const hash = decodeURI(location.hash || '');
      if (!hash.startsWith('#/')) return { name: 'home', siteId: null, key: null };
      const parts = hash.slice(2).split('/');
      const siteId = parts[0] || null;
      const key = parts[1] || null;
      if (siteId === 'create') return { name: 'create', siteId: null, key: null };
      return { name: 'site', siteId, key };
    }

    function isDarkMode() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function addBarBackground() {
      const alpha = Math.max(0, Math.min(1, Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92));
      return isDarkMode() ? `rgba(17,24,39,${alpha})` : `rgba(255,255,255,${alpha})`;
    }

    function addBlockButtonStyle() {
      const alpha = Math.max(0, Math.min(1, Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92));
      if (isDarkMode()) {
        return `background:rgba(17,24,39,${alpha});color:#fff;border:1px solid rgba(255,255,255,.12);`;
      }
      return `background:rgba(255,255,255,${alpha});color:#111827;border:1px solid rgba(17,24,39,.08);`;
    }

    function persistAddBarOpacity(value) {
      const clamped = Math.max(0, Math.min(1, Number.isFinite(Number(value)) ? Number(value) : 0.92));
      state.addBarOpacity = clamped;
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(clamped));
      updateAddBarOpacityLabel();
      if (state.mode === 'editor') renderApp();
    }

    function updateAddBarOpacityLabel() {
      const current = Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92;
      const percent = Math.round(current * 100);
      addBarOpacityValue.textContent = `${percent}%`;
      addBarOpacityRange.value = String(percent);
    }

    function normalizeBlock(block = {}) {
      const type = block.type === 'file' ? 'file' : 'text';
      if (type === 'file') {
        const payload = normalizeFilePayload(block.file || block);
        return {
          id: block.id || uid8(),
          type: 'file',
          name: String(block.name || payload.fileName || 'ファイル').trim() || 'ファイル',
          previewEnabled: block.previewEnabled !== false && payload.preview !== false,
          file: payload,
          visible: block.visible !== false,
          wrap: block.wrap !== false,
          heightEnabled: block.heightEnabled === true,
          rows: Math.max(1, Math.min(50, Number(block.rows || 3) || 3))
        };
      }

      const html = typeof block.html === 'string' && block.html.trim()
        ? sanitizeRichHtml(block.html)
        : parseStyledSource(block.source || htmlToPlainText(block.html || ''));

      return {
        id: block.id || uid8(),
        type: 'text',
        source: typeof block.source === 'string' ? block.source : htmlToPlainText(block.html || ''),
        html,
        visible: block.visible !== false,
        wrap: block.wrap !== false,
        heightEnabled: block.heightEnabled === true,
        rows: Math.max(1, Math.min(50, Number(block.rows || 3) || 3))
      };
    }

    function normalizeSite(siteId, data = {}) {
      return {
        siteId: siteId || data.siteId || uid8(),
        title: data.title || '無題のサイト',
        key: data.key || '',
        ownerUid: data.ownerUid || '',
        creatorId: data.creatorId || creatorId(),
        collaborators: Array.isArray(data.collaborators) ? data.collaborators : [],
        blocks: Array.isArray(data.blocks) ? data.blocks.map(normalizeBlock) : [],
        isPublic: data.isPublic !== false,
        collaborative: Boolean(data.collaborative || data.key),
        createdAt: data.createdAt || Date.now(),
        updatedAt: data.updatedAt || Date.now()
      };
    }

    function blockHeightStyle(block) {
      if (!block.heightEnabled) return '';
      const rows = Math.max(1, Math.min(50, Number(block.rows || 3) || 3));
      return `min-height: calc(${rows} * 1.8em + 28px);`;
    }

    function isMine(site) {
      return Boolean(site && site.ownerUid && site.ownerUid === state.uid);
    }

    function isCollaborator(site) {
      return Boolean(site && Array.isArray(site.collaborators) && site.collaborators.includes(state.uid));
    }

    function isCurrentCreator() {
      return Boolean(state.current && state.current.creatorId === creatorId());
    }

    function canEditCurrent() {
      const site = state.current;
      if (!site) return false;
      if (site.key && state.currentAccess === 'key') return true;
      return isMine(site) || isCollaborator(site);
    }

    function currentShareUrl() {
      if (!state.currentSaved || !state.current) return '';
      const key = state.shareMode === 'edit' && state.current.key ? state.current.key : null;
      return siteUrl(state.current.siteId, key);
    }

    function siteSearchText(site) {
      const blockText = (site.blocks || [])
        .filter((b) => b.visible !== false)
        .map((b) => {
          if (b.type === 'file') {
            const payload = normalizeFilePayload(b.file || b);
            return [b.name, payload.fileName, payload.text, payload.html, payload.url].filter(Boolean).join(' ');
          }
          return String(b.html || b.source || '').replace(/<[^>]+>/g, ' ');
        })
        .join(' ');
      return `${site.title || ''} ${blockText}`.toLowerCase();
    }

    function filterSites(list, query) {
      const q = String(query || '').trim().toLowerCase();
      if (!q) return list.slice();
      const terms = q.split(/\s+/).filter(Boolean);
      return list.filter((site) => {
        const blob = siteSearchText(site);
        return terms.every((term) => blob.includes(term));
      });
    }

    function mineSites() {
      return state.homeSites
        .filter((site) => isMine(site) || isCollaborator(site))
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function publicSites() {
      return state.homeSites
        .filter((site) => site.isPublic !== false)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function syncCurrentUrl() {
      if (!state.currentSaved || !state.current) return;
      const key = state.currentAccess === 'key' && state.current.key ? state.current.key : null;
      history.replaceState(null, '', siteUrl(state.current.siteId, key));
    }

    function drawLoadingScreen() {
      const dots = '<span></span><span></span><span></span><span></span>';
      appRoot.innerHTML = `
        <div class="boot-wrap">
          <div class="boot-card">
            <div class="eyebrow">CreateWebsite</div>
            <h1 style="font-size:clamp(2rem,5vw,3rem);margin-top:8px">Firebaseにつないでいます</h1>
            <div class="loader-line">
              <div class="loader" aria-hidden="true">${dots}</div>
              <p style="margin:0">${esc(state.authError || '接続を待っています。')}</p>
            </div>
            <p>読み込みが終わるまで少し待ってね。失敗したら再読み込みできます。</p>
          </div>
        </div>
      `;
    }

    function drawBootErrorScreen() {
      appRoot.innerHTML = `
        <div class="boot-wrap">
          <div class="boot-card">
            <div class="eyebrow">CreateWebsite</div>
            <h1 style="font-size:clamp(2rem,5vw,3rem);margin-top:8px">読み込みに失敗しました</h1>
            <p class="notice">${esc(state.authError || 'Firebaseの初期化で止まりました。')}</p>
            <div class="toolbar" style="margin-top:18px">
              <button class="btn primary" id="bootRetryBtn" type="button">再読み込み</button>
              <button class="btn" id="bootHomeBtn" type="button">トップへ戻る</button>
            </div>
          </div>
        </div>
      `;
    }

    function drawHomeScreen() {
      const mine = filterSites(mineSites(), state.homeSearch);
      const pub = filterSites(publicSites(), state.homeSearch);
      const list = state.homeTab === 'mine' ? mine : pub;
      const tabMine = state.homeTab === 'mine' ? 'active' : '';
      const tabPub = state.homeTab === 'public' ? 'active' : '';

      const listHtml = list.length
        ? list.map((site) => {
            const badge = isMine(site) ? '自分' : isCollaborator(site) ? '共同編集' : '公開';
            return `
              <button class="site-card" data-open-site="${esc(site.siteId)}" type="button">
                <strong>${esc(site.title)}</strong>
                <span>${esc(siteUrl(site.siteId))}<br>${esc(badge)}</span>
              </button>
            `;
          }).join('')
        : `<p class="empty">${state.homeTab === 'mine' ? 'まだサイトがありません。' : '公開サイトがありません。'}</p>`;

      appRoot.innerHTML = `
        <button class="home-gear-btn" id="homeSettingsBtn" type="button">⚙️</button>

        <div class="hero">
          <div class="panel">
            <div class="eyebrow">CreateWebsite</div>
            <h1>メモを書くように、サイトを作ろう。</h1>
            <p>テキストを積んで保存するだけで、共有できるWebページを作れます。保存先はFirebaseだけです。</p>
            <div class="hero-actions">
              <button class="btn primary" id="newSiteBtn" ${state.ready ? '' : 'disabled'} type="button">＋ 新規作成</button>
              <button class="btn" id="showIdBtn" ${state.ready ? '' : 'disabled'} type="button">自分のIDを見る</button>
            </div>
          </div>

          <div class="panel">
            <h2>自分のサイト一覧</h2>
            <p>このアカウントが作成したサイトと、共同編集者として追加されたサイトを表示します。</p>
            <div class="toolbar" style="margin:8px 0 12px">
              <button class="tab ${tabMine}" data-home-tab="mine" type="button">自分のサイト</button>
              <button class="tab ${tabPub}" data-home-tab="public" type="button">公開サイト</button>
              <input id="homeSearchInput" style="flex:1;min-width:220px" type="text" placeholder="検索" value="${esc(state.homeSearch)}">
              <button class="btn" id="homeRefreshBtn" type="button">↻</button>
            </div>
            <div class="site-grid" id="siteList">${listHtml}</div>
          </div>
        </div>
      `;
    }

    function drawViewerScreen() {
      const site = state.current;
      const blocks = (site?.blocks || [])
        .filter((block) => block.visible !== false)
        .map((block) => {
          const normalized = normalizeBlock(block);
          if (normalized.type === 'file') {
            const payload = normalizeFilePayload(normalized.file || normalized);
            const kind = filePayloadKind(payload);
            const fileMeta = kind === 'upload'
              ? `${payload.fileName || payload.originalName || 'ファイル'} / ${payload.mimeType || 'unknown'}`
              : kind === 'html'
                ? 'HTML'
                : kind === 'url'
                  ? 'URL'
                  : 'テキスト';
            const openLabel = normalized.previewEnabled !== false ? 'プレビュー' : 'ダウンロード';
            return `
              <article class="block" style="${blockHeightStyle(normalized)}">
                <div class="file-block">
                  <div class="block-head">
                    <div style="color:var(--muted);font-weight:900">${esc(normalized.name || 'ファイル')}</div>
                    <button class="btn small" type="button" data-file-open="${esc(normalized.id)}">${openLabel}</button>
                  </div>
                  <div class="file-meta">${esc(fileMeta)}</div>
                  ${renderFileBlockMini(normalized)}
                </div>
              </article>
            `;
          }
          return `
            <article class="block" style="${blockHeightStyle(normalized)}">
              <div class="rendered-text${normalized.wrap === false ? ' no-wrap' : ''}">${normalized.html || ''}</div>
            </article>
          `;
        }).join('');

      const statusHtml = canEditCurrent()
        ? `<span class="status-pill good">${state.currentAccess === 'key' ? '共同編集モード' : '編集可能'}</span>`
        : `<span class="status-pill warn">閲覧モード</span>`;

      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
            <div class="toolbar" style="justify-content:flex-end">
              ${statusHtml}
              <button class="btn" id="viewerShareBtn" type="button">共有</button>
              <button class="btn primary" id="viewerEditBtn" type="button" ${canEditCurrent() ? '' : 'hidden'}>編集する</button>
            </div>
          </div>
          <h2>${esc(site?.title || 'サイト')}</h2>
          <div class="canvas" style="margin-top:14px">
            ${blocks || '<div class="empty">本文がありません。</div>'}
          </div>
        </div>
      `;
    }

    function drawEditorScreen() {
      const site = state.current;
      const canShowSiteSettings = isCurrentCreator();

      const blocks = (site?.blocks || []).map((block, index) => {
        const normalized = normalizeBlock(block);
        const hiddenClass = normalized.visible ? '' : ' hidden-block';
        const moveClass = state.moveBlockId === normalized.id ? ' move-source' : '';

        if (normalized.type === 'file') {
          const payload = normalizeFilePayload(normalized.file || normalized);
          const kind = filePayloadKind(payload);
          const meta = kind === 'upload'
            ? `${payload.fileName || payload.originalName || 'ファイル'} / ${payload.mimeType || 'unknown'}`
            : kind === 'html'
              ? 'HTML'
              : kind === 'url'
                ? 'URL'
                : 'テキスト';

          return `
            <article class="block file-block${hiddenClass}${moveClass}" data-editor-block-card="${esc(normalized.id)}">
              <div class="block-head">
                <div style="color:var(--muted);font-weight:900">ブロック ${index + 1}${normalized.visible === false ? ' / 非表示' : ''}</div>
                <div class="toolbar">
                  <button class="btn small" data-block-action="settings" data-block-id="${esc(normalized.id)}" type="button">⚙️</button>
                  <button class="btn small" data-file-open="${esc(normalized.id)}" type="button">${normalized.previewEnabled !== false ? 'プレビュー' : '開く'}</button>
                </div>
              </div>
              <div class="field">
                <label for="fileNameInput-${esc(normalized.id)}">名前</label>
                <input id="fileNameInput-${esc(normalized.id)}" class="file-name-input" data-file-name-input="${esc(normalized.id)}" value="${esc(normalized.name || 'ファイル')}" placeholder="例：資料">
              </div>
              <div class="file-action-row">
                <button class="btn small" data-file-upload-btn="${esc(normalized.id)}" type="button">アップロード</button>
                <button class="btn small" data-file-clipboard-btn="${esc(normalized.id)}" type="button">クリップボード</button>
                <button class="btn small" data-file-open="${esc(normalized.id)}" type="button">${normalized.previewEnabled !== false ? 'プレビュー' : 'ダウンロード'}</button>
                <input class="hidden" type="file" data-file-input="${esc(normalized.id)}">
              </div>
              <div class="file-meta">${esc(meta)}</div>
              ${renderFileBlockMini(normalized)}
            </article>
          `;
        }

        const preview = normalized.visible
          ? `<div class="editor-text" contenteditable="true" spellcheck="false" data-editor-block="${esc(normalized.id)}" style="${blockHeightStyle(normalized)}">${normalized.html || ''}</div>`
          : `<div class="empty" style="padding:16px 10px">このブロックは非表示です。</div>`;

        return `
          <article class="block${hiddenClass}${moveClass}" data-editor-block-card="${esc(normalized.id)}">
            <div class="block-head">
              <div style="color:var(--muted);font-weight:900">ブロック ${index + 1}${normalized.visible === false ? ' / 非表示' : ''}</div>
              <button class="btn small" data-block-action="settings" data-block-id="${esc(normalized.id)}" type="button">⚙️</button>
            </div>
            ${preview}
          </article>
        `;
      }).join('');

      const backLabel = state.currentSaved ? '← 戻る' : '← 一覧へ';

      appRoot.innerHTML = `
        <div class="editor-top">
          <div>
            <button class="btn ghost" id="backBtn" type="button">${backLabel}</button>
            <h2 id="editorHeading">${esc(site?.title || '無題のサイト')}</h2>
          </div>
          <div class="toolbar">
            ${canShowSiteSettings ? '<button class="btn" id="siteSettingsBtn" type="button">⚙️ 設定</button>' : ''}
            <button class="btn" id="shareBtn" type="button">共有</button>
            <button class="btn primary" id="saveBtn" type="button">保存</button>
          </div>
        </div>

        <div class="editor-layout">
          <section class="panel">
            <h3>サイト</h3>
            <div class="field">
              <label for="titleInput">サイトタイトル</label>
              <input id="titleInput" placeholder="例：自己紹介" value="${esc(site?.title || '')}">
            </div>
          </section>

          <section class="panel">
            <div class="toolbar" style="justify-content:space-between;margin-bottom:12px">
              <h3>本文</h3>
            </div>
            <div class="canvas" id="blockCanvas">${blocks || '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>'}</div>
          </section>
        </div>

        <div class="bottom-add-bar" id="bottomAddBar">
          <div class="add-menu-wrap">
            <div class="add-menu${state.addMenuOpen ? ' open' : ''}" id="addMenu">
              <button class="btn" id="addTextBlockBtn" type="button">テキスト</button>
              <button class="btn" id="addFileBlockBtn" type="button">ファイル</button>
            </div>
            <button class="add-block-btn" id="addBlockBtn" type="button" style="${addBlockButtonStyle()}">＋ 追加</button>
          </div>
        </div>
      `;
    }

    function drawMissingScreen(message = 'このリンクのサイトは見つかりませんでした。') {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>サイトが見つかりません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">${esc(message)}</div>
          </div>
        </div>
      `;
    }

    function drawDeniedScreen() {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>アクセスできません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。</div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      if (state.mode === 'loading') drawLoadingScreen();
      else if (state.mode === 'home') drawHomeScreen();
      else if (state.mode === 'viewer') drawViewerScreen();
      else if (state.mode === 'editor') drawEditorScreen();
      else if (state.mode === 'missing') drawMissingScreen();
      else if (state.mode === 'denied') drawDeniedScreen();
      else if (state.mode === 'boot-failed') drawBootErrorScreen();
    }

    function setCurrentSite(site, saved = true) {
      state.current = site ? structuredClone(normalizeSite(site.siteId, site)) : null;
      if (state.current) {
        state.current.blocks = (state.current.blocks || []).map(normalizeBlock);
      }
      state.currentSaved = !!saved;
      state.editingBlockId = null;
      state.moveBlockId = null;
    }

    function createDraftSite() {
      const id = uid8();
      return normalizeSite(id, {
        siteId: id,
        title: '無題のサイト',
        ownerUid: state.uid,
        creatorId: creatorId(),
        key: '',
        blocks: [
          { id: uid8(), type: 'text', source: "こんにちは\n太字も使えるよ\n#ff0000'赤文字'", html: "こんにちは<br>太字も使えるよ<br><span style=\"color:#ff0000\">赤文字</span>", visible: true, wrap: true, heightEnabled: false, rows: 3 },
          { id: uid8(), type: 'file', name: '資料', previewEnabled: true, file: { kind: 'text', text: 'ここにファイルの中身を入れてね', html: '', url: '', dataUrl: '', fileName: 'file.txt', mimeType: 'text/plain', size: 0, preview: true }, visible: true, wrap: true, heightEnabled: false, rows: 3 }
        ],
        isPublic: true,
        collaborative: false,
        collaborators: [],
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    function openNewDraft() {
      if (!state.ready) return;
      const draft = createDraftSite();
      openEditorScreen(draft, false, 'owner', false);
      location.hash = '#/create';
    }

    function openEditorScreen(site, saved = true, access = 'view', sync = true) {
      setCurrentSite(site, saved);
      state.currentAccess = access;
      state.mode = 'editor';
      renderApp();
      if (sync) syncCurrentUrl();
      focusBlockByIdIfNeeded();
    }

    function openViewerScreen(site, access = 'view', sync = true) {
      setCurrentSite(site, true);
      state.currentAccess = access;
      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function focusBlockByIdIfNeeded() {
      if (!state.editingBlockId) return;
      const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(state.editingBlockId)}"]`);
      if (!el) return;
      requestAnimationFrame(() => {
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function placeCaretAtEnd(el) {
      if (!el) return;
      const selection = window.getSelection();
      if (!selection) return;
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function openBlockSettingsModal(blockId = null) {
      if (!state.current) return;
      state.pendingBlockSettingsId = blockId;
      const target = blockId ? state.current.blocks.find((b) => b.id === blockId) : null;
      if (!target) return;

      const isFile = target.type === 'file';
      blockFileNameField.classList.toggle('hidden', !isFile);
      blockFilePreviewField.classList.toggle('hidden', !isFile);

      if (isFile) {
        blockFileNameInput.value = String(target.name || 'ファイル');
        blockFilePreviewToggle.checked = target.previewEnabled !== false;
      }

      blockVisibleToggle.checked = target.visible !== false;
      blockWrapToggle.checked = target.wrap !== false;
      blockHeightToggle.checked = target.heightEnabled === true;
      blockRowsInput.value = String(Math.max(1, Math.min(50, Number(target.rows || 3) || 3)));
      blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
      if (!blockSettingsDialog.open) blockSettingsDialog.showModal();
    }

    function openSiteSettingsModal() {
      if (!state.current || !isCurrentCreator()) return;
      sitePublicToggle.checked = state.current.isPublic !== false;
      siteKeyInput.value = state.current.key || '';
      siteDeleteBtn.classList.toggle('hidden', !isCurrentCreator());
      siteClearKeyBtn.classList.toggle('hidden', !isCurrentCreator());
      if (!siteSettingsDialog.open) siteSettingsDialog.showModal();
    }

    function openHomeSettingsModal() {
      updateAddBarOpacityLabel();
      if (!homeSettingsDialog.open) homeSettingsDialog.showModal();
    }

    function openMergeModal() {
      mergeTargetInput.value = '';
      if (!mergeDialog.open) mergeDialog.showModal();
      requestAnimationFrame(() => mergeTargetInput.focus());
    }

    function showShareModal() {
      if (!state.current) {
        alert('先にサイトを開いてください。');
        return;
      }
      if (!state.currentSaved) {
        alert('先に保存してね。');
        return;
      }

      state.shareMode = 'view';
      shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.shareTab === 'view'));
      const editBtn = shareTabs.querySelector('[data-share-tab="edit"]');
      if (editBtn) editBtn.disabled = !state.current.key;
      syncShareDialog();
      if (!shareDialog.open) shareDialog.showModal();
    }

    function syncShareDialog() {
      const url = currentShareUrl();
      shareUrlEl.textContent = url || '保存後に共有リンクが出るよ';

      if (!state.current) {
        shareNoticeEl.textContent = '先にサイトを開いてください。';
      } else if (!state.currentSaved) {
        shareNoticeEl.textContent = '先に保存してね。';
      } else if (state.shareMode === 'edit' && !state.current.key) {
        shareNoticeEl.textContent = '共同編集Keyが未設定です。';
      } else if (state.shareMode === 'edit') {
        shareNoticeEl.textContent = 'このリンクを開くと共同編集者として追加されます。';
      } else {
        shareNoticeEl.textContent = 'このリンクは閲覧用です。';
      }

      qrBox.innerHTML = '生成中…';
      setTimeout(() => {
        qrBox.innerHTML = '';
        if (window.QRCode && url) {
          new QRCode(qrBox, { text: url, width: 200, height: 200 });
        } else {
          qrBox.textContent = 'QRライブラリを読み込めませんでした';
        }
      }, 120);
    }

    async function loadAllSites() {
      if (!state.db) return [];
      const snapshot = await getDocs(collection(state.db, COLLECTION));
      state.homeSites = snapshot.docs.map((d) => normalizeSite(d.id, d.data() || {}));
      return state.homeSites;
    }

    async function loadSiteById(siteId) {
      if (!state.db || !siteId) return null;
      const snap = await getDoc(doc(state.db, COLLECTION, siteId));
      if (!snap.exists()) return null;
      const site = normalizeSite(snap.id, snap.data() || {});
      site.blocks = (site.blocks || []).map(normalizeBlock);
      return site;
    }

    function showMissingSite(message) {
      state.current = {
        siteId: 'missing',
        title: 'サイトが見つかりません',
        blocks: [{ id: 'missing', source: '', html: message || 'このリンクのサイトは見つかりませんでした。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'missing';
      renderApp();
    }

    function showDeniedSite() {
      state.current = {
        siteId: 'denied',
        title: 'アクセスできません',
        blocks: [{ id: 'denied', source: '', html: 'このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'denied';
      renderApp();
    }

    async function saveHomeSettings() {
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(state.addBarOpacity));
      if (homeSettingsDialog.open) homeSettingsDialog.close();
      if (state.mode === 'editor') renderApp();
    }

    async function saveSiteSettings() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      state.current.isPublic = !!sitePublicToggle.checked;
      state.current.key = String(siteKeyInput.value || '').trim();
      state.current.collaborative = Boolean(state.current.key);
      state.current.updatedAt = Date.now();

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        isPublic: state.current.isPublic,
        key: state.current.key,
        collaborative: state.current.collaborative,
        updatedAt: state.current.updatedAt
      }, { merge: true });

      await loadAllSites();
      if (siteSettingsDialog.open) siteSettingsDialog.close();
      renderApp();
      syncCurrentUrl();
    }

    async function clearSiteKey() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      siteKeyInput.value = '';
      state.current.key = '';
      state.current.collaborative = false;
      state.current.updatedAt = Date.now();

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        key: '',
        collaborative: false,
        updatedAt: state.current.updatedAt
      }, { merge: true });

      await loadAllSites();
      renderApp();
      syncCurrentUrl();
    }

    async function deleteCurrentSite() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      const ok = confirm('このサイトを削除しますか？');
      if (!ok) return;

      await deleteDoc(doc(state.db, COLLECTION, state.current.siteId));
      state.current = null;
      state.currentSaved = false;
      state.currentAccess = 'view';
      location.hash = '';
      state.mode = 'home';
      await loadAllSites();
      renderApp();
    }

    function saveBlockSettings() {
      if (!state.current || !state.db || !state.pendingBlockSettingsId) return;
      const target = state.current.blocks.find((b) => b.id === state.pendingBlockSettingsId);
      if (!target) return;

      target.visible = !!blockVisibleToggle.checked;
      target.wrap = !!blockWrapToggle.checked;
      target.heightEnabled = !!blockHeightToggle.checked;
      target.rows = target.heightEnabled ? Math.max(1, Math.min(50, Number(blockRowsInput.value || 3) || 3)) : (target.rows || 3);

      if (target.type === 'file') {
        target.name = String(blockFileNameInput.value || 'ファイル').trim() || 'ファイル';
        target.previewEnabled = !!blockFilePreviewToggle.checked;
      }

      state.current.updatedAt = Date.now();

      setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        blocks: state.current.blocks.map((b) => {
          if (b.type === 'file') {
            const payload = normalizeFilePayload(b.file || b);
            return {
              id: b.id,
              type: 'file',
              name: String(b.name || payload.fileName || 'ファイル').trim() || 'ファイル',
              previewEnabled: b.previewEnabled !== false,
              file: payload,
              visible: b.visible !== false,
              wrap: b.wrap !== false,
              heightEnabled: b.heightEnabled === true,
              rows: Math.max(1, Math.min(50, Number(b.rows || 3) || 3))
            };
          }
          return {
            id: b.id,
            type: 'text',
            source: b.source || htmlToPlainText(b.html || ''),
            html: b.html || parseStyledSource(b.source || ''),
            visible: b.visible !== false,
            wrap: b.wrap !== false,
            heightEnabled: b.heightEnabled === true,
            rows: Math.max(1, Math.min(50, Number(b.rows || 3) || 3))
          };
        }),
        updatedAt: state.current.updatedAt
      }, { merge: true }).then(async () => {
        await loadAllSites();
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        renderApp();
      });
    }

    async function executeIdMerge() {
      if (!state.db) return;

      const target = String(mergeTargetInput.value || '').trim();
      if (!target) {
        alert('統合先IDを入れてね');
        return;
      }

      const oldId = creatorId();
      if (target === oldId) {
        alert('同じIDだよ');
        return;
      }

      const snapshot = await getDocs(collection(state.db, COLLECTION));
      const matches = snapshot.docs.filter((d) => {
        const data = d.data() || {};
        return data.creatorId === oldId;
      });

      if (!matches.length) {
        setCreatorId(target);
        await loadAllSites();
        renderApp();
        if (mergeDialog.open) mergeDialog.close();
        return;
      }

      await Promise.all(matches.map((d) => setDoc(doc(state.db, COLLECTION, d.id), {
        creatorId: target
      }, { merge: true })));

      setCreatorId(target);

      if (state.current && state.current.creatorId === oldId) {
        state.current.creatorId = target;
      }

      await loadAllSites();
      renderApp();
      if (mergeDialog.open) mergeDialog.close();
      alert('IDを統合しました。');
    }

    async function saveCurrentSite() {
      if (!state.current || !state.db) {
        alert('先にサイトを作ってね');
        return;
      }

      const titleInput = document.getElementById('titleInput');
      const title = String(titleInput?.value || '').trim() || '無題のサイト';

      state.current.title = title;
      state.current.updatedAt = Date.now();
      state.current.ownerUid = state.current.ownerUid || state.uid;
      state.current.creatorId = state.current.creatorId || creatorId();
      state.current.blocks = (state.current.blocks || []).map(normalizeBlock);

      const payload = {
        ...state.current,
        blocks: state.current.blocks.map((b) => {
          if (b.type === 'file') {
            const payload = normalizeFilePayload(b.file || b);
            return {
              id: b.id,
              type: 'file',
              name: String(b.name || payload.fileName || 'ファイル').trim() || 'ファイル',
              previewEnabled: b.previewEnabled !== false,
              file: payload,
              visible: b.visible !== false,
              wrap: b.wrap !== false,
              heightEnabled: b.heightEnabled === true,
              rows: Math.max(1, Math.min(50, Number(b.rows || 3) || 3))
            };
          }
          return {
            id: b.id,
            type: 'text',
            source: b.source || htmlToPlainText(b.html || ''),
            html: b.html || parseStyledSource(b.source || ''),
            visible: b.visible !== false,
            wrap: b.wrap !== false,
            heightEnabled: b.heightEnabled === true,
            rows: Math.max(1, Math.min(50, Number(b.rows || 3) || 3))
          };
        }),
        collaborators: Array.isArray(state.current.collaborators) ? state.current.collaborators : [],
        updatedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), payload, { merge: true });

      state.currentSaved = true;
      state.current = normalizeSite(state.current.siteId, payload);
      state.current.blocks = state.current.blocks.map(normalizeBlock);
      await loadAllSites();
      state.mode = 'editor';
      renderApp();
      syncCurrentUrl();
      alert('保存しました。');
    }

    async function openSiteById(siteId, key = null, sync = true) {
      if (!state.ready) return;

      const site = await loadSiteById(siteId);
      if (!site) {
        showMissingSite();
        return;
      }

      if (key && site.key && key === site.key) {
        try {
          await updateDoc(doc(state.db, COLLECTION, site.siteId), {
            collaborators: arrayUnion(state.uid),
            collaborative: true
          });
          site.collaborators = Array.from(new Set([...(site.collaborators || []), state.uid]));
          site.collaborative = true;
          state.currentAccess = 'key';
        } catch (error) {
          console.error(error);
          state.currentAccess = 'key';
          alert('共同編集者の登録に失敗しました。Firestoreルールを確認してね。');
        }
      } else if (isMine(site)) {
        state.currentAccess = 'owner';
      } else if (isCollaborator(site)) {
        state.currentAccess = 'collaborator';
      } else {
        state.currentAccess = 'view';
      }

      state.current = site;
      state.currentSaved = true;

      if (site.isPublic === false && !canEditCurrent()) {
        showDeniedSite();
        return;
      }

      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function reloadHomeSites() {
      loadAllSites().then(() => {
        if (state.mode === 'home') renderApp();
      });
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      longPressCandidateId = null;
    }

    function handleLongPressCandidate(blockId) {
      if (!blockId || !state.current || state.mode !== 'editor') return;
      if (state.moveBlockId === blockId) return;
      state.moveBlockId = blockId;
      renderApp();
    }

    function moveBlockBefore(fromId, toId) {
      if (!state.current || fromId === toId) return;
      const fromIndex = state.current.blocks.findIndex((b) => b.id === fromId);
      const toIndex = state.current.blocks.findIndex((b) => b.id === toId);
      if (fromIndex < 0 || toIndex < 0) return;

      const [item] = state.current.blocks.splice(fromIndex, 1);
      const adjustedToIndex = fromIndex < toIndex ? toIndex - 1 : toIndex;
      state.current.blocks.splice(adjustedToIndex, 0, item);
      state.currentSaved = false;
      state.moveBlockId = null;
      renderApp();
    }

    function focusBlockEditor(blockId) {
      requestAnimationFrame(() => {
        const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(blockId)}"]`);
        if (!el) return;
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function addNewBlock(type = 'text') {
      if (!state.current) return;
      const block = type === 'file'
        ? normalizeBlock({
            id: uid8(),
            type: 'file',
            name: 'ファイル',
            previewEnabled: true,
            file: { kind: 'text', text: '', html: '', url: '', dataUrl: '', fileName: '', mimeType: '', size: 0, preview: true },
            visible: true,
            wrap: true,
            heightEnabled: false,
            rows: 3
          })
        : normalizeBlock({
            id: uid8(),
            type: 'text',
            source: '',
            html: '',
            visible: true,
            wrap: true,
            heightEnabled: false,
            rows: 3
          });
      state.current.blocks.push(block);
      state.currentSaved = false;
      renderApp();
      state.editingBlockId = block.id;
      focusBlockByIdIfNeeded();
    }

    function updateEditableBlockFromDom(blockId, element) {
      if (!state.current || !blockId || !element) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId);
      if (idx < 0) return;

      const raw = element.innerText.replace(/\r/g, '');
      const html = parseStyledSource(raw);

      state.current.blocks[idx].source = raw;
      state.current.blocks[idx].html = html || '<br>';
      state.currentSaved = false;

      const selectionKeep = document.activeElement === element;
      const nextHtml = html || '<br>';
      if (element.innerHTML !== nextHtml) {
        element.innerHTML = nextHtml;
        if (selectionKeep) placeCaretAtEnd(element);
      }
    }

    function handleClick(target) {
      const openFileBtn = target.closest('[data-file-open]');
      if (openFileBtn) {
        const blockId = openFileBtn.getAttribute('data-file-open');
        if (blockId) {
          const block = state.current?.blocks.find((b) => b.id === blockId && b.type === 'file');
          if (block) {
            if (block.previewEnabled !== false) openFilePreview(block.id);
            else {
              const info = fileDownloadInfo(block);
              if (info.openUrl) window.open(info.openUrl, '_blank', 'noopener');
              else downloadBlob(info.blob, info.name);
            }
          }
        }
        return;
      }

      const fileLink = target.closest('[data-file-link]');
      if (fileLink) {
        openFileReferenceFromText(fileLink.getAttribute('data-file-link') || '');
        return;
      }

      const fileUploadBtn = target.closest('[data-file-upload-btn]');
      if (fileUploadBtn) {
        const blockId = fileUploadBtn.getAttribute('data-file-upload-btn');
        const input = appRoot.querySelector(`input[type="file"][data-file-input="${CSS.escape(blockId || '')}"]`);
        input?.click();
        return;
      }

      const fileClipboardBtn = target.closest('[data-file-clipboard-btn]');
      if (fileClipboardBtn) {
        const blockId = fileClipboardBtn.getAttribute('data-file-clipboard-btn');
        setFileBlockFromClipboard(blockId);
        return;
      }

      const addDialogTextBtn = target.closest('#addTextBlockBtn');
      if (addDialogTextBtn) {
        state.addMenuOpen = false;
        addNewBlock('text');
        return;
      }

      const addDialogFileBtn = target.closest('#addFileBlockBtn');
      if (addDialogFileBtn) {
        state.addMenuOpen = false;
        addNewBlock('file');
        return;
      }

      if (target.closest('#filePreviewCloseBtn')) {
        closeFilePreview();
        return;
      }

      if (target.closest('#filePreviewDownloadBtn')) {
        const btn = target.closest('#filePreviewDownloadBtn');
        const blockId = state.previewFileBlockId || btn?.dataset?.blockId || '';
        const block = state.current?.blocks.find((b) => b.id === blockId && b.type === 'file');
        if (!block) return;
        const info = fileDownloadInfo(block);
        if (info.openUrl) window.open(info.openUrl, '_blank', 'noopener');
        else downloadBlob(info.blob, info.name);
        return;
      }

      const openSiteBtn = target.closest('[data-open-site]');
      if (openSiteBtn) {
        const siteId = openSiteBtn.getAttribute('data-open-site');
        if (siteId) openSiteById(siteId, null, true);
        return;
      }

      const blockActionBtn = target.closest('[data-block-action]');
      if (blockActionBtn && state.mode === 'editor') {
        const action = blockActionBtn.getAttribute('data-block-action');
        const blockId = blockActionBtn.getAttribute('data-block-id');
        if (!state.current || !blockId) return;

        if (action === 'settings') {
          openBlockSettingsModal(blockId);
        }
        return;
      }

      const editorBlock = target.closest('[data-editor-block]');
      const editorCard = target.closest('[data-editor-block-card]');

      if (state.mode === 'editor' && editorCard) {
        const blockId = editorCard.getAttribute('data-editor-block-card');

        if (state.moveBlockId) {
          if (state.moveBlockId === blockId) {
            state.moveBlockId = null;
            renderApp();
            return;
          }
          moveBlockBefore(state.moveBlockId, blockId);
          return;
        }

        if (editorBlock) {
          editorBlock.focus?.();
          return;
        }
      }

      if (target.closest('#newSiteBtn')) {
        openNewDraft();
        return;
      }

      if (target.closest('#showIdBtn')) {
        ownerIdBtn.textContent = 'ID: ••••';
        if (!idDialog.open) idDialog.showModal();
        return;
      }

      if (target.closest('#homeSettingsBtn')) {
        openHomeSettingsModal();
        return;
      }

      if (target.closest('#viewerHomeBtn') || target.closest('#backBtn') || target.closest('#bootHomeBtn')) {
        if (state.mode === 'editor' && !state.currentSaved) {
          if (!confirm('保存していない内容があるけど戻る？')) return;
        }
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        state.addMenuOpen = false;
        location.hash = '';
        state.mode = 'home';
        renderApp();
        reloadHomeSites();
        return;
      }

      if (target.closest('#bootRetryBtn')) {
        location.reload();
        return;
      }

      if (target.closest('#viewerEditBtn')) {
        if (!state.current) return;
        if (canEditCurrent()) {
          state.mode = 'editor';
          renderApp();
          syncCurrentUrl();
        } else {
          const entered = prompt('Key を入力して編集', '');
          if (entered === null) return;
          if ((entered || '').trim() === (state.current.key || '')) {
            state.currentAccess = 'key';
            state.mode = 'editor';
            renderApp();
            syncCurrentUrl();
          } else {
            alert('Key が違うよ');
          }
        }
        return;
      }

      if (target.closest('#siteSettingsBtn')) {
        if (!canEditCurrent() || !isCurrentCreator()) {
          alert('作成者だけが設定できます。');
          return;
        }
        openSiteSettingsModal();
        return;
      }

      if (target.closest('#viewerShareBtn') || target.closest('#shareBtn')) {
        showShareModal();
        return;
      }

      if (target.closest('#saveBtn')) {
        saveCurrentSite();
        return;
      }

      if (target.closest('#addBlockBtn')) {
        state.addMenuOpen = !state.addMenuOpen;
        renderApp();
        return;
      }

      const closeAddMenu = !target.closest('#addMenu') && !target.closest('#addBlockBtn');
      if (state.addMenuOpen && closeAddMenu) {
        state.addMenuOpen = false;
        renderApp();
      }

      if (target.closest('#siteSettingsCancelBtn')) {
        if (siteSettingsDialog.open) siteSettingsDialog.close();
        return;
      }

      if (target.closest('#siteSettingsSaveBtn')) {
        saveSiteSettings();
        return;
      }

      if (target.closest('#siteClearKeyBtn')) {
        clearSiteKey();
        return;
      }

      if (target.closest('#siteDeleteBtn')) {
        deleteCurrentSite();
        return;
      }

      if (target.closest('#blockSettingsCancelBtn')) {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        return;
      }

      if (target.closest('#blockSettingsSaveBtn')) {
        saveBlockSettings();
        return;
      }

      if (target.closest('#homeSettingsCloseBtn')) {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
        return;
      }

      if (target.closest('#copyIdBtn')) {
        navigator.clipboard.writeText(creatorId()).then(() => alert('IDをコピーしました')).catch(() => prompt('コピーできない場合はこれを使ってね', creatorId()));
        return;
      }

      if (target.closest('#closeIdBtn')) {
        if (idDialog.open) idDialog.close();
        return;
      }

      if (target.closest('#mergeIdBtn')) {
        openMergeModal();
        return;
      }

      if (target.closest('#mergeCancelBtn')) {
        if (mergeDialog.open) mergeDialog.close();
        return;
      }

      if (target.closest('#mergeExecuteBtn')) {
        executeIdMerge();
        return;
      }

      if (target.closest('#closeShareBtn')) {
        if (shareDialog.open) shareDialog.close();
        return;
      }

      if (target.closest('#copyShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        navigator.clipboard.writeText(url).then(() => alert('コピーしました')).catch(() => prompt('コピーできないときはこれを使ってね', url));
        return;
      }

      if (target.closest('#webShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        if (navigator.share) {
          navigator.share({ title: state.current?.title || 'CreateWebsite', url }).catch(() => {});
        } else {
          alert('このブラウザはWeb Share APIに対応していません。');
        }
        return;
      }

      const tabBtn = target.closest('[data-home-tab]');
      if (tabBtn) {
        state.homeTab = tabBtn.getAttribute('data-home-tab') || 'mine';
        renderApp();
        return;
      }

      const shareTab = target.closest('[data-share-tab]');
      if (shareTab) {
        if (shareTab.disabled) return;
        state.shareMode = shareTab.getAttribute('data-share-tab') || 'view';
        shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === shareTab));
        syncShareDialog();
        return;
      }

      if (target.closest('#homeRefreshBtn')) {
        reloadHomeSites();
      }
    }

    function handleInput(event) {
      const target = event.target;
      if (!target) return;

      if (target.id === 'homeSearchInput') {
        state.homeSearch = target.value;
        renderApp();
        return;
      }

      if (target.id === 'addBarOpacityRange') {
        persistAddBarOpacity(Number(target.value) / 100);
        return;
      }

      if (target.id === 'titleInput' && state.current) {
        state.current.title = target.value;
        const heading = document.getElementById('editorHeading');
        if (heading) heading.textContent = target.value || '無題のサイト';
        state.currentSaved = false;
        return;
      }

      if (target.id === 'sitePublicToggle' && state.current) {
        state.current.isPublic = !!target.checked;
        state.currentSaved = false;
        return;
      }

      if (target.id === 'siteKeyInput' && state.current) {
        state.current.key = target.value;
        state.current.collaborative = Boolean(String(target.value || '').trim());
        state.currentSaved = false;
        return;
      }

      if (target.id === 'blockHeightToggle') {
        blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
        return;
      }

      if (target.id === 'blockRowsInput') {
        return;
      }

      if (target.matches?.('[data-file-name-input]') && state.current) {
        const blockId = target.getAttribute('data-file-name-input');
        const block = state.current.blocks.find((b) => b.id === blockId && b.type === 'file');
        if (block) {
          block.name = target.value;
          state.currentSaved = false;
        }
        return;
      }

      const editorBlock = target.closest('[data-editor-block]');
      if (state.mode === 'editor' && editorBlock) {
        const blockId = editorBlock.getAttribute('data-editor-block');
        updateEditableBlockFromDom(blockId, editorBlock);
      }
    }

    function handleChange(event) {
      const target = event.target;
      if (!target) return;

      if (target.matches?.('input[type="file"][data-file-input]')) {
        const blockId = target.getAttribute('data-file-input');
        const file = target.files && target.files[0];
        if (blockId && file) {
          setFileBlockFromFile(blockId, file);
        }
        target.value = '';
        return;
      }
    }

    function handlePointerDown(event) {
      if (state.mode !== 'editor') return;
      const card = event.target.closest('[data-editor-block-card]');
      if (!card) return;
      if (event.target.closest('[data-block-action]') || event.target.closest('[data-file-open]') || event.target.closest('[data-file-upload-btn]') || event.target.closest('[data-file-clipboard-btn]')) return;

      const blockId = card.getAttribute('data-editor-block-card');
      if (!blockId) return;

      clearLongPressTimer();
      longPressCandidateId = blockId;
      longPressTimer = setTimeout(() => {
        handleLongPressCandidate(blockId);
      }, 500);
    }

    function handlePointerUp() {
      clearLongPressTimer();
    }

    function handleKeyDown(event) {
      if (event.key === 'Escape') {
        if (state.addMenuOpen) {
          state.addMenuOpen = false;
          renderApp();
          return;
        }
        if (state.moveBlockId) {
          state.moveBlockId = null;
          renderApp();
        }
      }
    }

    blockSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
      }
    });

    homeSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
      }
    });

    window.addEventListener('hashchange', async () => {
      const route = parseRoute();
      if (!state.ready) return;

      if (route.name === 'home') {
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        state.mode = 'home';
        renderApp();
        return;
      }

      if (route.name === 'create') {
        openNewDraft();
        return;
      }

      if (route.name === 'site') {
        await openSiteById(route.siteId, route.key || null, false);
      }
    });

    async function initFirebase() {
      if (!firebaseConfig.apiKey || !firebaseConfig.authDomain || !firebaseConfig.projectId || !firebaseConfig.appId) {
        state.ready = false;
        state.authError = 'Firebase設定がありません。firebaseConfig を入れてください。';
        state.mode = 'boot-failed';
        renderApp();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        state.db = getFirestore(app);
        const auth = getAuth(app);

        const cred = await signInAnonymously(auth);
        state.uid = cred.user?.uid || auth.currentUser?.uid || '';
        state.ready = true;
        state.authError = '';

        await loadAllSites();

        const route = parseRoute();
        if (route.name === 'site') {
          await openSiteById(route.siteId, route.key || null, false);
        } else if (route.name === 'create') {
          openNewDraft();
        } else {
          state.mode = 'home';
          renderApp();
        }
      } catch (error) {
        console.error(error);
        const code = error?.code || '';
        if (code === 'auth/configuration-not-found') {
          state.authError = 'Firebase Authentication の匿名ログインが未設定か、Auth 側の設定が足りません。';
        } else if (code === 'auth/operation-not-allowed') {
          state.authError = 'Firebase Authentication の匿名ログインが無効です。Auth で Anonymous を有効にしてください。';
        } else if (code === 'auth/network-request-failed') {
          state.authError = 'ネットワークに接続できません。通信許可とブラウザ設定を確認してください。';
        } else {
          state.authError = `Firebase接続に失敗しました。${code ? `(${code})` : ''}`;
        }
        state.ready = false;
        state.mode = 'boot-failed';
        renderApp();
      }
    }

    document.addEventListener('click', (event) => handleClick(event.target));
    document.addEventListener('input', handleInput);
    document.addEventListener('change', handleChange);
    document.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointerup', handlePointerUp);
    document.addEventListener('pointercancel', handlePointerUp);
    document.addEventListener('keydown', handleKeyDown);

    function bootstrap() {
      updateAddBarOpacityLabel();
      state.mode = 'loading';
      renderApp();
      initFirebase();
    }

    bootstrap();
  </script>
</body>
</html>
