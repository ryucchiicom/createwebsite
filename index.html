<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreateWebsite</title>
  <meta name="description" content="メモを書くようにサイトを作って共有できるサービス" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f6f7fb;
      --surface:#ffffff;
      --surface-soft:rgba(255,255,255,.92);
      --surface-ghost:rgba(255,255,255,.58);
      --surface-muted:#f8fafc;
      --surface-dialog:#ffffff;
      --ink:#1c2430;
      --muted:#667085;
      --line:#e4e7ec;
      --brand:#5f63f2;
      --brand-dark:#494de4;
      --accent:#18a999;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(28,36,48,.12);
      --radius:22px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1220;
        --surface:#111827;
        --surface-soft:rgba(17,24,39,.90);
        --surface-ghost:rgba(17,24,39,.68);
        --surface-muted:#0f172a;
        --surface-dialog:#111827;
        --ink:#e5e7eb;
        --muted:#94a3b8;
        --line:#334155;
        --brand:#8b8cff;
        --brand-dark:#6f72ff;
        --accent:#2dd4bf;
        --danger:#f87171;
        --shadow:0 18px 50px rgba(0,0,0,.35);
      }
      body{
        background:
          radial-gradient(circle at top left, rgba(139,140,255,.16), transparent 34rem),
          radial-gradient(circle at 100% 10%, rgba(45,212,191,.12), transparent 28rem),
          var(--bg);
      }
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(95,99,242,.18), transparent 34rem),
        radial-gradient(circle at 100% 10%, rgba(24,169,153,.15), transparent 28rem),
        var(--bg);
      color:var(--ink);
    }

    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:0}
    textarea{resize:vertical}
    .app-shell{
      width:min(1120px,100%);
      margin:0 auto;
      padding:20px 16px 140px;
      position:relative;
      z-index:1;
    }
    .hidden{display:none !important}

    .hero{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
      margin:12px 0 20px;
    }

    .panel{
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter:blur(14px);
    }

    .eyebrow{color:var(--brand);font-weight:800;letter-spacing:.08em;font-size:.78rem}
    h1,h2,h3{margin:0;line-height:1.15}
    h1{font-size:clamp(2rem,7vw,4.5rem);letter-spacing:-.06em;margin-top:8px}
    h2{font-size:clamp(1.35rem,4vw,2.1rem)}
    h3{font-size:1.15rem}
    p{color:var(--muted);line-height:1.8}

    .hero-actions,.toolbar,.tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      background:var(--surface);
      color:var(--ink);
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .btn.primary{
      background:var(--brand);
      color:#fff;
      box-shadow:0 10px 24px rgba(95,99,242,.28);
    }
    .btn.primary:hover{background:var(--brand-dark)}
    .btn.danger{color:#fff;background:var(--danger);box-shadow:none}
    .btn.ghost{background:transparent}
    .btn.small{min-height:36px;padding:0 12px;font-size:.9rem}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    .site-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .site-card{
      text-align:left;
      width:100%;
      border-radius:20px;
      padding:16px;
      background:var(--surface);
      border:1px solid var(--line);
      transition:transform .15s, box-shadow .15s;
    }
    .site-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(28,36,48,.1)}
    .site-card strong{display:block;font-size:1.08rem;margin-bottom:8px}
    .site-card span{color:var(--muted);font-size:.9rem;word-break:break-all}

    .editor-layout{display:grid;gap:16px;align-items:start}
    .editor-top,.viewer-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }

    .field{display:grid;gap:7px;margin:12px 0}
    .field label{font-weight:800;font-size:.92rem}
    .field input,.field textarea,.field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      color:var(--ink);
    }

    .canvas{
      min-height:52vh;
      padding:18px;
      background:var(--surface-ghost);
      border:1px dashed #cdd3df;
      border-radius:var(--radius);
    }

    .empty{text-align:center;padding:60px 14px;color:var(--muted)}

    .block{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }
    .block.hidden-block{
      opacity:.55;
      border-style:dashed;
    }
    .block.move-source{
      outline:2px dashed var(--brand);
      outline-offset:2px;
    }

    .block-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .rendered-text{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
    }
    .rendered-text.no-wrap{
      white-space:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      display:block;
      -webkit-overflow-scrolling:touch;
    }

    .editor-text{
      min-height:44px;
      outline:none;
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:manipulation;
      padding:2px 0;
    }
    .editor-text:focus{outline:none}

    .editor-source{
      width:100%;
      min-height:180px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      color:var(--ink);
      line-height:1.8;
      resize:vertical;
      outline:none;
      font:inherit;
    }
    .editor-source:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(95,99,242,.12);
    }

    .file-block{
      display:grid;
      gap:10px;
      cursor:pointer;
    }
    .file-block-body{
      display:grid;
      gap:10px;
      padding:14px;
      border-radius:16px;
      background:var(--surface-muted);
      border:1px solid var(--line);
      overflow:hidden;
    }
    .file-preview-shell{
      display:grid;
      gap:10px;
    }
    .file-preview-html,
    .file-preview-text{
      width:100%;
      max-width:100%;
      line-height:1.8;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .file-preview-media{
      width:100%;
      max-height:60vh;
      object-fit:contain;
      border-radius:14px;
      display:block;
      background:var(--surface-muted);
    }
    .file-preview-frame{
      width:100%;
      height:min(70vh, 680px);
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--surface);
    }
    .file-ref{
      color:var(--brand);
      font-weight:800;
      text-decoration:underline;
      text-underline-offset:2px;
      word-break:break-word;
    }

    .rich-editor{
      min-height:180px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      line-height:1.8;
      outline:none;
    }
    .rich-editor:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(95,99,242,.12);
    }

    .bottom-add-bar{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(720px, calc(100% - 48px));
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      padding:0;
      background:transparent;
      border:0;
      border-radius:0;
      box-shadow:none;
      z-index:50;
      pointer-events:auto;
      backdrop-filter:none;
    }

    .add-block-btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      width:min(680px, calc(100% - 64px));
      display:block;
      margin:0 auto;
      text-align:center;
    }

    .home-gear-btn{
      position:fixed;
      top:16px;
      right:16px;
      z-index:90;
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:var(--surface-soft);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      color:var(--ink);
      backdrop-filter: blur(12px);
    }

    dialog{
      width:min(620px, calc(100% - 24px));
      border:0;
      border-radius:26px;
      padding:0;
      box-shadow:var(--shadow);
      background:var(--surface-dialog);
      color:var(--ink);
    }
    dialog::backdrop{
      background:rgba(15,23,42,.42);
      backdrop-filter:blur(4px);
    }
    .dialog-body{padding:22px}
    .qr-box{
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      margin:10px auto 16px;
      border-radius:20px;
      background:var(--surface-muted);
      color:var(--muted);
      overflow:hidden;
    }
    .share-url{
      word-break:break-all;
      background:var(--surface-muted);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .tab{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:9px 14px;
      font-weight:800;
      color:var(--ink);
    }
    .tab.active{
      color:#fff;
      background:var(--accent);
      border-color:var(--accent);
    }
    .tab:disabled{opacity:.45;cursor:not-allowed}
    .id-pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      color:var(--ink);
    }
    .notice{
      background:color-mix(in srgb, var(--brand) 14%, var(--surface));
      color:color-mix(in srgb, var(--brand) 55%, var(--ink));
      border-radius:16px;
      padding:12px;
      line-height:1.7;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--muted);
      font-weight:800;
      font-size:.88rem;
    }
    .status-pill.good{color:#0f766e;background:#ecfdf5;border-color:#a7f3d0}
    .status-pill.warn{color:#92400e;background:#fffbeb;border-color:#fcd34d}
    .status-pill.bad{color:#991b1b;background:#fef2f2;border-color:#fecaca}

    .boot-wrap{
      display:grid;
      place-items:center;
      min-height:70vh;
    }
    .boot-card{
      width:min(640px,100%);
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:left;
    }
    .loader-line{
      display:flex;
      align-items:center;
      gap:14px;
      margin:18px 0 8px;
    }
    .loader{
      width:28px;
      height:28px;
      position:relative;
      display:inline-block;
    }
    .loader span{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--brand);
      left:50%;
      top:50%;
      transform-origin:-10px -10px;
      animation:orbit 1.1s linear infinite;
    }
    .loader span:nth-child(1){animation-delay:0s}
    .loader span:nth-child(2){animation-delay:.12s}
    .loader span:nth-child(3){animation-delay:.24s}
    .loader span:nth-child(4){animation-delay:.36s}
    @keyframes orbit{
      0%{transform:rotate(0deg) translate(10px) scale(1)}
      50%{transform:rotate(180deg) translate(10px) scale(.75);opacity:.65}
      100%{transform:rotate(360deg) translate(10px) scale(1)}
    }

    @media (max-width:820px){
      .hero,.editor-layout{grid-template-columns:1fr}
      .editor-top,.viewer-top{
        align-items:stretch;
        flex-direction:column;
      }
      .toolbar .btn{flex:1}
      .bottom-add-bar{
        border-radius:24px;
        align-items:center;
        flex-direction:column;
      }
      .home-gear-btn{
        top:12px;
        right:12px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>

  <dialog id="homeSettingsDialog">
    <div class="dialog-body">
      <h2>画面設定</h2>
      <p>下の「＋ 追加」バーの透過度を変えられます。今後ここに設定を増やしていけます。</p>

      <div class="field">
        <label for="addBarOpacityRange">＋追加の透過度：<span id="addBarOpacityValue">92%</span></label>
        <input id="addBarOpacityRange" type="range" min="0" max="100" step="1" />
      </div>

      <div class="toolbar">
        <button class="btn" id="homeSettingsCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="siteSettingsDialog">
    <div class="dialog-body">
      <h2>設定</h2>
      <p>ここでは公開範囲や共同編集Keyをまとめて管理できます。</p>

      <div class="field">
        <label>
          <input id="sitePublicToggle" type="checkbox" />
          公開する
        </label>
      </div>

      <div class="field">
        <label for="siteKeyInput">共同編集Key</label>
        <input id="siteKeyInput" placeholder="例：abc123" />
      </div>

      <div class="toolbar">
        <button class="btn" id="siteClearKeyBtn" type="button">Keyを消す</button>
        <button class="btn danger" id="siteDeleteBtn" type="button">サイト削除</button>
      </div>

      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="siteSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="siteSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="blockSettingsDialog">
    <div class="dialog-body">
      <h2>ブロック設定</h2>
      <p>表示方法を調整できます。ファイルブロックは名前とプレビュー表示をここで設定できます。</p>

      <div class="field">
        <label>
          <input id="blockVisibleToggle" type="checkbox" />
          表示する
        </label>
      </div>

      <div class="field hidden" id="blockWrapField">
        <label>
          <input id="blockWrapToggle" type="checkbox" />
          文字を折り返す
        </label>
      </div>

      <div class="field hidden" id="blockHeightField">
        <label>
          <input id="blockHeightToggle" type="checkbox" />
          縦の大きさを指定する
        </label>
      </div>

      <div class="field hidden" id="blockRowsField">
        <label for="blockRowsInput">行数</label>
        <input id="blockRowsInput" type="number" min="1" max="50" step="1" />
      </div>

      <div class="field hidden" id="blockFileNameField">
        <label for="blockFileNameInput">ファイル名</label>
        <input id="blockFileNameInput" type="text" placeholder="例：あ" />
      </div>

      <div class="field hidden" id="blockFilePreviewField">
        <label>
          <input id="blockFilePreviewToggle" type="checkbox" />
          ファイルをプレビュー
        </label>
      </div>

      <div class="toolbar">
        <button class="btn" id="blockSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="blockSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="addBlockDialog">
    <div class="dialog-body">
      <h2>ブロックを追加</h2>
      <p>追加する種類を選んでね。</p>
      <div class="toolbar" style="margin:14px 0 0">
        <button class="btn primary" id="addTextBlockBtn" type="button">テキスト</button>
        <button class="btn" id="addFileBlockBtn" type="button">ファイル</button>
        <button class="btn" id="addBlockCancelBtn" type="button">キャンセル</button>
      </div>
    </div>
  </dialog>

  <dialog id="mergeDialog">
    <div class="dialog-body">
      <h2>ID統合</h2>
      <p>現在の自分の表示IDを、別のIDにまとめます。今のサイト一覧表示もそのIDへ移ります。</p>

      <div class="field">
        <label for="mergeTargetInput">統合先ID</label>
        <input id="mergeTargetInput" placeholder="例：abcd1234" />
      </div>

      <div class="toolbar">
        <button class="btn" id="mergeCancelBtn" type="button">キャンセル</button>
        <button class="btn danger" id="mergeExecuteBtn" type="button">実行</button>
      </div>
    </div>
  </dialog>

  <dialog id="idDialog">
    <div class="dialog-body">
      <h2>自分のID</h2>
      <p>IDは作成したサイトの持ち主判定に使います。普段は伏せて表示します。</p>
      <button class="id-pill" id="ownerIdBtn" type="button">ID: ••••</button>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyIdBtn" type="button">IDコピー</button>
        <button class="btn danger" id="mergeIdBtn" type="button">ID統合</button>
        <button class="btn" id="closeIdBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-body">
      <h2>共有</h2>
      <div class="tabs" id="shareTabs">
        <button class="tab active" data-share-tab="view" type="button">閲覧用</button>
        <button class="tab" data-share-tab="edit" type="button">共同編集用</button>
      </div>
      <p class="notice" id="shareNotice">共有リンクを確認できます。</p>
      <div class="qr-box" id="qrBox">生成中…</div>
      <div class="share-url" id="shareUrl"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyShareBtn" type="button">URLコピー</button>
        <button class="btn primary" id="webShareBtn" type="button">共有する</button>
        <button class="btn" id="closeShareBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="filePreviewDialog">
    <div class="dialog-body">
      <h2 id="filePreviewTitle">ファイル</h2>
      <div class="notice" id="filePreviewMeta">内容を表示しています。</div>
      <div class="file-preview-shell" id="filePreviewBody" style="margin-top:14px"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn primary" id="filePreviewDownloadBtn" type="button">ダウンロード</button>
        <button class="btn" id="filePreviewCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc,
      doc,
      arrayUnion
    } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCYRh2cUMa4ecUmU9tpOT_ExrZcsYdVyHI",
      authDomain: "createwebsite-274dd.firebaseapp.com",
      projectId: "createwebsite-274dd",
      storageBucket: "createwebsite-274dd.firebasestorage.app",
      messagingSenderId: "646970295160",
      appId: "1:646970295160:web:a3f9b6f07c067a1782be8d",
      measurementId: "G-RN71HFCTGL"
    };

    const COLLECTION = 'websites';
    const OWNER_COOKIE = 'createwebsiteCreatorId';
    const ADD_BAR_OPACITY_KEY = 'createwebsite:addBarOpacity:v1';

    const appRoot = document.getElementById('app');
    const homeSettingsDialog = document.getElementById('homeSettingsDialog');
    const addBarOpacityRange = document.getElementById('addBarOpacityRange');
    const addBarOpacityValue = document.getElementById('addBarOpacityValue');
    const siteSettingsDialog = document.getElementById('siteSettingsDialog');
    const sitePublicToggle = document.getElementById('sitePublicToggle');
    const siteKeyInput = document.getElementById('siteKeyInput');
    const siteDeleteBtn = document.getElementById('siteDeleteBtn');
    const siteClearKeyBtn = document.getElementById('siteClearKeyBtn');
    const blockSettingsDialog = document.getElementById('blockSettingsDialog');
    const blockVisibleToggle = document.getElementById('blockVisibleToggle');
    const blockWrapToggle = document.getElementById('blockWrapToggle');
    const blockHeightToggle = document.getElementById('blockHeightToggle');
    const blockRowsField = document.getElementById('blockRowsField');
    const blockRowsInput = document.getElementById('blockRowsInput');
    const blockWrapField = document.getElementById('blockWrapField');
    const blockHeightField = document.getElementById('blockHeightField');
    const blockFileNameField = document.getElementById('blockFileNameField');

        const mime = String(payload.mimeType || '').toLowerCase();
        if (mime.startsWith('image/') && payload.dataUrl) {
          return `<img class="file-preview-media" src="${esc(payload.dataUrl)}" alt="${esc(fileName || payload.fileName || 'file')}">`;
        }
        if (mime.startsWith('video/') && payload.dataUrl) {
          return `<video class="file-preview-media" controls playsinline src="${esc(payload.dataUrl)}"></video>`;
        }
        if (mime.startsWith('audio/') && payload.dataUrl) {
          return `<audio class="file-preview-media" controls src="${esc(payload.dataUrl)}"></audio>`;
        }
        if ((mime.includes('pdf') || payload.fileName.toLowerCase().endsWith('.pdf')) && payload.dataUrl) {
          return `<iframe class="file-preview-frame" src="${esc(payload.dataUrl)}" title="${esc(fileName || payload.fileName || 'file')}"></iframe>`;
        }
        const text = safeTextFromPayload(payload);
        if (text) return `<pre class="file-preview-text">${esc(text)}</pre>`;
        if (payload.dataUrl) {
          return `<p style="margin:0">ファイル内容を表示できない形式だよ。ダウンロードして開いてね。</p>`;
        }
      }
      const text = safeTextFromPayload(payload);
      if (text) return `<pre class="file-preview-text">${esc(text)}</pre>`;
      return '<p style="margin:0">内容がありません。</p>';
    }

    function fileDownloadInfo(block) {
      const payload = normalizeFilePayload(block.file);
      const kind = filePayloadKind(payload);
      if (kind === 'upload') {
        return {
          name: fileNameWithExt(block.name || payload.fileName || 'file', fileExtFromMime(payload.mimeType || payload.fileName || '')),
          blob: payload.dataUrl ? dataUrlToBlob(payload.dataUrl) : new Blob([safeTextFromPayload(payload)], { type: payload.mimeType || 'application/octet-stream' }),
          openUrl: ''
        };
      }
      if (kind === 'html') {
        const html = payload.html || '';
        return {
          name: fileNameWithExt(block.name || 'file', 'html'),
          blob: new Blob([html], { type: 'text/html;charset=utf-8' }),
          openUrl: ''
        };
      }
      if (kind === 'url') {
        const href = safeUrlHref(payload.url || '');
        return {
          name: fileNameWithExt(block.name || 'file', 'url'),
          blob: new Blob([`${payload.url || ''}\n`], { type: 'text/plain;charset=utf-8' }),
          openUrl: href
        };
      }
      const text = safeTextFromPayload(payload);
      return {
        name: fileNameWithExt(block.name || 'file', 'txt'),
        blob: new Blob([text], { type: 'text/plain;charset=utf-8' }),
        openUrl: ''
      };
    }

    function openFilePreview(blockId) {
      if (!state.current || !blockId || !filePreviewDialog) return;
      const block = state.current.blocks.find((item) => item.id === blockId && item.type === 'file');
      if (!block) return;
      const payload = normalizeFilePayload(block.file);
      const kind = filePayloadKind(payload);

      state.previewFileBlockId = blockId;
      filePreviewTitle.textContent = block.name || 'ファイル';
      filePreviewMeta.textContent = kind === 'upload'
        ? `${payload.fileName || block.name || 'ファイル'} / ${payload.mimeType || 'unknown'}`
        : kind === 'html'
          ? 'HTMLとして表示しています。'
          : kind === 'url'
            ? 'URLとして表示しています。'
            : 'テキストとして表示しています。';
      filePreviewBody.innerHTML = renderFilePreviewContent(payload, block.name || payload.fileName || '');
      const info = fileDownloadInfo(block);
      filePreviewDownloadBtn.textContent = kind === 'url' ? 'URLを開く' : 'ダウンロード';
      filePreviewDownloadBtn.dataset.blockId = blockId;
      filePreviewDownloadBtn.dataset.openUrl = info.openUrl || '';
      if (!filePreviewDialog.open) filePreviewDialog.showModal();
    }

    function closeFilePreview() {
      state.previewFileBlockId = null;
      if (filePreviewDialog?.open) filePreviewDialog.close();
    }

    async function readFileFromClipboard() {
      if (!navigator.clipboard || !navigator.clipboard.read) return null;
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          if (item.types.includes('text/html')) {
            const blob = await item.getType('text/html');
            return { kind: 'html', html: await blob.text() };
          }
          if (item.types.includes('text/plain')) {
            const blob = await item.getType('text/plain');
            const text = await blob.text();
            return { kind: isProbablyUrl(text) ? 'url' : looksLikeHtml(text) ? 'html' : 'text', ...(isProbablyUrl(text) ? { url: text.trim() } : looksLikeHtml(text) ? { html: text } : { text }) };
          }
          for (const type of item.types) {
            if (!type.startsWith('image/') && !type.startsWith('audio/') && !type.startsWith('video/') && !type.startsWith('application/')) continue;
            try {
              const blob = await item.getType(type);
              const ext = fileExtFromMime(type);
              const fileName = `clipboard.${ext}`;
              return {
                kind: 'upload',
                file: new File([blob], fileName, { type })
              };
            } catch {}
          }
        }
      } catch {}
      return null;
    }

    async function readTextClipboard() {
      try {
        if (navigator.clipboard?.readText) return await navigator.clipboard.readText();
      } catch {}
      return null;
    }

    async function getPastedPayload() {
      const fileClip = await readFileFromClipboard();
      if (fileClip?.kind === 'upload' && fileClip.file) return fileClip;
      const text = await readTextClipboard();
      if (typeof text === 'string' && text.length) {
        if (looksLikeHtml(text)) return { kind: 'html', html: text };
        if (isProbablyUrl(text)) return { kind: 'url', url: text.trim() };
        return { kind: 'text', text };
      }
      return null;
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('ファイル読み込みに失敗したよ'));
        reader.readAsDataURL(file);
      });
    }

    async function normalizeUploadedFile(file) {
      const dataUrl = await fileToDataUrl(file);
      let text = '';
      let html = '';
      const type = String(file.type || '').toLowerCase();
      if (type.startsWith('text/') || type.includes('json') || type.includes('xml') || /\.(txt|html?|json|xml|md|csv|js|css|svg)$/i.test(file.name || '')) {
        try {
          text = await file.text();
          if (looksLikeHtml(text)) html = text;
        } catch {}
      }
      return {
        kind: 'upload',
        fileName: file.name || 'file',
        mimeType: file.type || '',
        dataUrl,
        text,
        html,
        url: '',
        size: Number(file.size || 0) || 0
      };
    }

    async function setFileBlockFromFile(blockId, file) {
      if (!state.current || !blockId || !file) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId && b.type === 'file');
      if (idx < 0) return;
      const payload = await normalizeUploadedFile(file);
      state.current.blocks[idx].file = payload;
      if (!String(state.current.blocks[idx].name || '').trim()) state.current.blocks[idx].name = file.name || 'ファイル';
      state.currentSaved = false;
      renderApp();
    }

    async function setFileBlockFromClipboard(blockId) {
      if (!state.current || !blockId) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId && b.type === 'file');
      if (idx < 0) return;
      const payload = await getPastedPayload();
      if (!payload) {
        alert('クリップボードから内容を取れなかったよ');
        return;
      }
      if (payload.kind === 'upload' && payload.file) {
        const normalized = await normalizeUploadedFile(payload.file);
        state.current.blocks[idx].file = normalized;
        if (!String(state.current.blocks[idx].name || '').trim()) state.current.blocks[idx].name = payload.file.name || 'ファイル';
      } else if (payload.kind === 'html') {
        state.current.blocks[idx].file = normalizeFilePayload({ kind: 'html', html: sanitizePreviewHtml(payload.html || ''), mimeType: 'text/html', fileName: state.current.blocks[idx].name || 'HTML' });
      } else if (payload.kind === 'url') {
        state.current.blocks[idx].file = normalizeFilePayload({ kind: 'url', url: String(payload.url || '').trim(), mimeType: 'text/uri-list', fileName: state.current.blocks[idx].name || 'URL' });
      } else {
        state.current.blocks[idx].file = normalizeFilePayload({ kind: 'text', text: String(payload.text || ''), mimeType: 'text/plain', fileName: state.current.blocks[idx].name || 'テキスト' });
      }
      state.currentSaved = false;
      renderApp();
    }

    function openFileBlockById(blockId) {
      const block = state.current?.blocks?.find((item) => item.id === blockId && item.type === 'file');
      if (!block) return;
      const payload = normalizeFilePayload(block.file);
      const kind = filePayloadKind(payload);
      if (block.preview || kind === 'html') {
        openFilePreview(block.id);
        return;
      }
      if (kind === 'url') {
        const href = safeUrlHref(payload.url || '');
        if (href) window.open(href, '_blank', 'noopener,noreferrer');
        else openFilePreview(block.id);
        return;
      }
      const info = fileDownloadInfo(block);
      downloadBlob(info.blob, info.name);
    }

    function openReferencedFile(name) {
      const block = findFileBlockByName(name);
      if (!block) {

      openFileBlockById(block.id);
    }

    function isMine(site) {
      return Boolean(site && site.ownerUid && site.ownerUid === state.uid);
    }

    function isCollaborator(site) {
      return Boolean(site && Array.isArray(site.collaborators) && site.collaborators.includes(state.uid));
    }

    function isCurrentCreator() {
      return Boolean(state.current && state.current.creatorId === creatorId());
    }

    function canEditCurrent() {
      const site = state.current;
      if (!site) return false;
      if (site.key && state.currentAccess === 'key') return true;
      return isMine(site) || isCollaborator(site);
    }

    function currentShareUrl() {
      if (!state.currentSaved || !state.current) return '';
      const key = state.shareMode === 'edit' && state.current.key ? state.current.key : null;
      return siteUrl(state.current.siteId, key);

    function siteSearchText(site) {
      const blockText = (site.blocks || [])
        .filter((b) => b.visible !== false)
        .map((b) => {
          if (b.type === 'file') {
            const payload = normalizeFilePayload(b.file);
            return [b.name || '', payload.fileName || '', payload.text || '', payload.html || '', payload.url || ''].join(' ');
          }
          return [b.source || '', String(b.html || '').replace(/<[^>]+>/g, ' ')].join(' ');
        })
        .join(' ');
      return `${site.title || ''} ${blockText}`.toLowerCase();
    }

    function filterSites(list, query) {
      const q = String(query || '').trim().toLowerCase();
      if (!q) return list.slice();
      const terms = q.split(/\s+/).filter(Boolean);
      return list.filter((site) => {
        const blob = siteSearchText(site);
        return terms.every((term) => blob.includes(term));
      });
    }

    function mineSites() {
      return state.homeSites
        .filter((site) => isMine(site) || isCollaborator(site))
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function publicSites() {
      return state.homeSites
        .filter((site) => site.isPublic !== false)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

              <div class="toolbar" style="justify-content:flex-start;margin-top:8px">
                <button class="btn small" data-file-action="upload" data-block-id="${esc(normalized.id)}" type="button">アップロード</button>
                <button class="btn small" data-file-action="paste" data-block-id="${esc(normalized.id)}" type="button">貼り付け</button>
                <button class="btn small primary" data-file-action="open" data-block-id="${esc(normalized.id)}" type="button">${esc(actionLabel)}</button>
              </div>
              <div class="file-block-body" style="margin-top:12px">
                ${summary || '<div class="empty" style="padding:18px 10px">まだ内容がありません。</div>'}
              </div>
            </article>
          `;
        }

        const source = typeof normalized.source === 'string' ? normalized.source : htmlToPlainText(normalized.html || '');
        const preview = normalized.visible
          ? `<textarea class="editor-source" data-editor-block="${esc(normalized.id)}" spellcheck="false" wrap="${normalized.wrap === false ? 'off' : 'soft'}" style="${blockHeightStyle(normalized)}">${esc(source)}</textarea>`
          : `<div class="empty" style="padding:16px 10px">このブロックは非表示です。</div>`;

        return `
          <article class="block${hiddenClass}${moveClass}" data-editor-block-card="${esc(normalized.id)}">
            <div class="block-head">
              <div style="color:var(--muted);font-weight:900">テキスト ${index + 1}${normalized.visible === false ? ' / 非表示' : ''}</div>
              <button class="btn small" data-block-action="settings" data-block-id="${esc(normalized.id)}" type="button">⚙️</button>
            </div>
            ${preview}
          </article>
        `;
      }).join('');

      const backLabel = state.currentSaved ? '← 戻る' : '← 一覧へ';

      appRoot.innerHTML = `
        <div class="editor-top">
          <div>
            <button class="btn ghost" id="backBtn" type="button">${backLabel}</button>
            <h2 id="editorHeading">${esc(site?.title || '無題のサイト')}</h2>
          </div>
          <div class="toolbar">
            ${canShowSiteSettings ? '<button class="btn" id="siteSettingsBtn" type="button">⚙️ 設定</button>' : ''}
            <button class="btn" id="shareBtn" type="button">共有</button>
            <button class="btn primary" id="saveBtn" type="button">保存</button>
          </div>
        </div>

        <div class="editor-layout">
          <section class="panel">
            <h3>サイト</h3>
            <div class="field">
              <label for="titleInput">サイトタイトル</label>
              <input id="titleInput" placeholder="例：自己紹介" value="${esc(site?.title || '')}">
            </div>
          </section>

          <section class="panel">
            <div class="toolbar" style="justify-content:space-between;margin-bottom:12px">
              <h3>本文</h3>
            </div>
            <div class="canvas" id="blockCanvas">${blocks || '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>'}</div>
          </section>
        </div>

        <div class="bottom-add-bar" id="bottomAddBar">
          <button class="add-block-btn" id="addBlockBtn" type="button" style="${addBlockButtonStyle()}">＋ 追加</button>
        </div>
      `;
    }

    function drawMissingScreen(message = 'このリンクのサイトは見つかりませんでした。') {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>サイトが見つかりません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">${esc(message)}</div>
          </div>
        </div>
      `;
    }

    function drawDeniedScreen() {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>アクセスできません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。</div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      if (state.mode === 'loading') drawLoadingScreen();
      else if (state.mode === 'home') drawHomeScreen();
      else if (state.mode === 'viewer') drawViewerScreen();
      else if (state.mode === 'editor') drawEditorScreen();
      else if (state.mode === 'missing') drawMissingScreen();
      else if (state.mode === 'denied') drawDeniedScreen();
      else if (state.mode === 'boot-failed') drawBootErrorScreen();
    }

    function setCurrentSite(site, saved = true) {
      state.current = site ? structuredClone(normalizeSite(site.siteId, site)) : null;
      if (state.current) {
        state.current.blocks = (state.current.blocks || []).map(normalizeBlock);
      }
      state.currentSaved = !!saved;
      state.editingBlockId = null;
      state.moveBlockId = null;
    }

    function createDraftSite() {
      const id = uid8();
      return normalizeSite(id, {
        siteId: id,
        title: '無題のサイト',
        ownerUid: state.uid,
        creatorId: creatorId(),
        key: '',
        blocks: [
          { id: uid8(), source: "こんにちは\n太字も使えるよ\n#ff0000赤文字", html: "こんにちは<br>太字も使えるよ<br><span style=\"color:#ff0000\">赤文字</span>", visible: true, wrap: true, heightEnabled: false, rows: 3 }
        ],
        isPublic: true,
        collaborative: false,
        collaborators: [],
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    function openNewDraft() {
      if (!state.ready) return;
      const draft = createDraftSite();
      openEditorScreen(draft, false, 'owner', false);
      location.hash = '#/create';
    }

    function openEditorScreen(site, saved = true, access = 'view', sync = true) {
      setCurrentSite(site, saved);
      state.currentAccess = access;
      state.mode = 'editor';
      renderApp();
      if (sync) syncCurrentUrl();
      focusBlockByIdIfNeeded();
    }

    function openViewerScreen(site, access = 'view', sync = true) {
      setCurrentSite(site, true);
      state.currentAccess = access;
      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function focusBlockByIdIfNeeded() {
      if (!state.editingBlockId) return;
      const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(state.editingBlockId)}"]`);
      if (!el) return;
      requestAnimationFrame(() => {
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function placeCaretAtEnd(el) {
      if (!el) return;
      const selection = window.getSelection();
      if (!selection) return;
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function openSiteSettingsModal() {
      if (!state.current || !isCurrentCreator()) return;
      sitePublicToggle.checked = state.current.isPublic !== false;
      siteKeyInput.value = state.current.key || '';
      siteDeleteBtn.classList.toggle('hidden', !isCurrentCreator());
      siteClearKeyBtn.classList.toggle('hidden', !isCurrentCreator());
      if (!siteSettingsDialog.open) siteSettingsDialog.showModal();
    }

    function openHomeSettingsModal() {
      updateAddBarOpacityLabel();
      if (!homeSettingsDialog.open) homeSettingsDialog.showModal();
    }

    function openMergeModal() {
      mergeTargetInput.value = '';
      if (!mergeDialog.open) mergeDialog.showModal();
      requestAnimationFrame(() => mergeTargetInput.focus());
    }

    function showShareModal() {
      if (!state.current) {
        alert('先にサイトを開いてください。');
        return;
      }
      if (!state.currentSaved) {
        alert('先に保存してね。');
        return;
      }

      state.shareMode = 'view';
      shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.shareTab === 'view'));
      const editBtn = shareTabs.querySelector('[data-share-tab="edit"]');
      if (editBtn) editBtn.disabled = !state.current.key;
      syncShareDialog();
      if (!shareDialog.open) shareDialog.showModal();
    }

    function syncShareDialog() {
      const url = currentShareUrl();
      shareUrlEl.textContent = url || '保存後に共有リンクが出るよ';

      if (!state.current) {
        shareNoticeEl.textContent = '先にサイトを開いてください。';
      } else if (!state.currentSaved) {
        shareNoticeEl.textContent = '先に保存してね。';
      } else if (state.shareMode === 'edit' && !state.current.key) {
        shareNoticeEl.textContent = '共同編集Keyが未設定です。';
      } else if (state.shareMode === 'edit') {
        shareNoticeEl.textContent = 'このリンクを開くと共同編集者として追加されます。';
      } else {
        shareNoticeEl.textContent = 'このリンクは閲覧用です。';
      }

      qrBox.innerHTML = '生成中…';
      setTimeout(() => {
        qrBox.innerHTML = '';
        if (window.QRCode && url) {
          new QRCode(qrBox, { text: url, width: 200, height: 200 });
        } else {
          qrBox.textContent = 'QRライブラリを読み込めませんでした';
        }
      }, 120);
    }

    async function loadAllSites() {
      if (!state.db) return [];
      const snapshot = await getDocs(collection(state.db, COLLECTION));
      state.homeSites = snapshot.docs.map((d) => normalizeSite(d.id, d.data() || {}));
      return state.homeSites;
    }

    async function loadSiteById(siteId) {
      if (!state.db || !siteId) return null;
      const snap = await getDoc(doc(state.db, COLLECTION, siteId));
      if (!snap.exists()) return null;
      const site = normalizeSite(snap.id, snap.data() || {});
      site.blocks = (site.blocks || []).map(normalizeBlock);
      return site;
    }

    function showMissingSite(message) {
      state.current = {
        siteId: 'missing',
        title: 'サイトが見つかりません',
        blocks: [{ id: 'missing', source: '', html: message || 'このリンクのサイトは見つかりませんでした。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'missing';
      renderApp();
    }

    function showDeniedSite() {
      state.current = {
        siteId: 'denied',
        title: 'アクセスできません',
        blocks: [{ id: 'denied', source: '', html: 'このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'denied';
      renderApp();
    }

    async function saveHomeSettings() {
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(state.addBarOpacity));
      if (homeSettingsDialog.open) homeSettingsDialog.close();
      if (state.mode === 'editor') renderApp();
    }

    async function saveSiteSettings() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      state.current.isPublic = !!sitePublicToggle.checked;
      state.current.key = String(siteKeyInput.value || '').trim();
      state.current.collaborative = Boolean(state.current.key);
      state.current.updatedAt = Date.now();

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        isPublic: state.current.isPublic,
        key: state.current.key,
        collaborative: state.current.collaborative,
        updatedAt: state.current.updatedAt
      }, { merge: true });

      await loadAllSites();
      if (siteSettingsDialog.open) siteSettingsDialog.close();
      renderApp();
      syncCurrentUrl();
    }

    async function clearSiteKey() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      siteKeyInput.value = '';
      state.current.key = '';
      state.current.collaborative = false;
      state.current.updatedAt = Date.now();

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        key: '',
        collaborative: false,
        updatedAt: state.current.updatedAt
      }, { merge: true });

      await loadAllSites();
      renderApp();
      syncCurrentUrl();
    }

    async function deleteCurrentSite() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      const ok = confirm('このサイトを削除しますか？');
      if (!ok) return;

      await deleteDoc(doc(state.db, COLLECTION, state.current.siteId));
      state.current = null;
      state.currentSaved = false;
      state.currentAccess = 'view';
      location.hash = '';
      state.mode = 'home';
      await loadAllSites();
      renderApp();
    }

    function saveBlockSettings() {
      if (!state.current || !state.db || !state.pendingBlockSettingsId) return;
      const target = state.current.blocks.find((b) => b.id === state.pendingBlockSettingsId);
      if (!target) return;

      target.visible = !!blockVisibleToggle.checked;
      if (target.type === 'file') {
        target.name = String(blockFileNameInput.value || '').trim() || 'ファイル';
        target.preview = !!blockFilePreviewToggle.checked;
      } else {
        target.wrap = !!blockWrapToggle.checked;
        target.heightEnabled = !!blockHeightToggle.checked;
        target.rows = target.heightEnabled ? Math.max(1, Math.min(50, Number(blockRowsInput.value || 3) || 3)) : (target.rows || 3);
      }
      state.current.updatedAt = Date.now();

      setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        blocks: state.current.blocks.map((b) => b.type === 'file'
          ? serializeFileBlock(b)
          : serializeTextBlock(b)
        ),
        updatedAt: state.current.updatedAt
      }, { merge: true }).then(async () => {
        await loadAllSites();
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        renderApp();
      });
    }

    async function executeIdMerge() {
() {
      if (!state.db) return;

      const target = String(mergeTargetInput.value || '').trim();
      if (!target) {
        alert('統合先IDを入れてね');
        return;
      }

      const oldId = creatorId();
      if (target === oldId) {
        alert('同じIDだよ');
        return;
      }

      const snapshot = await getDocs(collection(state.db, COLLECTION));
      const matches = snapshot.docs.filter((d) => {
        const data = d.data() || {};
        return data.creatorId === oldId;
      });

      if (!matches.length) {
        setCreatorId(target);
        await loadAllSites();
        renderApp();
        if (mergeDialog.open) mergeDialog.close();
        return;
      }

      await Promise.all(matches.map((d) => setDoc(doc(state.db, COLLECTION, d.id), {
        creatorId: target
      }, { merge: true })));

      setCreatorId(target);

      if (state.current && state.current.creatorId === oldId) {
        state.current.creatorId = target;
      }

      await loadAllSites();
      renderApp();
      if (mergeDialog.open) mergeDialog.close();
      alert('IDを統合しました。');
    }

    async function saveCurrentSite() {
      if (!state.current || !state.db) {
        alert('先にサイトを作ってね');
        return;
      }

      const titleInput = document.getElementById('titleInput');
      const title = String(titleInput?.value || '').trim() || '無題のサイト';

      state.current.title = title;
      state.current.updatedAt = Date.now();
      state.current.ownerUid = state.current.ownerUid || state.uid;
      state.current.creatorId = state.current.creatorId || creatorId();
      state.current.blocks = (state.current.blocks || []).map((block) => normalizeBlock(block));

      const payload = {
        ...state.current,
        blocks: state.current.blocks.map((block) => block.type === 'file' ? serializeFileBlock(block) : serializeTextBlock(block)),
        collaborators: Array.isArray(state.current.collaborators) ? state.current.collaborators : [],
        updatedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), payload, { merge: true });

      state.currentSaved = true;
      state.current = normalizeSite(state.current.siteId, payload);
      state.current.blocks = state.current.blocks.map(normalizeBlock);
      await loadAllSites();
      state.mode = 'editor';
      renderApp();
      syncCurrentUrl();
      alert('保存しました。');
    }

    async function openSiteById(siteId, key = null, sync = true) {
(siteId, key = null, sync = true) {
      if (!state.ready) return;

      const site = await loadSiteById(siteId);
      if (!site) {
        showMissingSite();
        return;
      }

      if (key && site.key && key === site.key) {
        try {
          await updateDoc(doc(state.db, COLLECTION, site.siteId), {
            collaborators: arrayUnion(state.uid),
            collaborative: true
          });
          site.collaborators = Array.from(new Set([...(site.collaborators || []), state.uid]));
          site.collaborative = true;
          state.currentAccess = 'key';
        } catch (error) {
          console.error(error);
          state.currentAccess = 'key';
          alert('共同編集者の登録に失敗しました。Firestoreルールを確認してね。');
        }
      } else if (isMine(site)) {
        state.currentAccess = 'owner';
      } else if (isCollaborator(site)) {
        state.currentAccess = 'collaborator';
      } else {
        state.currentAccess = 'view';
      }

      state.current = site;
      state.currentSaved = true;

      if (site.isPublic === false && !canEditCurrent()) {
        showDeniedSite();
        return;
      }

      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function reloadHomeSites() {
      loadAllSites().then(() => {
        if (state.mode === 'home') renderApp();
      });
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      longPressCandidateId = null;
    }

    function handleLongPressCandidate(blockId) {
      if (!blockId || !state.current || state.mode !== 'editor') return;
      if (state.moveBlockId === blockId) return;
      state.moveBlockId = blockId;
      renderApp();
    }

    function moveBlockBefore(fromId, toId) {
      if (!state.current || fromId === toId) return;
      const fromIndex = state.current.blocks.findIndex((b) => b.id === fromId);
      const toIndex = state.current.blocks.findIndex((b) => b.id === toId);
      if (fromIndex < 0 || toIndex < 0) return;

      const [item] = state.current.blocks.splice(fromIndex, 1);
      const adjustedToIndex = fromIndex < toIndex ? toIndex - 1 : toIndex;
      state.current.blocks.splice(adjustedToIndex, 0, item);
      state.currentSaved = false;
      state.moveBlockId = null;
      renderApp();
    }

    function focusBlockEditor(blockId) {
      requestAnimationFrame(() => {
        const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(blockId)}"]`);
        if (!el) return;
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function addNewBlock() {
      openAddBlockDialog();
    }

    function updateEditableBlockFromDom(blockId, element) {
      if (!state.current || !blockId || !element) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId && b.type === 'text');
      if (idx < 0) return;
      const raw = typeof element.value === 'string' ? element.value : String(element.textContent || '');
      state.current.blocks[idx].source = raw.replace(/\r/g, '');
      state.current.blocks[idx].html = renderTextBlockHtml(state.current.blocks[idx].source);
      state.currentSaved = false;
    }

    function handleClick(target) {
      const openSiteBtn = target.closest('[data-open-site]');
      if (openSiteBtn) {
        const siteId = openSiteBtn.getAttribute('data-open-site');
        if (siteId) openSiteById(siteId, null, true);
        return;
      }

      const fileRefBtn = target.closest('[data-file-ref]');
      if (fileRefBtn) {
        const name = fileRefBtn.getAttribute('data-file-ref') || '';
        openReferencedFile(name);
        return;
      }

      const fileOpenBtn = target.closest('[data-file-open]');
      if (fileOpenBtn) {
        const blockId = fileOpenBtn.getAttribute('data-file-open') || '';
        openFileBlockById(blockId);
        return;
      }

      const blockActionBtn = target.closest('[data-block-action]');
      if (blockActionBtn && state.mode === 'editor') {
        const action = blockActionBtn.getAttribute('data-block-action');
        const blockId = blockActionBtn.getAttribute('data-block-id');
        if (!state.current || !blockId) return;

        if (action === 'settings') {
          openBlockSettingsModal(blockId);
        }
        return;
      }

      const editorCard = target.closest('[data-editor-block-card]');
      if (state.mode === 'editor' && editorCard) {
        const blockId = editorCard.getAttribute('data-editor-block-card');

        if (state.moveBlockId) {
          if (state.moveBlockId === blockId) {
            state.moveBlockId = null;
            renderApp();
            return;
          }
          moveBlockBefore(state.moveBlockId, blockId);
          return;
        }
      }

      const fileActionBtn = target.closest('[data-file-action]');
      if (fileActionBtn && state.mode === 'editor') {
        const action = fileActionBtn.getAttribute('data-file-action');
        const blockId = fileActionBtn.getAttribute('data-block-id');
        if (!blockId) return;
        if (action === 'upload') {
          const input = document.createElement('input');
          input.type = 'file';
          input.style.display = 'none';
          document.body.appendChild(input);
          input.addEventListener('change', async () => {
            const file = input.files && input.files[0] ? input.files[0] : null;
            input.remove();
            if (!file) return;
            await setFileBlockFromFile(blockId, file);
          }, { once: true });
          input.click();
          return;
        }
        if (action === 'paste') {
          setFileBlockFromClipboard(blockId);
          return;
        }
        if (action === 'open') {
          openFileBlockById(blockId);
          return;
        }
      }

      if (target.closest('#newSiteBtn')) {
        openNewDraft();
        return;
      }

      if (target.closest('#showIdBtn')) {
        ownerIdBtn.textContent = 'ID: ••••';
        if (!idDialog.open) idDialog.showModal();
        return;
      }

      if (target.closest('#homeSettingsBtn')) {
        openHomeSettingsModal();
        return;
      }

      if (target.closest('#viewerHomeBtn') || target.closest('#backBtn') || target.closest('#bootHomeBtn')) {
        if (state.mode === 'editor' && !state.currentSaved) {
          if (!confirm('保存していない内容があるけど戻る？')) return;
        }
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        location.hash = '';
        state.mode = 'home';
        renderApp();
        reloadHomeSites();
        return;
      }

      if (target.closest('#bootRetryBtn')) {
        location.reload();
        return;
      }

      if (target.closest('#viewerEditBtn')) {
        if (!state.current) return;
        if (canEditCurrent()) {
          state.mode = 'editor';
          renderApp();
          syncCurrentUrl();
        } else {
          const entered = prompt('Key を入力して編集', '');
          if (entered === null) return;
          if ((entered || '').trim() === (state.current.key || '')) {
            state.currentAccess = 'key';
            state.mode = 'editor';
            renderApp();
            syncCurrentUrl();
          } else {
            alert('Key が違うよ');
          }
        }
        return;
      }

      if (target.closest('#siteSettingsBtn')) {
        if (!canEditCurrent() || !isCurrentCreator()) {
          alert('作成者だけが設定できます。');
          return;
        }
        openSiteSettingsModal();
        return;
      }

      if (target.closest('#viewerShareBtn') || target.closest('#shareBtn')) {
        showShareModal();
        return;
      }

      if (target.closest('#saveBtn')) {
        saveCurrentSite();
        return;
      }

      if (target.closest('#addBlockBtn')) {
        openAddBlockDialog();
        return;
      }

      if (target.closest('#addTextBlockBtn')) {
        closeAddBlockDialog();
        addBlockByType('text');
        return;
      }

      if (target.closest('#addFileBlockBtn')) {
        closeAddBlockDialog();
        addBlockByType('file');
        return;
      }

      if (target.closest('#addBlockCancelBtn')) {
        closeAddBlockDialog();
        return;
      }

      if (target.closest('#siteSettingsCancelBtn')) {
        if (siteSettingsDialog.open) siteSettingsDialog.close();
        return;
      }

      if (target.closest('#siteSettingsSaveBtn')) {
        saveSiteSettings();
        return;
      }

      if (target.closest('#siteClearKeyBtn')) {
        clearSiteKey();
        return;
      }

      if (target.closest('#siteDeleteBtn')) {
        deleteCurrentSite();
        return;
      }

      if (target.closest('#blockSettingsCancelBtn')) {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        return;
      }

      if (target.closest('#blockSettingsSaveBtn')) {
        saveBlockSettings();
        return;
      }

      if (target.closest('#homeSettingsCloseBtn')) {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
        return;
      }

      if (target.closest('#copyIdBtn')) {
        navigator.clipboard.writeText(creatorId()).then(() => alert('IDをコピーしました')).catch(() => prompt('コピーできない場合はこれを使ってね', creatorId()));
        return;
      }

      if (target.closest('#closeIdBtn')) {
        if (idDialog.open) idDialog.close();
        return;
      }

      if (target.closest('#mergeIdBtn')) {
        openMergeModal();
        return;
      }

      if (target.closest('#mergeCancelBtn')) {
        if (mergeDialog.open) mergeDialog.close();
        return;
      }

      if (target.closest('#mergeExecuteBtn')) {
        executeIdMerge();
        return;
      }

      if (target.closest('#closeShareBtn')) {
        if (shareDialog.open) shareDialog.close();
        return;
      }

      if (target.closest('#copyShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        navigator.clipboard.writeText(url).then(() => alert('コピーしました')).catch(() => prompt('コピーできないときはこれを使ってね', url));
        return;
      }

      if (target.closest('#webShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        if (navigator.share) {
          navigator.share({ title: state.current?.title || 'CreateWebsite', url }).catch(() => {});
        } else {
          alert('このブラウザはWeb Share APIに対応していません。');
        }
        return;
      }

      if (target.closest('#filePreviewCloseBtn')) {
        closeFilePreview();
        return;
      }

      if (target.closest('#filePreviewDownloadBtn')) {
        const blockId = filePreviewDownloadBtn?.dataset.blockId || state.previewFileBlockId;
        const block = state.current?.blocks?.find((item) => item.id === blockId && item.type === 'file');
        if (!block) return;
        const payload = normalizeFilePayload(block.file);
        if (filePreviewDownloadBtn.dataset.openUrl) {
          window.open(filePreviewDownloadBtn.dataset.openUrl, '_blank', 'noopener,noreferrer');
          return;
        }
        const info = fileDownloadInfo(block);
        downloadBlob(info.blob, info.name);
        return;
      }

      const tabBtn = target.closest('[data-home-tab]');
      if (tabBtn) {
        state.homeTab = tabBtn.getAttribute('data-home-tab') || 'mine';
        renderApp();
        return;
      }

      const shareTab = target.closest('[data-share-tab]');
      if (shareTab) {
        if (shareTab.disabled) return;
        state.shareMode = shareTab.getAttribute('data-share-tab') || 'view';
        shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === shareTab));
        syncShareDialog();
        return;
      }

      if (target.closest('#homeRefreshBtn')) {
        reloadHomeSites();
      }
    }

    function handleInput(event) {
      const target = event.target;
      if (!target) return;

      if (target.id === 'homeSearchInput') {
        state.homeSearch = target.value;
        renderApp();
        return;
      }

      if (target.id === 'addBarOpacityRange') {
        persistAddBarOpacity(Number(target.value) / 100);
        return;
      }

      if (target.id === 'titleInput' && state.current) {
        state.current.title = target.value;
        const heading = document.getElementById('editorHeading');
        if (heading) heading.textContent = target.value || '無題のサイト';
        state.currentSaved = false;
        return;
      }

      if (target.id === 'sitePublicToggle' && state.current) {
        state.current.isPublic = !!target.checked;
        state.currentSaved = false;
        return;
      }

      if (target.id === 'siteKeyInput' && state.current) {
        state.current.key = target.value;
        state.current.collaborative = Boolean(String(target.value || '').trim());
        state.currentSaved = false;
        return;
      }

      if (target.id === 'blockHeightToggle') {
        blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
        return;
      }

      if (target.id === 'blockRowsInput') {
        return;
      }

      if (target.id === 'blockFileNameInput' && state.current) {
        const block = state.current.blocks.find((item) => item.id === state.pendingBlockSettingsId && item.type === 'file');
        if (block) {
          block.name = target.value;
          state.currentSaved = false;
        }
        return;
      }

      if (target.id === 'blockFilePreviewToggle' && state.current) {
        const block = state.current.blocks.find((item) => item.id === state.pendingBlockSettingsId && item.type === 'file');
        if (block) {
          block.preview = !!target.checked;
          state.currentSaved = false;
        }
        return;
      }

      const editorBlock = target.closest('[data-editor-block]');
      if (state.mode === 'editor' && editorBlock) {
        const blockId = editorBlock.getAttribute('data-editor-block');
        updateEditableBlockFromDom(blockId, editorBlock);
      }
    }

    function handlePointerDown(event) {
      if (state.mode !== 'editor') return;
      if (event.target.closest('input,textarea,button,select,a,label')) return;
      const card = event.target.closest('[data-editor-block-card]');
      if (!card) return;
      if (event.target.closest('[data-block-action]') || event.target.closest('[data-file-action]')) return;

      const blockId = card.getAttribute('data-editor-block-card');
      if (!blockId) return;

      clearLongPressTimer();
      longPressCandidateId = blockId;
      longPressTimer = setTimeout(() => {
        handleLongPressCandidate(blockId);
      }, 500);
    }

    function handlePointerUp() {
      clearLongPressTimer();
    }

    function handleKeyDown(event) {
(event) {
      if (state.mode !== 'editor') return;
      const card = event.target.closest('[data-editor-block-card]');
      if (!card) return;
      if (event.target.closest('[data-block-action]')) return;

      const blockId = card.getAttribute('data-editor-block-card');
      if (!blockId) return;

      clearLongPressTimer();
      longPressCandidateId = blockId;
      longPressTimer = setTimeout(() => {
        handleLongPressCandidate(blockId);
      }, 500);
    }

    function handlePointerUp() {
      clearLongPressTimer();
    }

    function handleKeyDown(event) {
      if (event.key === 'Escape' && state.moveBlockId) {
        state.moveBlockId = null;
        renderApp();
      }
    }

    blockSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
      }
    });

    homeSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
      }
    });

    window.addEventListener('hashchange', async () => {
      const route = parseRoute();
      if (!state.ready) return;

      if (route.name === 'home') {
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        state.mode = 'home';
        renderApp();
        return;
      }

      if (route.name === 'create') {
        openNewDraft();
        return;
      }

      if (route.name === 'site') {
        await openSiteById(route.siteId, route.key || null, false);
      }
    });

    async function initFirebase() {
      if (!firebaseConfig.apiKey || !firebaseConfig.authDomain || !firebaseConfig.projectId || !firebaseConfig.appId) {
        state.ready = false;
        state.authError = 'Firebase設定がありません。firebaseConfig を入れてください。';
        state.mode = 'boot-failed';
        renderApp();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        state.db = getFirestore(app);
        const auth = getAuth(app);

        const cred = await signInAnonymously(auth);
        state.uid = cred.user?.uid || auth.currentUser?.uid || '';
        state.ready = true;
        state.authError = '';

        await loadAllSites();

        const route = parseRoute();
        if (route.name === 'site') {
          await openSiteById(route.siteId, route.key || null, false);
        } else if (route.name === 'create') {
          openNewDraft();
        } else {
          state.mode = 'home';
          renderApp();
        }
      } catch (error) {
        console.error(error);
        const code = error?.code || '';
        if (code === 'auth/configuration-not-found') {
          state.authError = 'Firebase Authentication の匿名ログインが未設定か、Auth 側の設定が足りません。';
        } else if (code === 'auth/operation-not-allowed') {
          state.authError = 'Firebase Authentication の匿名ログインが無効です。Auth で Anonymous を有効にしてください。';
        } else if (code === 'auth/network-request-failed') {
          state.authError = 'ネットワークに接続できません。通信許可とブラウザ設定を確認してください。';
        } else {
          state.authError = `Firebase接続に失敗しました。${code ? `(${code})` : ''}`;
        }
        state.ready = false;
        state.mode = 'boot-failed';
        renderApp();
      }
    }

    document.addEventListener('click', (event) => handleClick(event.target));
    document.addEventListener('input', handleInput);
    document.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointerup', handlePointerUp);
    document.addEventListener('pointercancel', handlePointerUp);
    document.addEventListener('keydown', handleKeyDown);

    function bootstrap() {
      updateAddBarOpacityLabel();
      state.mode = 'loading';
      renderApp();
      initFirebase();
    }

    bootstrap();
  </script>
</body>
</html>
