<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import {
    getFirestore,
    collection,
    doc,
    getDocs,
    setDoc,
    serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ここに自分のFirebase設定を入れてください。
  const firebaseConfig = {
    apiKey: '',
    authDomain: '',
    projectId: '',
    storageBucket: '',
    messagingSenderId: '',
    appId: ''
  };

  const STORAGE_KEY = 'createwebsite:sites:v1';
  const COOKIE_KEY = 'createwebsiteCreatorId';

  const $ = (selector) => document.querySelector(selector);

  const state = {
    allSites: [],
    visibleSites: [],
    current: null,
    editingBlockId: null,
    shareMode: 'view',
    uid: null,
    db: null,
    firebaseReady: false,
    routeSite: null,
    routeKey: null
  };

  const els = {
    home: $('#homeView'),
    viewer: $('#viewerView'),
    editor: $('#editorView'),
    addBar: $('#addBar'),
    siteList: $('#siteList'),
    title: $('#titleInput'),
    heading: $('#editorHeading'),
    canvas: $('#blockCanvas'),
    viewerTitle: $('#viewerTitle'),
    viewerCanvas: $('#viewerCanvas'),
    urlMode: $('#urlMode'),
    customUrl: $('#customUrlInput'),
    customUrlField: $('#customUrlField'),
    key: $('#editKeyInput'),
    textDialog: $('#textDialog'),
    textInput: $('#textInput'),
    idDialog: $('#idDialog'),
    shareDialog: $('#shareDialog'),
    qrBox: $('#qrBox'),
    shareUrl: $('#shareUrl'),
    shareTabs: $('#shareTabs'),
    viewerEditBtn: $('#viewerEditBtn')
  };

  function hasFirebaseConfig() {
    return Boolean(
      firebaseConfig.apiKey &&
      firebaseConfig.authDomain &&
      firebaseConfig.projectId &&
      firebaseConfig.appId
    );
  }

  function getCookie(name) {
    return document.cookie
      .split('; ')
      .find((row) => row.startsWith(`${name}=`))
      ?.split('=')[1];
  }

  function setCookie(name, value) {
    document.cookie = `${name}=${value}; max-age=31536000; path=/; SameSite=Lax`;
  }

  function creatorId() {
    let id = getCookie(COOKIE_KEY);
    if (!id) {
      id = crypto.randomUUID().slice(0, 8);
      setCookie(COOKIE_KEY, id);
    }
    return id;
  }

  async function initFirebase() {
    if (!hasFirebaseConfig()) {
      console.warn('Firebase config is empty. Using localStorage fallback.');
      await loadSites();
      return;
    }

    try {
      const app = initializeApp(firebaseConfig);
      state.db = getFirestore(app);

      const auth = getAuth(app);
      await signInAnonymously(auth);

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        state.uid = user.uid;
        state.firebaseReady = true;
        await loadSites();
      });
    } catch (error) {
      console.error('Firebase initialization failed. Falling back to localStorage.', error);
      state.firebaseReady = false;
      await loadSites();
    }
  }

  function loadLocalSites() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function saveLocalSites(sites) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
  }

  function normalizeSite(site) {
    return {
      siteId: site.siteId || crypto.randomUUID().slice(0, 8),
      title: site.title || '無題のサイト',
      ownerUid: site.ownerUid || state.uid || 'anonymous-local-user',
      creatorId: site.creatorId || creatorId(),
      customUrl: site.customUrl || '',
      key: site.key || '',
      isPublic: site.isPublic ?? true,
      collaborative: site.collaborative ?? Boolean(site.key),
      collaborators: Array.isArray(site.collaborators) ? site.collaborators : [],
      blocks: Array.isArray(site.blocks) && site.blocks.length
        ? site.blocks
        : [{ id: crypto.randomUUID(), type: 'text', html: "こんにちは<br><strong>太字</strong><br>'#ff0000赤文字'" }],
      createdAt: site.createdAt || new Date().toISOString(),
      updatedAt: site.updatedAt || new Date().toISOString()
    };
  }

  function makeSite() {
    return normalizeSite({
      siteId: crypto.randomUUID().slice(0, 8),
      title: '無題のサイト'
    });
  }

  async function loadSitesFromFirestore() {
    const snapshot = await getDocs(collection(state.db, 'websites'));

    state.allSites = snapshot.docs
      .map((item) => normalizeSite({ siteId: item.id, ...item.data() }))
      .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));

    const mineId = creatorId();
    state.visibleSites = state.allSites.filter((site) =>
      site.ownerUid === state.uid ||
      site.creatorId === mineId ||
      site.collaborators?.includes(state.uid)
    );
  }

  async function loadSites() {
    if (state.firebaseReady && state.db) {
      await loadSitesFromFirestore();
    } else {
      state.allSites = loadLocalSites().map(normalizeSite);
      state.visibleSites = [...state.allSites];
    }

    renderSiteList();
    await openRouteFromHash();
  }

  async function persistCurrentSite() {
    if (!state.current) return;

    state.current.updatedAt = new Date().toISOString();

    const index = state.allSites.findIndex((site) => site.siteId === state.current.siteId);
    if (index >= 0) state.allSites[index] = structuredClone(state.current);
    else state.allSites.unshift(structuredClone(state.current));

    const visibleIndex = state.visibleSites.findIndex((site) => site.siteId === state.current.siteId);
    if (visibleIndex >= 0) state.visibleSites[visibleIndex] = structuredClone(state.current);
    else if (
      state.current.ownerUid === state.uid ||
      state.current.creatorId === creatorId() ||
      state.current.collaborators?.includes(state.uid)
    ) {
      state.visibleSites.unshift(structuredClone(state.current));
    }

    if (state.firebaseReady && state.db) {
      const payload = {
        ...state.current,
        ownerUid: state.current.ownerUid || state.uid,
        creatorId: state.current.creatorId || creatorId(),
        collaborators: state.current.collaborators || [],
        updatedAt: state.current.updatedAt,
        updatedAtServer: serverTimestamp()
      };
      await setDoc(doc(state.db, 'websites', state.current.siteId), payload, { merge: true });
    } else {
      saveLocalSites(state.allSites);
    }
  }

  function slugify(value) {
    return (
      (value || 'untitled')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-_ぁ-んァ-ヶー一-龠]/g, '')
        .slice(0, 48) || crypto.randomUUID().slice(0, 8)
    );
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>'"]/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[char]));
  }

  function sanitizeRichHtml(value) {
    const template = document.createElement('template');
    template.innerHTML = value;

    template.content.querySelectorAll('*').forEach((node) => {
      if (!['BR', 'STRONG', 'B', 'SPAN'].includes(node.tagName)) {
        node.replaceWith(...node.childNodes);
        return;
      }

      if (node.tagName === 'SPAN') {
        const color = node.style.color;
        node.removeAttribute('style');
        if (color) node.style.color = color;
      } else {
        [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
      }
    });

    return template.innerHTML;
  }

  function renderFormattedBlock(block) {
    const raw = block?.html || escapeHtml(block?.text || '').replace(/\n/g, '<br>');
    return sanitizeRichHtml(raw).replace(
      /'#([0-9a-fA-F]{6})(.*?)'/g,
      '<span style="color:#$1">$2</span>'
    );
  }

  function basePageUrl() {
    return `${location.origin}${location.pathname.replace(/index\.html$/, '')}`;
  }

  function parseHashRoute() {
    const hash = decodeURI(location.hash || '');
    if (!hash.startsWith('#/')) return { sitePath: null, key: null };
    const [, sitePath = '', key = null] = hash.slice(2).split('/');
    return { sitePath, key };
  }

  function shareBase(site = state.current) {
    const path = site?.customUrl || site?.siteId || slugify(site?.title);
    return `${basePageUrl()}#/${path}`;
  }

  function currentShareUrl() {
    const base = shareBase();
    return state.shareMode === 'edit' && state.current?.key
      ? `${base}/${state.current.key}`
      : base;
  }

  function showHome() {
    els.home.classList.remove('hidden');
    els.viewer.classList.add('hidden');
    els.editor.classList.add('hidden');
    els.addBar.classList.add('hidden');
  }

  function showEditor(site) {
    state.current = structuredClone(normalizeSite(site));

    els.home.classList.add('hidden');
    els.viewer.classList.add('hidden');
    els.editor.classList.remove('hidden');
    els.addBar.classList.remove('hidden');

    els.title.value = state.current.title;
    els.key.value = state.current.key || '';
    els.customUrl.value = state.current.customUrl || '';
    els.heading.textContent = state.current.title || '無題のサイト';

    renderBlocks();
  }

  function showViewer(site, canEdit) {
    state.current = structuredClone(normalizeSite(site));

    els.home.classList.add('hidden');
    els.editor.classList.add('hidden');
    els.addBar.classList.add('hidden');
    els.viewer.classList.remove('hidden');

    els.viewerTitle.textContent = site.title || '無題のサイト';
    els.viewerCanvas.innerHTML = (site.blocks || [])
      .map((block) => `<article class="block"><div class="rendered-text">${renderFormattedBlock(block)}</div></article>`)
      .join('') || '<div class="empty">本文がありません。</div>';

    els.viewerEditBtn.classList.toggle('hidden', !canEdit);
  }

  function renderSiteList() {
    if (!state.visibleSites.length) {
      els.siteList.innerHTML = `
        <p class="empty">
          まだサイトがありません。「新規作成」から始めましょう。
          ${state.firebaseReady ? 'Firebaseに保存されます。' : 'Firebase未設定のため、このブラウザ内だけに保存されます。'}
        </p>
      `;
      return;
    }

    els.siteList.innerHTML = state.visibleSites.map((site) => {
      const mine = site.creatorId === creatorId() || site.ownerUid === state.uid;
      const handshake = site.collaborative && mine ? '🤝 ' : '';
      return `
        <button class="site-card" data-site="${site.siteId}">
          <strong>${handshake}${escapeHtml(site.title)}</strong>
          <span>${escapeHtml(shareBase(site))}</span>
        </button>
      `;
    }).join('');
  }

  function renderBlocks() {
    els.heading.textContent = state.current.title || '無題のサイト';

    if (!state.current.blocks.length) {
      els.canvas.innerHTML = '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>';
      return;
    }

    els.canvas.innerHTML = state.current.blocks.map((block, index) => `
      <article class="block" draggable="true" data-block="${block.id}">
        <div class="block-head">
          <span class="grab" title="ドラッグして並び替え">☰ ${index + 1}. ドラッグで並び替え</span>
          <div class="toolbar">
            <button class="btn small" data-action="edit">編集</button>
            <button class="btn small" data-action="copy">複製</button>
            <button class="btn small danger" data-action="delete">削除</button>
          </div>
        </div>
        <div class="rendered-text">${renderFormattedBlock(block)}</div>
      </article>
    `).join('');
  }

  function findSiteByRoute(sitePath) {
    return state.allSites.find((item) => [
      item.customUrl,
      item.siteId,
      item.title
    ].includes(sitePath));
  }

  async function openRouteFromHash() {
    const { sitePath, key } = parseHashRoute();
    state.routeSite = sitePath;
    state.routeKey = key;

    if (!sitePath) {
      if (!els.home.classList.contains('hidden') || els.viewer.classList.contains('hidden') && els.editor.classList.contains('hidden')) {
        showHome();
      }
      return;
    }

    const site = findSiteByRoute(sitePath);
    if (!site) {
      showViewer(
        {
          title: 'サイトが見つかりません',
          blocks: [
            {
              id: 'not-found',
              type: 'text',
              html: 'このリンクのサイトは、まだこの端末またはFirebaseから読み込めていません。'
            }
          ]
        },
        false
      );
      return;
    }

    const canEdit =
      site.creatorId === creatorId() ||
      site.ownerUid === state.uid ||
      site.collaborators?.includes(state.uid);

    if (key && site.key && key === site.key) {
      showEditor(site);
      return;
    }

    showViewer(site, canEdit);
  }

  async function saveCurrent() {
    if (!state.current) return;

    state.current.title = els.title.value.trim() || '無題のサイト';
    state.current.ownerUid = state.current.ownerUid === 'anonymous-local-user' && state.uid
      ? state.uid
      : state.current.ownerUid;
    state.current.creatorId = state.current.creatorId || creatorId();
    state.current.key = els.key.value.trim();
    state.current.collaborative = Boolean(state.current.key);

    if (!state.current.customUrl) {
      if (els.urlMode.value === 'uuid') {
        state.current.customUrl = state.current.siteId;
      } else if (els.urlMode.value === 'custom') {
        state.current.customUrl = slugify(els.customUrl.value);
      } else {
        state.current.customUrl = slugify(state.current.title);
      }
    }

    await persistCurrentSite();
    history.replaceState(null, '', shareBase(state.current));
    await loadSites();
    renderBlocks();

    alert(state.firebaseReady ? 'Firebaseに保存しました。' : '保存しました。Firebase設定後はFirestoreに保存されます。');
  }

  function openTextDialog(blockId = null) {
    state.editingBlockId = blockId;
    const block = state.current.blocks.find((item) => item.id === blockId);
    els.textInput.innerHTML = block?.html || escapeHtml(block?.text || '').replace(/\n/g, '<br>');
    els.textDialog.showModal();
  }

  function updateQr() {
    const url = currentShareUrl();
    els.shareUrl.textContent = url;
    els.qrBox.innerHTML = '生成中…';

    setTimeout(() => {
      els.qrBox.innerHTML = '';
      if (window.QRCode) {
        new QRCode(els.qrBox, {
          text: url,
          width: 200,
          height: 200
        });
      } else {
        els.qrBox.textContent = 'QRライブラリを読み込めませんでした';
      }
    }, 180);
  }

  async function handleViewerEdit() {
    if (!state.current) return;
    showEditor(state.current);
  }

  // Buttons / Events
  $('#newSiteBtn').addEventListener('click', () => showEditor(makeSite()));

  $('#backBtn').addEventListener('click', async () => {
    history.replaceState(null, '', location.pathname);
    showHome();
    await loadSites();
  });

  $('#viewerHomeBtn').addEventListener('click', async () => {
    history.replaceState(null, '', location.pathname);
    showHome();
    await loadSites();
  });

  $('#viewerEditBtn').addEventListener('click', handleViewerEdit);

  $('#saveBtn').addEventListener('click', saveCurrent);

  $('#addTextBtn').addEventListener('click', () => openTextDialog());

  $('#showIdBtn').addEventListener('click', () => {
    $('#ownerIdBtn').textContent = 'ID: ••••';
    els.idDialog.showModal();
  });

  $('#ownerIdBtn').addEventListener('click', (event) => {
    event.currentTarget.textContent = `ID: ${creatorId()}`;
  });

  $('#copyIdBtn').addEventListener('click', async () => {
    await navigator.clipboard?.writeText(creatorId());
    alert('IDをコピーしました');
  });

  $('#closeIdBtn').addEventListener('click', () => els.idDialog.close());

  $('#mergeIdBtn').addEventListener('click', () => {
    if (confirm('ID統合は元に戻せません。統合先IDを確認してから実行してください。')) {
      alert('ここにID統合の処理を入れられます。');
    }
  });

  els.title.addEventListener('input', () => {
    if (!state.current) return;
    state.current.title = els.title.value;
    els.heading.textContent = state.current.title || '無題のサイト';
  });

  els.urlMode.addEventListener('change', () => {
    els.customUrlField.classList.toggle('hidden', els.urlMode.value !== 'custom');
  });
  els.urlMode.dispatchEvent(new Event('change'));

  $('#applyTextBtn').addEventListener('click', () => {
    const html = sanitizeRichHtml(els.textInput.innerHTML.trim()) || '新しいテキスト';

    if (state.editingBlockId) {
      const target = state.current.blocks.find((item) => item.id === state.editingBlockId);
      if (target) target.html = html;
    } else {
      state.current.blocks.push({
        id: crypto.randomUUID(),
        type: 'text',
        html
      });
    }

    renderBlocks();
  });

  els.siteList.addEventListener('click', (event) => {
    const card = event.target.closest('[data-site]');
    if (!card) return;

    const site = state.visibleSites.find((item) => item.siteId === card.dataset.site);
    if (!site) return;

    showEditor(site);
  });

  els.canvas.addEventListener('click', (event) => {
    const blockEl = event.target.closest('[data-block]');
    const action = event.target.dataset.action;
    if (!blockEl || !action) return;

    const index = state.current.blocks.findIndex((block) => block.id === blockEl.dataset.block);
    if (index < 0) return;

    if (action === 'edit') openTextDialog(state.current.blocks[index].id);
    if (action === 'copy') {
      state.current.blocks.splice(index + 1, 0, {
        ...structuredClone(state.current.blocks[index]),
        id: crypto.randomUUID()
      });
      renderBlocks();
    }
    if (action === 'delete' && confirm('このブロックを削除しますか？')) {
      state.current.blocks.splice(index, 1);
      renderBlocks();
    }
  });

  let dragId = null;

  els.canvas.addEventListener('dragstart', (event) => {
    const block = event.target.closest?.('[data-block]');
    if (!block) return;
    dragId = block.dataset.block;
    block.classList.add('dragging');
  });

  els.canvas.addEventListener('dragend', (event) => {
    const block = event.target.closest?.('[data-block]');
    if (block) block.classList.remove('dragging');
    dragId = null;
  });

  els.canvas.addEventListener('dragover', (event) => event.preventDefault());

  els.canvas.addEventListener('drop', (event) => {
    event.preventDefault();
    const target = event.target.closest('[data-block]')?.dataset.block;
    if (!dragId || !target || dragId === target) return;

    const from = state.current.blocks.findIndex((block) => block.id === dragId);
    const to = state.current.blocks.findIndex((block) => block.id === target);
    if (from < 0 || to < 0) return;

    const [moved] = state.current.blocks.splice(from, 1);
    state.current.blocks.splice(to, 0, moved);
    renderBlocks();
  });

  $('#shareBtn').addEventListener('click', () => {
    state.shareMode = 'view';
    els.shareDialog.showModal();
    updateQr();
  });

  $('#closeShareBtn').addEventListener('click', () => els.shareDialog.close());

  $('#copyShareBtn').addEventListener('click', async () => {
    await navigator.clipboard?.writeText(currentShareUrl());
    alert('コピーしました');
  });

  $('#webShareBtn').addEventListener('click', async () => {
    const url = currentShareUrl();
    if (navigator.share) {
      await navigator.share({ title: state.current?.title || 'CreateWebsite', url });
    } else {
      alert('このブラウザはWeb Share APIに対応していません。');
    }
  });

  els.shareTabs.addEventListener('click', (event) => {
    if (!event.target.matches('.tab')) return;
    state.shareMode = event.target.dataset.share;
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.classList.toggle('active', tab === event.target);
    });
    updateQr();
  });

  window.addEventListener('hashchange', openRouteFromHash);

  creatorId();
  initFirebase();
</script>
