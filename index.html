<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreateWebsite</title>
  <meta name="description" content="メモを書くようにサイトを作って共有できるサービス" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f6f7fb;
      --surface:#ffffff;
      --surface-soft:rgba(255,255,255,.92);
      --surface-ghost:rgba(255,255,255,.58);
      --surface-muted:#f8fafc;
      --surface-dialog:#ffffff;
      --ink:#1c2430;
      --muted:#667085;
      --line:#e4e7ec;
      --brand:#5f63f2;
      --brand-dark:#494de4;
      --accent:#18a999;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(28,36,48,.12);
      --radius:22px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1220;
        --surface:#111827;
        --surface-soft:rgba(17,24,39,.90);
        --surface-ghost:rgba(17,24,39,.68);
        --surface-muted:#0f172a;
        --surface-dialog:#111827;
        --ink:#e5e7eb;
        --muted:#94a3b8;
        --line:#334155;
        --brand:#8b8cff;
        --brand-dark:#6f72ff;
        --accent:#2dd4bf;
        --danger:#f87171;
        --shadow:0 18px 50px rgba(0,0,0,.35);
      }
      body{
        background:
          radial-gradient(circle at top left, rgba(139,140,255,.16), transparent 34rem),
          radial-gradient(circle at 100% 10%, rgba(45,212,191,.12), transparent 28rem),
          var(--bg);
      }
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(95,99,242,.18), transparent 34rem),
        radial-gradient(circle at 100% 10%, rgba(24,169,153,.15), transparent 28rem),
        var(--bg);
      color:var(--ink);
    }

    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:0}
    textarea{resize:vertical}
    .app-shell{
      width:min(1120px,100%);
      margin:0 auto;
      padding:20px 16px 140px;
      position:relative;
      z-index:1;
    }
    .hidden{display:none !important}

    .hero{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
      margin:12px 0 20px;
    }

    .panel{
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter:blur(14px);
    }

    .eyebrow{color:var(--brand);font-weight:800;letter-spacing:.08em;font-size:.78rem}
    h1,h2,h3{margin:0;line-height:1.15}
    h1{font-size:clamp(2rem,7vw,4.5rem);letter-spacing:-.06em;margin-top:8px}
    h2{font-size:clamp(1.35rem,4vw,2.1rem)}
    h3{font-size:1.15rem}
    p{color:var(--muted);line-height:1.8}

    .hero-actions,.toolbar,.tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      background:var(--surface);
      color:var(--ink);
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .btn.primary{
      background:var(--brand);
      color:#fff;
      box-shadow:0 10px 24px rgba(95,99,242,.28);
    }
    .btn.primary:hover{background:var(--brand-dark)}
    .btn.danger{color:#fff;background:var(--danger);box-shadow:none}
    .btn.ghost{background:transparent}
    .btn.small{min-height:36px;padding:0 12px;font-size:.9rem}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    .site-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .site-card{
      text-align:left;
      width:100%;
      border-radius:20px;
      padding:16px;
      background:var(--surface);
      border:1px solid var(--line);
      transition:transform .15s, box-shadow .15s;
    }
    .site-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(28,36,48,.1)}
    .site-card strong{display:block;font-size:1.08rem;margin-bottom:8px}
    .site-card span{color:var(--muted);font-size:.9rem;word-break:break-all}

    .editor-layout{display:grid;gap:16px;align-items:start}
    .editor-top,.viewer-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }

    .field{display:grid;gap:7px;margin:12px 0}
    .field label{font-weight:800;font-size:.92rem}
    .field input,.field textarea,.field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      color:var(--ink);
    }

    .canvas{
      min-height:52vh;
      padding:18px;
      background:var(--surface-ghost);
      border:1px dashed #cdd3df;
      border-radius:var(--radius);
    }

    .empty{text-align:center;padding:60px 14px;color:var(--muted)}

    .block{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }
    .block.hidden-block{
      opacity:.55;
      border-style:dashed;
    }
    .block.move-source{
      outline:2px dashed var(--brand);
      outline-offset:2px;
    }

    .block-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .rendered-text{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
    }
    .rendered-text.no-wrap{
      white-space:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      display:block;
      -webkit-overflow-scrolling:touch;
    }

    .editor-text{
      min-height:44px;
      outline:none;
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:manipulation;
      padding:2px 0;
    }
    .editor-text:focus{outline:none}
    .editor-text a{pointer-events:none;color:var(--brand);text-decoration:underline;font-weight:800}

    .rich-editor{
      min-height:180px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      line-height:1.8;
      outline:none;
    }
    .rich-editor:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(95,99,242,.12);
    }

    .bottom-add-bar{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(720px, calc(100% - 48px));
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      padding:0;
      background:transparent;
      border:0;
      border-radius:0;
      box-shadow:none;
      z-index:50;
      pointer-events:auto;
      backdrop-filter:none;
    }

    .add-menu-wrap{
      position:relative;
      width:min(680px, calc(100% - 64px));
      display:grid;
      justify-items:center;
    }

    .add-menu{
      position:absolute;
      left:50%;
      bottom:56px;
      transform:translateX(-50%) translateY(10px) scale(.98);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:20px;
      background:var(--surface-soft);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      z-index:2;
    }

    .add-menu.open{
      opacity:1;
      pointer-events:auto;
      transform:translateX(-50%) translateY(0) scale(1);
    }

    .add-menu .btn{min-width:120px;}

    .add-block-btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      width:100%;
      display:block;
      margin:0 auto;
      text-align:center;
      position:relative;
      z-index:3;
    }

    .file-block{display:grid;gap:10px;}
    .file-block .field{margin:0}
    .file-name-input{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      color:var(--ink);
    }
    .file-action-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .file-meta{color:var(--muted);font-size:.9rem;line-height:1.6;}
    .file-preview-mini{
      background:var(--surface-muted);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      overflow:hidden;
    }
    .file-preview-mini img,
    .file-preview-mini video,
    .file-preview-mini audio,
    .file-preview-mini iframe,
    .file-preview-body img,
    .file-preview-body video,
    .file-preview-body audio,
    .file-preview-body iframe{
      width:100%;max-width:100%;border:0;border-radius:14px;
    }
    .file-preview-mini pre,
    .file-preview-body pre{
      margin:0;white-space:pre-wrap;word-break:break-word;line-height:1.7;
    }
    .file-preview-shell{display:grid;gap:12px;}
    .file-preview-body{
      background:var(--surface-muted);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      max-height:min(60vh, 560px);
      overflow:auto;
    }
    .file-preview-body a,.file-link{color:var(--brand);text-decoration:underline;font-weight:800;}

    .home-gear-btn{
      position:fixed;
      top:16px;
      right:16px;
      z-index:90;
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:var(--surface-soft);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      color:var(--ink);
      backdrop-filter: blur(12px);
    }

    dialog{
      width:min(620px, calc(100% - 24px));
      border:0;
      border-radius:26px;
      padding:0;
      box-shadow:var(--shadow);
      background:var(--surface-dialog);
      color:var(--ink);
    }
    dialog::backdrop{
      background:rgba(15,23,42,.42);
      backdrop-filter:blur(4px);
    }
    .dialog-body{padding:22px}
    .qr-box{
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      margin:10px auto 16px;
      border-radius:20px;
      background:var(--surface-muted);
      color:var(--muted);
      overflow:hidden;
    }
    .share-url{
      word-break:break-all;
      background:var(--surface-muted);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .tab{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:9px 14px;
      font-weight:800;
      color:var(--ink);
    }
    .tab.active{
      color:#fff;
      background:var(--accent);
      border-color:var(--accent);
    }
    .tab:disabled{opacity:.45;cursor:not-allowed}
    .id-pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      color:var(--ink);
    }
    .notice{
      background:color-mix(in srgb, var(--brand) 14%, var(--surface));
      color:color-mix(in srgb, var(--brand) 55%, var(--ink));
      border-radius:16px;
      padding:12px;
      line-height:1.7;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--muted);
      font-weight:800;
      font-size:.88rem;
    }
    .status-pill.good{color:#0f766e;background:#ecfdf5;border-color:#a7f3d0}
    .status-pill.warn{color:#92400e;background:#fffbeb;border-color:#fcd34d}
    .status-pill.bad{color:#991b1b;background:#fef2f2;border-color:#fecaca}

    .boot-wrap{
      display:grid;
      place-items:center;
      min-height:70vh;
    }
    .boot-card{
      width:min(640px,100%);
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:left;
    }
    .loader-line{
      display:flex;
      align-items:center;
      gap:14px;
      margin:18px 0 8px;
    }
    .loader{
      width:28px;
      height:28px;
      position:relative;
      display:inline-block;
    }
    .loader span{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--brand);
      left:50%;
      top:50%;
      transform-origin:-10px -10px;
      animation:orbit 1.1s linear infinite;
    }
    .loader span:nth-child(1){animation-delay:0s}
    .loader span:nth-child(2){animation-delay:.12s}
    .loader span:nth-child(3){animation-delay:.24s}
    .loader span:nth-child(4){animation-delay:.36s}
    @keyframes orbit{
      0%{transform:rotate(0deg) translate(10px) scale(1)}
      50%{transform:rotate(180deg) translate(10px) scale(.75);opacity:.65}
      100%{transform:rotate(360deg) translate(10px) scale(1)}
    }

    @media (max-width:820px){
      .hero,.editor-layout{grid-template-columns:1fr}
      .editor-top,.viewer-top{
        align-items:stretch;
        flex-direction:column;
      }
      .toolbar .btn{flex:1}
      .bottom-add-bar{
        border-radius:24px;
        align-items:center;
        flex-direction:column;
      }
      .home-gear-btn{
        top:12px;
        right:12px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>

  <dialog id="homeSettingsDialog">
    <div class="dialog-body">
      <h2>画面設定</h2>
      <p>下の「＋ 追加」バーの透過度を変えられます。今後ここに設定を増やしていけます。</p>

      <div class="field">
        <label for="addBarOpacityRange">＋追加の透過度：<span id="addBarOpacityValue">92%</span></label>
        <input id="addBarOpacityRange" type="range" min="0" max="100" step="1" />
      </div>

      <div class="toolbar">
        <button class="btn" id="homeSettingsCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="siteSettingsDialog">
    <div class="dialog-body">
      <h2>設定</h2>
      <p>ここでは公開範囲や共同編集Keyをまとめて管理できます。</p>

      <div class="field">
        <label>
          <input id="sitePublicToggle" type="checkbox" />
          公開する
        </label>
      </div>

      <div class="field">
        <label for="siteKeyInput">共同編集Key</label>
        <input id="siteKeyInput" placeholder="例：abc123" />
      </div>

      <div class="toolbar">
        <button class="btn" id="siteClearKeyBtn" type="button">Keyを消す</button>
        <button class="btn danger" id="siteDeleteBtn" type="button">サイト削除</button>
      </div>

      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="siteSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="siteSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="blockSettingsDialog">
    <div class="dialog-body">
      <h2>ブロック設定</h2>
      <p>表示方法を調整できます。テキストとファイルで少しだけ項目が変わります。</p>

      <div class="field hidden" id="blockFileNameField">
        <label for="blockFileNameInput">ファイル名</label>
        <input id="blockFileNameInput" class="file-name-input" placeholder="例：資料" />
      </div>

      <div class="field hidden" id="blockFilePreviewField">
        <label>
          <input id="blockFilePreviewToggle" type="checkbox" />
          ファイルをプレビュー
        </label>
      </div>

      <div class="field">
        <label>
          <input id="blockVisibleToggle" type="checkbox" />
          表示する
        </label>
      </div>

      <div class="field">
        <label>
          <input id="blockWrapToggle" type="checkbox" />
          文字を折り返す
        </label>
      </div>

      <div class="field">
        <label>
          <input id="blockHeightToggle" type="checkbox" />
          縦の大きさを指定する
        </label>
      </div>

      <div class="field hidden" id="blockRowsField">
        <label for="blockRowsInput">行数</label>
        <input id="blockRowsInput" type="number" min="1" max="50" step="1" />
      </div>

      <div class="toolbar">
        <button class="btn" id="blockSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="blockSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="filePreviewDialog">
    <div class="dialog-body file-preview-shell">
      <h2 id="filePreviewTitle">ファイル</h2>
      <p id="filePreviewMeta">プレビュー</p>
      <div class="file-preview-body" id="filePreviewBody"></div>
      <div class="toolbar">
        <button class="btn" id="filePreviewCloseBtn" type="button">閉じる</button>
        <button class="btn primary" id="filePreviewDownloadBtn" type="button">ダウンロード</button>
      </div>
    </div>
  </dialog>

  <dialog id="mergeDialog">
    <div class="dialog-body">
      <h2>ID統合</h2>
      <p>現在の自分の表示IDを、別のIDにまとめます。今のサイト一覧表示もそのIDへ移ります。</p>

      <div class="field">
        <label for="mergeTargetInput">統合先ID</label>
        <input id="mergeTargetInput" placeholder="例：abcd1234" />
      </div>

      <div class="toolbar">
        <button class="btn" id="mergeCancelBtn" type="button">キャンセル</button>
        <button class="btn danger" id="mergeExecuteBtn" type="button">実行</button>
      </div>
    </div>
  </dialog>

  <dialog id="idDialog">
    <div class="dialog-body">
      <h2>自分のID</h2>
      <p>IDは作成したサイトの持ち主判定に使います。普段は伏せて表示します。</p>
      <button class="id-pill" id="ownerIdBtn" type="button">ID: ••••</button>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyIdBtn" type="button">IDコピー</button>
        <button class="btn danger" id="mergeIdBtn" type="button">ID統合</button>
        <button class="btn" id="closeIdBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-body">
      <h2>共有</h2>
      <div class="tabs" id="shareTabs">
        <button class="tab active" data-share-tab="view" type="button">閲覧用</button>
        <button class="tab" data-share-tab="edit" type="button">共同編集用</button>
      </div>
      <p class="notice" id="shareNotice">共有リンクを確認できます。</p>
      <div class="qr-box" id="qrBox">生成中…</div>
      <div class="share-url" id="shareUrl"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyShareBtn" type="button">URLコピー</button>
        <button class="btn primary" id="webShareBtn" type="button">共有する</button>
        <button class="btn" id="closeShareBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc,
      doc,
      arrayUnion
    } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCYRh2cUMa4ecUmU9tpOT_ExrZcsYdVyHI",
      authDomain: "createwebsite-274dd.firebaseapp.com",
      projectId: "createwebsite-274dd",
      storageBucket: "createwebsite-274dd.firebasestorage.app",
      messagingSenderId: "646970295160",
      appId: "1:646970295160:web:a3f9b6f07c067a1782be8d",
      measurementId: "G-RN71HFCTGL"
    };

    const COLLECTION = 'websites';
    const OWNER_COOKIE = 'createwebsiteCreatorId';
    const ADD_BAR_OPACITY_KEY = 'createwebsite:addBarOpacity:v1';

    const appRoot = document.getElementById('app');
    const homeSettingsDialog = document.getElementById('homeSettingsDialog');
    const addBarOpacityRange = document.getElementById('addBarOpacityRange');
    const addBarOpacityValue = document.getElementById('addBarOpacityValue');
    const siteSettingsDialog = document.getElementById('siteSettingsDialog');
    const sitePublicToggle = document.getElementById('sitePublicToggle');
    const siteKeyInput = document.getElementById('siteKeyInput');
    const siteDeleteBtn = document.getElementById('siteDeleteBtn');
    const siteClearKeyBtn = document.getElementById('siteClearKeyBtn');
    const blockSettingsDialog = document.getElementById('blockSettingsDialog');
    const blockVisibleToggle = document.getElementById('blockVisibleToggle');
    const blockWrapToggle = document.getElementById('blockWrapToggle');
    const blockHeightToggle = document.getElementById('blockHeightToggle');
