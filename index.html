*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  background:
    radial-gradient(circle at top left, rgba(95,99,242,.18), transparent 34rem),
    radial-gradient(circle at 100% 10%, rgba(24,169,153,.15), transparent 28rem),
    var(--bg);
}

button,input,textarea,select{font:inherit}
button{cursor:pointer;border:0}
textarea{resize:vertical}
a{color:inherit}
.app-shell{
  width:min(1120px,100%);
  margin:0 auto;
  padding:20px 16px 140px;
  position:relative;
  z-index:1;
}
.hidden{display:none !important}

.hero{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:18px;
  align-items:stretch;
  margin:12px 0 20px;
}
.panel{
  background:var(--surface-soft);
  border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:22px;
  backdrop-filter: blur(14px);
}
.eyebrow{
  color:var(--brand);
  font-weight:900;
  letter-spacing:.08em;
  font-size:.8rem;
}
h1,h2,h3,h4,p{margin:0}
h1{
  font-size:clamp(2rem,7vw,4rem);
  line-height:1.05;
  letter-spacing:-.06em;
  margin-top:8px;
}
h2{font-size:clamp(1.35rem,4vw,2rem); line-height:1.15}
h3{font-size:1.1rem}
p{
  color:var(--muted);
  line-height:1.75;
}

.hero-actions,.toolbar,.tabs,.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.toolbar{justify-content:flex-end}
.row{justify-content:space-between}
.btn{
  min-height:44px;
  border-radius:999px;
  padding:0 18px;
  font-weight:800;
  background:var(--surface);
  color:var(--ink);
  box-shadow:inset 0 0 0 1px var(--line);
  transition:transform .12s ease, background .12s ease, box-shadow .12s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn.primary{
  background:var(--brand);
  color:#fff;
  box-shadow:0 10px 24px rgba(95,99,242,.28);
}
.btn.primary:hover{background:var(--brand-dark)}
.btn.danger{
  color:#fff;
  background:var(--danger);
  box-shadow:none;
}
.btn.ghost{
  background:transparent;
  box-shadow:none;
  padding-inline:10px;
}
.btn.small{
  min-height:34px;
  padding:0 12px;
  font-size:.9rem;
}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.icon{
  min-width:44px;
  padding:0 0;
  display:grid;
  place-items:center;
}

.site-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:14px;
  margin-top:14px;
}
.site-card{
  text-align:left;
  width:100%;
  border-radius:20px;
  padding:16px;
  background:var(--surface);
  border:1px solid var(--line);
  transition:transform .15s, box-shadow .15s;
}
.site-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(28,36,48,.1)}
.site-card strong{display:block;font-size:1.05rem;margin-bottom:8px}
.site-card span{color:var(--muted);font-size:.9rem;word-break:break-all}

.editor-layout{display:grid;gap:16px;align-items:start}
.editor-top,.viewer-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}

.field{display:grid;gap:7px;margin:12px 0}
.field label{font-weight:800;font-size:.92rem}
.field input,.field textarea,.field select{
  width:100%;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px 14px;
  background:var(--surface);
  color:var(--ink);
  outline:none;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--brand);
  box-shadow:var(--focus);
}
.field textarea{min-height:120px}

.canvas{
  min-height:52vh;
  padding:18px;
  background:var(--surface-ghost);
  border:1px dashed #cdd3df;
  border-radius:var(--radius-lg);
}
.empty{text-align:center;padding:60px 14px;color:var(--muted)}

.block{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  margin-bottom:12px;
}
.block.hidden-block{
  opacity:.55;
  border-style:dashed;
}
.block.move-source{
  outline:2px dashed var(--brand);
  outline-offset:2px;
}
.block-head{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--surface-muted);
  color:var(--muted);
  font-weight:800;
  font-size:.84rem;
}
.status-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--muted);
  font-weight:800;
  font-size:.88rem;
}
.status-pill.good{color:#0f766e;background:#ecfdf5;border-color:#a7f3d0}
.status-pill.warn{color:#92400e;background:#fffbeb;border-color:#fcd34d}

.rendered-text{
  white-space:pre-wrap;
  line-height:1.8;
  word-break:break-word;
  max-width:100%;
}
.rendered-text.no-wrap{
  white-space:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  display:block;
  -webkit-overflow-scrolling:touch;
}

.file-link{
  color:var(--brand);
  text-decoration:underline;
  font-weight:800;
  cursor:pointer;
}

.editor-text{
  min-height:44px;
  outline:none;
  white-space:pre-wrap;
  line-height:1.8;
  word-break:break-word;
  max-width:100%;
  padding:2px 0;
}
.editor-text:focus{outline:none}

.text-preview,.file-preview{
  margin-top:10px;
  padding:12px;
  border-radius:16px;
  background:var(--surface-muted);
  border:1px solid var(--line);
}
.text-preview{
  white-space:pre-wrap;
  line-height:1.8;
  word-break:break-word;
}

.file-card-view{
  display:grid;
  gap:10px;
}
.file-pill{
  display:inline-flex;
  width:fit-content;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:var(--surface-muted);
  border:1px solid var(--line);
  color:var(--muted);
  font-weight:800;
  font-size:.88rem;
}
.file-open-btn{
  width:100%;
  min-height:58px;
  border-radius:18px;
  background:color-mix(in srgb, var(--brand) 16%, var(--surface));
  border:1px solid color-mix(in srgb, var(--brand) 28%, var(--line));
  color:var(--ink);
  text-align:left;
  padding:12px 14px;
  font-weight:800;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.file-open-btn small{display:block;color:var(--muted);font-weight:700;margin-top:3px}
.file-visual{
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
  background:var(--surface-muted);
  padding:12px;
}
.file-visual img{
  max-width:100%;
  height:auto;
  display:block;
  border-radius:12px;
}
.file-visual pre{
  margin:0;
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.7;
}
.file-html{
  line-height:1.8;
  word-break:break-word;
}

.bottom-add-bar{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(720px, calc(100% - 48px));
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center;
  z-index:50;
  pointer-events:auto;
  background:transparent;
  border:0;
  box-shadow:none;
}
.add-block-btn{
  min-height:44px;
  border-radius:999px;
  padding:0 18px;
  font-weight:800;
  box-shadow:var(--shadow);
  width:min(680px, calc(100% - 64px));
  display:block;
  margin:0 auto;
  text-align:center;
  backdrop-filter: blur(10px);
}

.home-gear-btn{
  position:fixed;
  top:16px;
  right:16px;
  z-index:90;
  width:48px;
  height:48px;
  display:grid;
  place-items:center;
  border-radius:999px;
  background:var(--surface-soft);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  color:var(--ink);
  backdrop-filter: blur(12px);
}

dialog{
  width:min(720px, calc(100% - 24px));
  border:0;
  border-radius:26px;
  padding:0;
  box-shadow:var(--shadow);
  background:var(--surface-dialog);
  color:var(--ink);
}
dialog::backdrop{
  background:rgba(15,23,42,.42);
  backdrop-filter:blur(4px);
}
.dialog-body{padding:22px}
.dialog-title{margin-bottom:8px}
.notice{
  background:color-mix(in srgb, var(--brand) 12%, var(--surface));
  color:color-mix(in srgb, var(--brand) 55%, var(--ink));
  border-radius:16px;
  padding:12px;
  line-height:1.7;
  border:1px solid color-mix(in srgb, var(--brand) 18%, var(--line));
}

.qr-box{
  width:220px;
  height:220px;
  display:grid;
  place-items:center;
  margin:10px auto 16px;
  border-radius:20px;
  background:var(--surface-muted);
  color:var(--muted);
  overflow:hidden;
}
.share-url{
  word-break:break-all;
  background:var(--surface-muted);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  min-height:52px;
}

.tab{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:999px;
  padding:9px 14px;
  font-weight:800;
  color:var(--ink);
}
.tab.active{
  color:#fff;
  background:var(--accent);
  border-color:var(--accent);
}

.id-pill{
  display:inline-flex;
  gap:8px;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 12px;
  color:var(--ink);
  font-weight:800;
}

.boot-wrap{
  display:grid;
  place-items:center;
  min-height:70vh;
}
.boot-card{
  width:min(640px,100%);
  background:var(--surface-soft);
  border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:28px;
  text-align:left;
}
.loader-line{
  display:flex;
  align-items:center;
  gap:14px;
  margin:18px 0 8px;
  flex-wrap:wrap;
}
.loader{
  width:28px;
  height:28px;
  position:relative;
  display:inline-block;
}
.loader span{
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--brand);
  left:50%;
  top:50%;
  transform-origin:-10px -10px;
  animation:orbit 1.1s linear infinite;
}
.loader span:nth-child(1){animation-delay:0s}
.loader span:nth-child(2){animation-delay:.12s}
.loader span:nth-child(3){animation-delay:.24s}
.loader span:nth-child(4){animation-delay:.36s}
@keyframes orbit{
  0%{transform:rotate(0deg) translate(10px) scale(1)}
  50%{transform:rotate(180deg) translate(10px) scale(.75);opacity:.65}
  100%{transform:rotate(360deg) translate(10px) scale(1)}
}

@media (max-width:820px){
  .hero,.editor-layout{grid-template-columns:1fr}
  .editor-top,.viewer-top{
    align-items:stretch;
    flex-direction:column;
  }
  .toolbar .btn{flex:1}
  .bottom-add-bar{
    align-items:center;
    flex-direction:column;
  }
  .home-gear-btn{
    top:12px;
    right:12px;
  }
  .qr-box{width:180px;height:180px}
}

        return Number.isFinite(v) ? v : 0.92;
      })(),
      homeTab: 'mine',
      homeSearch: ''
    };

    function uid8() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, '').slice(0, 8);
      return Math.random().toString(36).slice(2, 10);
    }

    function readCookie(name) {
      const parts = document.cookie ? document.cookie.split('; ') : [];
      for (const part of parts) {
        const idx = part.indexOf('=');
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : '');
      }
      return '';
    }

    function writeCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function creatorId() {
      let id = readCookie(OWNER_COOKIE);
      if (!id) {
        id = uid8();
        writeCookie(OWNER_COOKIE, id);
      }
      return id;
    }

    function setCreatorId(newId) {
      const normalized = String(newId || '').trim().slice(0, 32);
      if (!normalized) return false;
      writeCookie(OWNER_COOKIE, normalized);
      return true;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function htmlToText(html) {
      const div = document.createElement('div');
      div.innerHTML = String(html ?? '');
      return div.innerText || div.textContent || '';
    }

    function basePageUrl() {
      return `${location.origin}${location.pathname.replace(/index\.html$/, '')}`;
    }

    function siteUrl(siteId, edit = false) {
      if (!siteId) return basePageUrl();
      return `${basePageUrl()}#/${siteId}${edit ? '/edit' : ''}`;
    }

    function route() {
      const hash = decodeURI(location.hash || '');
      if (!hash || hash === '#') return { page: 'home', siteId: null, edit: false };
      const m = hash.match(/^#\/([^/]+)(?:\/(edit))?$/);
      if (!m) return { page: 'home', siteId: null, edit: false };
      return { page: 'site', siteId: m[1], edit: m[2] === 'edit' };
    }

    function isDarkMode() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function addBarBackground() {
      const alpha = Math.max(0, Math.min(1, Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92));
      return isDarkMode() ? `rgba(17,24,39,${alpha})` : `rgba(255,255,255,${alpha})`;
    }

    function addBlockButtonStyle() {
      const alpha = Math.max(0, Math.min(1, Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92));
      if (isDarkMode()) {
        return `background:rgba(17,24,39,${alpha});color:#fff;border:1px solid rgba(255,255,255,.12);`;
      }
      return `background:rgba(255,255,255,${alpha});color:#111827;border:1px solid rgba(17,24,39,.08);`;
    }

    function persistAddBarOpacity(value) {
      const clamped = Math.max(0, Math.min(1, Number.isFinite(Number(value)) ? Number(value) : 0.92));
      state.addBarOpacity = clamped;
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(clamped));
      updateAddBarOpacityLabel();
      renderApp();
    }

    function updateAddBarOpacityLabel() {
      const current = Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92;
      const percent = Math.round(current * 100);
      addBarOpacityValue.textContent = `${percent}%`;
      addBarOpacityRange.value = String(percent);
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.sites = [];
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        state.sites = Array.isArray(parsed.sites) ? parsed.sites.map(normalizeSite) : [];
      } catch {
        state.sites = [];
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        sites: state.sites.map((site) => ({
          ...site,
          blocks: site.blocks.map((b) => ({ ...b }))
        }))
      }));
    }

    function normalizeTextBlock(block = {}) {
      return {
        id: block.id || uid8(),
        type: 'text',
        text: typeof block.text === 'string' ? block.text : htmlToText(block.text || block.html || ''),
        visible: block.visible !== false,
        wrap: block.wrap !== false,
        heightEnabled: block.heightEnabled === true,
        rows: Math.max(1, Math.min(50, Number(block.rows || 3) || 3)),
        color: typeof block.color === 'string' ? block.color : '#111827',
        fontSize: Math.max(10, Math.min(64, Number(block.fontSize || 16) || 16)),
        bold: !!block.bold
      };
    }

    function detectSourceKind(text) {
      const value = String(text ?? '').trim();
      if (!value) return { kind: 'text', value: '' };

      const looksLikeUrl = /^(https?:\/\/)[^\s]+$/i.test(value);
      if (looksLikeUrl) return { kind: 'url', value };

      const looksLikeHtml = /<\/?[a-z][\s\S]*>/i.test(value);
      if (looksLikeHtml) return { kind: 'html', value };

      return { kind: 'text', value };
    }

    function normalizeFileBlock(block = {}) {
      const sourceText = typeof block.sourceText === 'string' ? block.sourceText : '';
      const detected = detectSourceKind(sourceText);

      return {
        id: block.id || uid8(),
        type: 'file',
        visible: block.visible !== false,
        wrap: block.wrap !== false,
        heightEnabled: block.heightEnabled === true,
        rows: Math.max(1, Math.min(50, Number(block.rows || 3) || 3)),
        name: typeof block.name === 'string' && block.name.trim() ? block.name.trim() : 'ファイル',
        preview: !!block.preview,
        sourceKind: block.sourceKind || detected.kind || 'text',
        sourceText,
        sourceUrl: typeof block.sourceUrl === 'string' ? block.sourceUrl : (detected.kind === 'url' ? detected.value : ''),
        sourceHtml: typeof block.sourceHtml === 'string' ? block.sourceHtml : (detected.kind === 'html' ? detected.value : ''),
        dataUrl: typeof block.dataUrl === 'string' ? block.dataUrl : '',
        mime: typeof block.mime === 'string' ? block.mime : '',
        originalName: typeof block.originalName === 'string' ? block.originalName : ''
      };
    }

    function normalizeBlock(block = {}) {
      if (block.type === 'file') return normalizeFileBlock(block);
      return normalizeTextBlock(block);
    }

    function normalizeSite(site = {}) {
      const id = site.id || site.siteId || uid8();
      return {
        id,
        title: typeof site.title === 'string' && site.title.trim() ? site.title.trim() : '無題のサイト',
        visible: site.visible !== false,
        creatorId: site.creatorId || creatorId(),
        public: site.public !== false,
        createdAt: site.createdAt || Date.now(),
        updatedAt: site.updatedAt || Date.now(),
        blocks: Array.isArray(site.blocks) && site.blocks.length
          ? site.blocks.map(normalizeBlock)
          : [normalizeTextBlock({ text: 'こんにちは\nここから編集できます。' })]
      };
    }

    function currentSite() {
      return state.sites.find((site) => site.id === state.currentSiteId) || null;
    }

    function isCurrentCreator() {
      const site = currentSite();
      return !!site && site.creatorId === creatorId();
    }

    function setCurrentSiteId(id) {
      state.currentSiteId = id || null;
    }

    function isMine(site) {
      return !!site && site.creatorId === creatorId();
    }

    function siteSearchText(site) {
      const blockText = (site.blocks || [])
        .filter((b) => b.visible !== false)
        .map((b) => b.type === 'text' ? (b.text || '') : ((b.name || '') + ' ' + (b.sourceText || b.sourceUrl || b.sourceHtml || '')))
        .join(' ');
      return `${site.title || ''} ${blockText}`.toLowerCase();
    }

    function filterSites(list, query) {
      const q = String(query || '').trim().toLowerCase();
      if (!q) return list.slice();
      const terms = q.split(/\s+/).filter(Boolean);
      return list.filter((site) => {
        const blob = siteSearchText(site);
        return terms.every((term) => blob.includes(term));
      });
    }

    function mineSites() {
      return state.sites
        .filter((site) => isMine(site))
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function publicSites() {
      return state.sites
        .filter((site) => site.public !== false)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function textToHtmlWithFileLinks(raw, site) {
      const text = String(raw ?? '');
      let out = '';
      let i = 0;

      while (i < text.length) {
        const slice = text.slice(i);
        const m = slice.match(/^file\(([^)]+)\)'([\s\S]*?)'/);
        if (m) {
          const fileName = m[1].trim();
          const label = m[2];
          out += `<a href="#" class="file-link" data-file-name="${escapeAttr(fileName)}">${escapeHtml(label)}</a>`;
          i += m[0].length;
          continue;
        }

        const ch = text[i];
        if (ch === '\n') out += '<br>';
        else out += escapeHtml(ch);
        i += 1;
      }

      return out;
    }

    function sanitizeHtml(input) {
      const template = document.createElement('template');
      template.innerHTML = String(input ?? '');

      const forbidden = template.content.querySelectorAll('script, iframe, object, embed, style');
      forbidden.forEach((node) => node.remove());

      template.content.querySelectorAll('*').forEach((el) => {
        [...el.attributes].forEach((attr) => {
          const name = attr.name.toLowerCase();
          const value = String(attr.value || '');
          if (name.startsWith('on')) el.removeAttribute(attr.name);
          if ((name === 'href' || name === 'src') && /^javascript:/i.test(value)) el.removeAttribute(attr.name);
        });
      });

      return template.innerHTML;
    }

    function renderTextBlock(block, site) {
      const style = [
        `color:${escapeAttr(block.color || '#111827')}`,
        `font-size:${Math.max(10, Math.min(64, Number(block.fontSize || 16) || 16))}px`,
        block.bold ? 'font-weight:800' : 'font-weight:400'
      ].join(';');

      const inner = textToHtmlWithFileLinks(block.text || '', site);

      return `
        <article class="block${block.visible === false ? ' hidden-block' : ''}" data-block-id="${escapeAttr(block.id)}">
          <div class="block-head">
            <div class="badge">テキスト</div>
            <button class="btn small" data-action="settings" data-block-id="${escapeAttr(block.id)}" type="button">⚙️</button>
          </div>
          <div class="rendered-text${block.wrap === false ? ' no-wrap' : ''}" style="${style};${block.heightEnabled ? `min-height: calc(${block.rows} * 1.8em + 28px);` : ''}">${inner || '<br>'}</div>
        </article>
      `;
    }

    function getFileDownloadName(block) {
      const name = String(block.name || '').trim();
      if (!name) return 'file';
      return name;
    }

    function getFileFileExtension(block) {
      const n = getFileDownloadName(block);
      if (/\.[a-z0-9]{1,8}$/i.test(n)) return '';
      if (block.sourceKind === 'html') return '.html';
      if (block.sourceKind === 'url') return '.url';
      if (block.sourceKind === 'text') return '.txt';
      return '';
    }

    function blockDownloadName(block) {
      return `${getFileDownloadName(block)}${getFileFileExtension(block)}`;
    }

    function fileIsImage(block) {
      return !!block.mime && /^image\//i.test(block.mime);
    }

    async function dataUrlToBlob(dataUrl) {
      const res = await fetch(dataUrl);
      return await res.blob();
    }

    function renderFileVisual(block) {
      if (block.sourceKind === 'html') {
        return `<div class="file-html">${sanitizeHtml(block.sourceHtml || block.sourceText || '') || '<span class="muted">HTMLは空です。</span>'}</div>`;
      }

      if (block.sourceKind === 'url') {
        const url = String(block.sourceUrl || block.sourceText || '').trim();
        return `
          <div class="file-visual">
            <a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer" class="file-open-btn" style="text-decoration:none">
              <span>
                ${escapeHtml(url)}
                <small>タップで開くリンク</small>
              </span>
              <span>↗</span>
            </a>
          </div>
        `;
      }

      if (block.sourceKind === 'file' && fileIsImage(block)) {
        return `<div class="file-visual"><img src="${escapeAttr(block.dataUrl)}" alt="${escapeAttr(block.originalName || block.name || 'image')}" /></div>`;
      }

      if (block.sourceKind === 'file' && block.dataUrl) {
        return `
          <div class="file-visual">
            <div class="file-pill">${escapeHtml(block.originalName || block.name || 'ファイル')}</div>
            <pre style="margin-top:10px">${escapeHtml(block.sourceText || 'ファイルを保存済みです。')}</pre>

```
      </div>
    `;
  }

  return `<div class="file-visual"><pre>${escapeHtml(block.sourceText || '')}</pre></div>`;
}

function renderFileBlock(block, site) {
  const info = `${block.sourceKind === 'file' ? 'アップロード' : block.sourceKind === 'html' ? 'HTML' : block.sourceKind === 'url' ? 'URL' : 'テキスト'}`;

        <div class="row" style="margin-bottom:12px">
          <h3>本文</h3>
          <span class="badge">長押しじゃなく、上下ボタンで並べ替え</span>
        </div>
        <div class="canvas" id="blockCanvas">${blocks || '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>'}</div>
      </section>

    <div class="bottom-add-bar" id="bottomAddBar">
      <button class="add-block-btn" id="addBlockBtn" type="button" style="${addBlockButtonStyle()}">＋ 追加</button>
    </div>
  `;
}

function renderLoading(message = '接続しています') {
  const dots = '<span></span><span></span><span></span><span></span>';
  app.innerHTML = `
    <div class="boot-wrap">
      <div class="boot-card">
        <div class="eyebrow">CreateWebsite</div>
        <h1 style="font-size:clamp(2rem,5vw,3rem);margin-top:8px">読み込み中</h1>
        <div class="loader-line">
          <div class="loader" aria-hidden="true">${dots}</div>
          <p style="margin:0">${escapeHtml(message)}</p>
        </div>
        <p>少し待ってね。</p>
      </div>
    </div>
  `;
}

function renderBootError(message) {
  app.innerHTML = `
    <div class="boot-wrap">
      <div class="boot-card">
        <div class="eyebrow">CreateWebsite</div>
        <h1 style="font-size:clamp(2rem,5vw,3rem);margin-top:8px">読み込みに失敗しました</h1>
        <p class="notice">${escapeHtml(message || '予期しないエラーが起きました。')}</p>
        <div class="toolbar" style="margin-top:18px">
          <button class="btn primary" id="bootRetryBtn" type="button">再読み込み</button>
          <button class="btn" id="bootHomeBtn" type="button">トップへ戻る</button>
        </div>
      </div>
    </div>
  `;
}

function renderApp() {
  if (state.mode === 'loading') return renderLoading();
  if (state.mode === 'home') return renderHome();
  if (state.mode === 'viewer') return renderViewer();
  if (state.mode === 'editor') return renderEditor();
  if (state.mode === 'boot-failed') return renderBootError(state.bootError || '読み込み失敗');
  return renderHome();
}

function createDraftSite() {
  return normalizeSite({
    id: uid8(),
    title: '無題のサイト',
    creatorId: creatorId(),
    public: true,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    blocks: [
      normalizeTextBlock({
        text: "こんにちは\nここに文章を書いてね。\nfile(あ)'こちら' を入れると、その名前のファイルブロックへつながるよ。",
        color: '#111827',
        fontSize: 16,
        bold: false
      }),
      normalizeFileBlock({
        name: 'あ',
        preview: true,
        sourceKind: 'text',
        sourceText: 'これはファイルブロックの中身です。',
        dataUrl: '',
        mime: ''
      })
    ]
  });
}

function openNewSite() {
  const draft = createDraftSite();
  state.sites.unshift(draft);
  state.currentSiteId = draft.id;
  state.mode = 'editor';
  saveState();
  location.hash = `#/${draft.id}/edit`;
  renderApp();
}

function openSiteById(id, edit = false) {
  const site = state.sites.find((s) => s.id === id);
  if (!site) {
    state.mode = 'home';
    state.currentSiteId = null;
    renderApp();
    return;
  }
  state.currentSiteId = id;
  state.mode = edit ? 'editor' : 'viewer';
  renderApp();
}

function updateCurrentSite(mutator) {
  const site = currentSite();
  if (!site) return;
  mutator(site);
  site.updatedAt = Date.now();
  saveState();
  renderApp();
}

function addBlock(type) {
  const site = currentSite();
  if (!site) return;
  if (type === 'file') {
    site.blocks.push(normalizeFileBlock({
      name: '新しいファイル',
      preview: true,
      sourceKind: 'text',
      sourceText: ''
    }));
  } else {
    site.blocks.push(normalizeTextBlock({
      text: '',
      color: '#111827',
      fontSize: 16,
      bold: false
    }));
  }
  site.updatedAt = Date.now();
  saveState();
  renderApp();
}

function deleteBlock(blockId) {
  const site = currentSite();
  if (!site) return;
  const idx = site.blocks.findIndex((b) => b.id === blockId);
  if (idx < 0) return;
  if (!confirm('このブロックを削除する？')) return;
  site.blocks.splice(idx, 1);
  site.updatedAt = Date.now();
  saveState();
  renderApp();
}

function moveBlock(blockId, direction) {
  const site = currentSite();
  if (!site) return;
  const idx = site.blocks.findIndex((b) => b.id === blockId);
  if (idx < 0) return;
  const target = idx + direction;
  if (target < 0 || target >= site.blocks.length) return;
  const [item] = site.blocks.splice(idx, 1);
  site.blocks.splice(target, 0, item);
  site.updatedAt = Date.now();
  saveState();
  renderApp();
}

function openBlockSettings(blockId) {
  const site = currentSite();
  if (!site) return;
  const block = site.blocks.find((b) => b.id === blockId);
  if (!block) return;
  state.pendingSettingsBlockId = blockId;

  blockVisibleToggle.checked = block.visible !== false;
  blockTypeSelect.value = block.type === 'file' ? 'file' : 'text';
  blockWrapToggle.checked = block.wrap !== false;
  blockHeightToggle.checked = block.heightEnabled === true;
  blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
  blockRowsInput.value = String(Math.max(1, Math.min(50, Number(block.rows || 3) || 3)));

  if (block.type === 'text') {
    textBlockSettings.classList.remove('hidden');
    fileBlockSettings.classList.add('hidden');
    textColorInput.value = block.color || '#111827';
    textSizeInput.value = String(block.fontSize || 16);
    textSizeValue.textContent = String(block.fontSize || 16);
    textBoldToggle.checked = !!block.bold;
  } else {
    textBlockSettings.classList.add('hidden');
    fileBlockSettings.classList.remove('hidden');
    fileNameInput.value = block.name || '';
    filePreviewToggle.checked = !!block.preview;
  }

  if (!blockDialog.open) blockDialog.showModal();
}

function saveBlockSettings() {
  const site = currentSite();
  if (!site || !state.pendingSettingsBlockId) return;
  const block = site.blocks.find((b) => b.id === state.pendingSettingsBlockId);
  if (!block) return;

  block.visible = !!blockVisibleToggle.checked;
  block.wrap = !!blockWrapToggle.checked;
  block.heightEnabled = !!blockHeightToggle.checked;
  block.rows = block.heightEnabled ? Math.max(1, Math.min(50, Number(blockRowsInput.value || 3) || 3)) : (block.rows || 3);

  const type = blockTypeSelect.value;
  if (type === 'file' && block.type !== 'file') {
    const converted = normalizeFileBlock({
      id: block.id,
      visible: block.visible,
      wrap: block.wrap,
      heightEnabled: block.heightEnabled,
      rows: block.rows,
      name: '新しいファイル',
      preview: true,
      sourceKind: 'text',
      sourceText: ''
    });
    Object.assign(block, converted);
  } else if (type === 'text' && block.type !== 'text') {
    const converted = normalizeTextBlock({
      id: block.id,
      visible: block.visible,
      wrap: block.wrap,
      heightEnabled: block.heightEnabled,
      rows: block.rows,
      text: '',
      color: '#111827',
      fontSize: 16,
      bold: false
    });
    Object.assign(block, converted);
  }

  if (block.type === 'text') {
    block.color = textColorInput.value || '#111827';
    block.fontSize = Math.max(10, Math.min(64, Number(textSizeInput.value || 16) || 16));
    block.bold = !!textBoldToggle.checked;
  } else if (block.type === 'file') {
    block.name = String(fileNameInput.value || '').trim() || 'ファイル';
    block.preview = !!filePreviewToggle.checked;
  }

  site.updatedAt = Date.now();
  state.pendingSettingsBlockId = null;
  saveState();
  if (blockDialog.open) blockDialog.close();
  renderApp();
}

function renderPreviewContent(block) {
  if (!block) return '<div class="empty">プレビューできません。</div>';

  if (block.type === 'text') {
    const style = `color:${escapeAttr(block.color || '#111827')};font-size:${Math.max(10, Math.min(64, Number(block.fontSize || 16) || 16))}px;font-weight:${block.bold ? '800' : '400'}`;
    return `<div class="rendered-text" style="${style}">${textToHtmlWithFileLinks(block.text || '', currentSite()) || '<br>'}</div>`;
  }

  if (block.sourceKind === 'html') {
    return `<div class="file-visual"><div class="file-html">${sanitizeHtml(block.sourceHtml || block.sourceText || '') || '<div class="empty" style="padding:0">空です。</div>'}</div></div>`;
  }

  if (block.sourceKind === 'url') {
    const url = String(block.sourceUrl || block.sourceText || '').trim();
    return `<div class="file-visual"><a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a></div>`;
  }

  if (block.sourceKind === 'file' && fileIsImage(block)) {
    return `<div class="file-visual"><img src="${escapeAttr(block.dataUrl)}" alt="${escapeAttr(block.originalName || block.name || 'image')}" /></div>`;
  }

  if (block.sourceKind === 'file' && block.dataUrl) {
    return `<div class="file-visual"><pre>${escapeHtml(block.sourceText || 'ファイルです。')}</pre></div>`;
  }

  return `<div class="file-visual"><pre>${escapeHtml(block.sourceText || '')}</pre></div>`;
}

function openPreview(blockId) {
  const site = currentSite();
  if (!site) return;
  const block = site.blocks.find((b) => b.id === blockId);
  if (!block) return;

  state.previewBlockId = blockId;
  previewTitle.textContent = block.type === 'file' ? (block.name || 'ファイル') : 'プレビュー';
  previewBody.innerHTML = renderPreviewContent(block);
  if (block.type === 'file') {
    previewDownloadBtn.classList.remove('hidden');
  } else {
    previewDownloadBtn.classList.add('hidden');
  }

  if (!previewDialog.open) previewDialog.showModal();
}

async function downloadBlock(blockId) {
  const site = currentSite();
  if (!site) return;
  const block = site.blocks.find((b) => b.id === blockId);
  if (!block) return;

  let blob;
  let filename = 'download.txt';

  if (block.type === 'text') {
    const text = String(block.text || '');
    blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    filename = `${(site.title || 'text').replace(/[\\/:*?"<>|]+/g, '_')}.txt`;
  } else {
    filename = blockDownloadName(block).replace(/[\\/:*?"<>|]+/g, '_');

    if (block.sourceKind === 'file' && block.dataUrl) {
      blob = await dataUrlToBlob(block.dataUrl);
      if (!filename.includes('.')) filename += (block.mime && block.mime.includes('/') ? '' : '.bin');
    } else if (block.sourceKind === 'html') {
      blob = new Blob([block.sourceHtml || block.sourceText || ''], { type: 'text/html;charset=utf-8' });
    } else if (block.sourceKind === 'url') {
      blob = new Blob([block.sourceUrl || block.sourceText || ''], { type: 'text/uri-list;charset=utf-8' });
    } else {
      blob = new Blob([block.sourceText || ''], { type: 'text/plain;charset=utf-8' });
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function findFileBlockByName(name) {
  const site = currentSite();
  if (!site) return null;
  const target = String(name || '').trim();
  if (!target) return null;
  return site.blocks.find((b) => b.type === 'file' && String(b.name || '').trim() === target) || null;
}

async function handleFileLinkClick(name) {
  const block = findFileBlockByName(name);
  if (!block) {
    alert(`ファイル「${name}」が見つからないよ。`);
    return;
  }
  if (block.preview) openPreview(block.id);
  else await downloadBlock(block.id);
}

function openShareDialog() {
  const site = currentSite();
  if (!site) return;
  state.shareMode = 'view';
  shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.shareTab === 'view'));
  updateShareDialog();
  if (!shareDialog.open) shareDialog.showModal();
}

function updateShareDialog() {
  const site = currentSite();
  const url = site ? siteUrl(site.id, state.shareMode === 'edit') : '';
  shareUrlEl.textContent = url || '保存後に表示されるよ';
  if (!site) {
    shareNoticeEl.textContent = '先にサイトを開いてね。';

function openSiteSettings() {

  if (!site) return;
  siteTitleInput.value = site.title || '';
  sitePublicToggle.checked = site.public !== false;
  if (!siteDialog.open) siteDialog.showModal();
}

function saveSiteSettings() {
  const site = currentSite();
  if (!site) return;
  site.title = String(siteTitleInput.value || '').trim() || '無題のサイト';
  site.public = !!sitePublicToggle.checked;
  site.updatedAt = Date.now();
  saveState();
  if (siteDialog.open) siteDialog.close();
  renderApp();
}

function deleteCurrentSite() {
  const site = currentSite();
  if (!site) return;
  if (!confirm('このサイトを削除する？')) return;
  state.sites = state.sites.filter((s) => s.id !== site.id);
  saveState();
  state.currentSiteId = null;
  location.hash = '';
  state.mode = 'home';
  renderApp();
}

async function pasteClipboardToFileBlock(blockId) {
  const site = currentSite();
  if (!site) return;
  const block = site.blocks.find((b) => b.id === blockId && b.type === 'file');
  if (!block) return;

  try {
    const text = await navigator.clipboard.readText();
    applyFileBlockSourceText(block, text);
  } catch (error) {
    const text = prompt('クリップボードの内容を貼り付けてね', '');
    if (text === null) return;
    applyFileBlockSourceText(block, text);
  }
}

function applyFileBlockSourceText(block, text) {
  const detected = detectSourceKind(text);
  block.sourceKind = detected.kind;
  block.sourceText = detected.value;
  block.sourceUrl = detected.kind === 'url' ? detected.value : '';
  block.sourceHtml = detected.kind === 'html' ? detected.value : '';
  block.dataUrl = '';
  block.mime = '';
  block.originalName = '';
  if (!block.name || block.name === '新しいファイル') {
    block.name = detected.kind === 'url' ? 'リンク' : detected.kind === 'html' ? 'HTML' : 'テキスト';
  }
  block.preview = detected.kind !== 'text' ? true : block.preview;
  const site = currentSite();
  if (site) {
    site.updatedAt = Date.now();
    saveState();
    renderApp();
  }
}

async function uploadFileToBlock(blockId, file) {
  const site = currentSite();
  if (!site || !file) return;
  const block = site.blocks.find((b) => b.id === blockId && b.type === 'file');
  if (!block) return;

  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error || new Error('FileReader failed'));
    reader.readAsDataURL(file);
  });

  block.sourceKind = 'file';
  block.sourceText = `${file.name}`;
  block.dataUrl = dataUrl;
  block.mime = file.type || '';
  block.originalName = file.name || '';
  block.sourceUrl = '';
  block.sourceHtml = '';
  if (!block.name || block.name === '新しいファイル') block.name = file.name || 'ファイル';
  site.updatedAt = Date.now();
  saveState();
  renderApp();
}

function saveCurrentSite() {
  const site = currentSite();
  if (!site) return;

  site.title = String(document.getElementById('titleInput')?.value || '').trim() || '無題のサイト';
  site.updatedAt = Date.now();
  saveState();
  renderApp();
  alert('保存しました。');
}

function createDefaultSite() {
  const site = createDraftSite();
  state.sites.unshift(site);
  state.currentSiteId = site.id;
  saveState();
  location.hash = `#/${site.id}/edit`;
  state.mode = 'editor';
  renderApp();
}

function ensureRoute() {
  const r = route();
  if (r.page === 'home') {
    state.mode = 'home';
    state.currentSiteId = null;
  } else {
    state.currentSiteId = r.siteId;
    state.mode = r.edit ? 'editor' : 'viewer';
  }
}

function bootstrap() {
  loadState();
  updateAddBarOpacityLabel();
  const r = route();

  if (r.page === 'site' && r.siteId && state.sites.some((s) => s.id === r.siteId)) {
    state.currentSiteId = r.siteId;
    state.mode = r.edit ? 'editor' : 'viewer';
  } else {
    state.mode = 'home';
  }

  renderApp();
}

document.addEventListener('click', async (event) => {
  const target = event.target;

  if (target.closest('#newSiteBtn')) {
    createDefaultSite();
    return;
  }

  if (target.closest('#showIdBtn')) {
    alert(`自分のID: ${creatorId()}`);
    return;
  }

  if (target.closest('#homeSettingsBtn')) {
    updateAddBarOpacityLabel();
    if (!homeSettingsDialog.open) homeSettingsDialog.showModal();
    return;
  }

  if (target.closest('#homeSettingsCloseBtn')) {
    if (homeSettingsDialog.open) homeSettingsDialog.close();
    return;
  }

  if (target.closest('#bootRetryBtn')) {
    location.reload();
    return;
  }

  if (target.closest('#bootHomeBtn')) {
    location.hash = '';
    state.mode = 'home';
    state.currentSiteId = null;
    renderApp();
    return;
  }

  if (target.closest('#viewerHomeBtn') || target.closest('#backBtn')) {
    if (state.mode === 'editor') {
      const titleInput = document.getElementById('titleInput');
      if (titleInput && currentSite()) currentSite().title = String(titleInput.value || '').trim() || '無題のサイト';
      saveState();
    }
    state.currentSiteId = null;
    state.mode = 'home';
    location.hash = '';
    renderApp();
    return;
  }

  if (target.closest('#viewerEditBtn')) {
    const site = currentSite();
    if (!site) return;
    state.mode = 'editor';
    location.hash = `#/${site.id}/edit`;
    renderApp();
    return;
  }

  if (target.closest('#viewerShareBtn') || target.closest('#shareBtn')) {
    openShareDialog();
    return;
  }

  if (target.closest('#copyShareBtn')) {
    const site = currentSite();
    if (!site) return;
    const url = siteUrl(site.id, state.shareMode === 'edit');
    try {
      await navigator.clipboard.writeText(url);
      alert('コピーしました');
    } catch {
      prompt('コピーできないときはこれを使ってね', url);
    }
    return;
  }

  if (target.closest('#webShareBtn')) {
    const site = currentSite();
    if (!site) return;
    const url = siteUrl(site.id, state.shareMode === 'edit');
    if (navigator.share) {
      navigator.share({ title: site.title || 'CreateWebsite', url }).catch(() => {});
    } else {
      alert('このブラウザは共有に対応していません。');
    }
    return;
  }

  if (target.closest('#closeShareBtn')) {
    if (shareDialog.open) shareDialog.close();
    return;
  }

  if (target.closest('#siteSettingsBtn')) {
    openSiteSettings();
    return;
  }

  if (target.closest('#siteCancelBtn')) {
    if (siteDialog.open) siteDialog.close();
    return;
  }

  if (target.closest('#siteSaveBtn')) {
    saveSiteSettings();
    return;
  }

  if (target.closest('#siteDeleteBtn')) {
    deleteCurrentSite();
    return;
  }

  if (target.closest('#addBlockBtn')) {
    if (!addDialog.open) addDialog.showModal();
    return;
  }

  if (target.closest('#addDialogCloseBtn')) {
    if (addDialog.open) addDialog.close();
    return;
  }

  if (target.closest('#addTextBlockBtn')) {
    addBlock('text');
    if (addDialog.open) addDialog.close();
    return;
  }

  if (target.closest('#addFileBlockBtn')) {
    addBlock('file');
    if (addDialog.open) addDialog.close();
    return;
  }

  const openSiteBtn = target.closest('[data-open-site]');
  if (openSiteBtn) {
    const id = openSiteBtn.getAttribute('data-open-site');
    if (id) {
      state.currentSiteId = id;
      state.mode = 'viewer';
      location.hash = `#/${id}`;
      renderApp();
    }
    return;
  }

  const shareTab = target.closest('[data-share-tab]');
  if (shareTab) {
    if (shareTab.disabled) return;
    state.shareMode = shareTab.getAttribute('data-share-tab') || 'view';
    shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === shareTab));
    updateShareDialog();
    return;
  }

  const actionBtn = target.closest('[data-action]');
  if (actionBtn) {
    const action = actionBtn.getAttribute('data-action');
    const blockId = actionBtn.getAttribute('data-block-id');
    if (!blockId) return;

    if (action === 'settings') {
      openBlockSettings(blockId);
      return;
    }
    if (action === 'move-up') {
      moveBlock(blockId, -1);
      return;
    }
    if (action === 'move-down') {
      moveBlock(blockId, 1);
      return;
    }
    if (action === 'upload-file') {
      const input = document.querySelector(`[data-file-upload-input="${CSS.escape(blockId)}"]`);
      if (input) input.click();
      return;
    }
    if (action === 'paste-clipboard') {
      await pasteClipboardToFileBlock(blockId);
      return;
    }
    if (action === 'download-file') {
      await downloadBlock(blockId);
      return;
    }
  }

  const fileOpenBtn = target.closest('[data-file-open]');
  if (fileOpenBtn) {
    const blockId = fileOpenBtn.getAttribute('data-file-open');
    const site = currentSite();
    const block = site?.blocks.find((b) => b.id === blockId);
    if (!block) return;
    if (block.preview) openPreview(block.id);
    else await downloadBlock(block.id);
    return;
  }

  const fileLink = target.closest('.file-link');
  if (fileLink) {
    event.preventDefault();
    const name = fileLink.getAttribute('data-file-name');
    if (name) await handleFileLinkClick(name);
    return;
  }

  if (target.closest('#previewCloseBtn')) {
    if (previewDialog.open) previewDialog.close();
    return;
  }

  if (target.closest('#previewDownloadBtn')) {
    if (state.previewBlockId) await downloadBlock(state.previewBlockId);
    return;
  }

  if (target.closest('#blockSettingsCancelBtn')) {
    state.pendingSettingsBlockId = null;
    if (blockDialog.open) blockDialog.close();
    return;
  }

  if (target.closest('#blockSettingsSaveBtn')) {
    saveBlockSettings();
    return;
  }

  if (target.closest('#blockDeleteBtn')) {
    const id = state.pendingSettingsBlockId;
    state.pendingSettingsBlockId = null;
    if (blockDialog.open) blockDialog.close();
    if (id) deleteBlock(id);
    return;
  }

  if (target.closest('#homeRefreshBtn')) {
    renderApp();
    return;
  }
});

document.addEventListener('input', (event) => {
  const target = event.target;

  if (target?.id === 'homeSearchInput') {
    state.homeSearch = target.value;
    renderApp();
    return;
  }

  if (target?.id === 'addBarOpacityRange') {
    persistAddBarOpacity(Number(target.value) / 100);
    return;
  }

  if (target?.id === 'titleInput') {
    const site = currentSite();
    if (!site) return;
    site.title = target.value;
    site.updatedAt = Date.now();
    saveState();
    const heading = document.getElementById('editorHeading');
    if (heading) heading.textContent = target.value || '無題のサイト';
    return;
  }

  if (target?.id === 'siteTitleInput') {
    return;
  }

  if (target?.id === 'sitePublicToggle') {
    return;
  }

  if (target?.id === 'blockTypeSelect') {
    const type = target.value;
    textBlockSettings.classList.toggle('hidden', type !== 'text');
    fileBlockSettings.classList.toggle('hidden', type !== 'file');
    return;
  }

  if (target?.id === 'textSizeInput') {
    textSizeValue.textContent = String(target.value);
    return;
  }

  if (target?.id === 'blockHeightToggle') {
    blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
    return;
  }

  const site = currentSite();
  if (!site) return;

  const textEditor = target.closest('[data-text-editor]');
  if (textEditor) {
    const blockId = textEditor.getAttribute('data-text-editor');
    const block = site.blocks.find((b) => b.id === blockId && b.type === 'text');
    if (!block) return;
    block.text = textEditor.value;
    site.updatedAt = Date.now();
    saveState();
    return;
  }

  const fileNameEditor = target.closest('[data-file-name-input]');
  if (fileNameEditor) {
    const blockId = fileNameEditor.getAttribute('data-file-name-input');
    const block = site.blocks.find((b) => b.id === blockId && b.type === 'file');
    if (!block) return;
    block.name = fileNameEditor.value;
    site.updatedAt = Date.now();
    saveState();
    renderApp();
    return;
  }

  const fileSourceEditor = target.closest('[data-file-source]');
  if (fileSourceEditor) {
    const blockId = fileSourceEditor.getAttribute('data-file-source');
    const block = site.blocks.find((b) => b.id === blockId && b.type === 'file');
    if (!block) return;
    applyFileBlockSourceText(block, fileSourceEditor.value);
    return;
  }

  const inlinePreviewToggle = target.closest('[data-file-preview-inline]');
  if (inlinePreviewToggle) {
    const blockId = inlinePreviewToggle.getAttribute('data-file-preview-inline');
    const block = site.blocks.find((b) => b.id === blockId && b.type === 'file');
    if (!block) return;
    block.preview = !!inlinePreviewToggle.checked;
    site.updatedAt = Date.now();
    saveState();
    renderApp();
    return;
  }

  const fileUploadInput = target.closest('[data-file-upload-input]');
  if (fileUploadInput && fileUploadInput.files && fileUploadInput.files[0]) {
    const blockId = fileUploadInput.getAttribute('data-file-upload-input');
    uploadFileToBlock(blockId, fileUploadInput.files[0]);
    fileUploadInput.value = '';
    return;
  }
});

document.addEventListener('change', (event) => {
  const target = event.target;
  if (target?.id === 'blockVisibleToggle') return;
  if (target?.id === 'blockWrapToggle') return;
  if (target?.id === 'filePreviewToggle') return;
  if (target?.id === 'textBoldToggle') return;
});

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    if (addDialog.open) addDialog.close();
    if (blockDialog.open) blockDialog.close();
    if (previewDialog.open) previewDialog.close();
    if (shareDialog.open) shareDialog.close();
    if (siteDialog.open) siteDialog.close();
  }
});

blockDialog.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    state.pendingSettingsBlockId = null;
    if (blockDialog.open) blockDialog.close();
  }
});

shareDialog.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (shareDialog.open) shareDialog.close();
  }
});

homeSettingsDialog.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && homeSettingsDialog.open) homeSettingsDialog.close();
});

siteDialog.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && siteDialog.open) siteDialog.close();
});

previewDialog.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && previewDialog.open) previewDialog.close();
});

window.addEventListener('hashchange', () => {
  const r = route();
  if (r.page === 'home') {
    state.mode = 'home';
    state.currentSiteId = null;
    renderApp();
    return;
  }
  if (r.page === 'site') {
    state.currentSiteId = r.siteId;
    state.mode = r.edit ? 'editor' : 'viewer';
    renderApp();
  }
});

function initialize() {
  loadState();
  updateAddBarOpacityLabel();

  const r = route();
  if (r.page === 'site' && state.sites.some((site) => site.id === r.siteId)) {
    state.currentSiteId = r.siteId;
    state.mode = r.edit ? 'editor' : 'viewer';
  } else {
    state.mode = 'home';
    state.currentSiteId = null;
  }

  renderApp();
}
