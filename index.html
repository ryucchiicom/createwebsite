<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreateWebsite</title>
  <meta name="description" content="メモを書くようにサイトを作って共有できるサービス" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f6f7fb;
      --surface:#ffffff;
      --surface-soft:rgba(255,255,255,.92);
      --surface-ghost:rgba(255,255,255,.58);
      --surface-muted:#f8fafc;
      --surface-dialog:#ffffff;
      --ink:#1c2430;
      --muted:#667085;
      --line:#e4e7ec;
      --brand:#5f63f2;
      --brand-dark:#494de4;
      --accent:#18a999;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(28,36,48,.12);
      --radius:22px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1220;
        --surface:#111827;
        --surface-soft:rgba(17,24,39,.90);
        --surface-ghost:rgba(17,24,39,.68);
        --surface-muted:#0f172a;
        --surface-dialog:#111827;
        --ink:#e5e7eb;
        --muted:#94a3b8;
        --line:#334155;
        --brand:#8b8cff;
        --brand-dark:#6f72ff;
        --accent:#2dd4bf;
        --danger:#f87171;
        --shadow:0 18px 50px rgba(0,0,0,.35);
      }
      body{
        background:
          radial-gradient(circle at top left, rgba(139,140,255,.16), transparent 34rem),
          radial-gradient(circle at 100% 10%, rgba(45,212,191,.12), transparent 28rem),
          var(--bg);
      }
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(95,99,242,.18), transparent 34rem),
        radial-gradient(circle at 100% 10%, rgba(24,169,153,.15), transparent 28rem),
        var(--bg);
      color:var(--ink);
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:0}
    textarea{resize:vertical}
    .app-shell{
      width:min(1120px,100%);
      margin:0 auto;
      padding:20px 16px 140px;
      position:relative;
      z-index:1;
    }
    .hidden{display:none !important}
    .hero{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
      align-items:stretch;
      margin:12px 0 20px;
    }
    .panel{
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter:blur(14px);
    }
    .eyebrow{color:var(--brand);font-weight:800;letter-spacing:.08em;font-size:.78rem}
    h1,h2,h3{margin:0;line-height:1.15}
    h1{font-size:clamp(2rem,7vw,4.5rem);letter-spacing:-.06em;margin-top:8px}
    h2{font-size:clamp(1.35rem,4vw,2.1rem)}
    h3{font-size:1.15rem}
    p{color:var(--muted);line-height:1.8}
    .hero-actions,.toolbar,.tabs,.choice-grid{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      background:var(--surface);
      color:var(--ink);
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .btn.primary{background:var(--brand);color:#fff;box-shadow:0 10px 24px rgba(95,99,242,.28)}
    .btn.primary:hover{background:var(--brand-dark)}
    .btn.danger{color:#fff;background:var(--danger);box-shadow:none}
    .btn.ghost{background:transparent}
    .btn.small{min-height:36px;padding:0 12px;font-size:.9rem}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .site-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
      margin-top:16px;
    }
    .site-card{
      text-align:left;
      width:100%;
      border-radius:20px;
      padding:16px;
      background:var(--surface);
      border:1px solid var(--line);
      transition:transform .15s, box-shadow .15s;
    }
    .site-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(28,36,48,.1)}
    .site-card strong{display:block;font-size:1.08rem;margin-bottom:8px}
    .site-card span{color:var(--muted);font-size:.9rem;word-break:break-all}
    .editor-layout{display:grid;gap:16px;align-items:start}
    .editor-top,.viewer-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }
    .field{display:grid;gap:7px;margin:12px 0}
    .field label{font-weight:800;font-size:.92rem}
    .field input,.field textarea,.field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      color:var(--ink);
    }
    .canvas{
      min-height:52vh;
      padding:18px;
      background:var(--surface-ghost);
      border:1px dashed #cdd3df;
      border-radius:var(--radius);
    }
    .empty{text-align:center;padding:60px 14px;color:var(--muted)}
    .block{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }
    .block.hidden-block{
      opacity:.55;
      border-style:dashed;
    }
    .block.move-source{
      outline:2px dashed var(--brand);
      outline-offset:2px;
    }
    .block-head{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    .rendered-text{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
    }
    .rendered-text.no-wrap{
      white-space:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      display:block;
      -webkit-overflow-scrolling:touch;
    }
    .editor-text{
      min-height:44px;
      outline:none;
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      max-width:100%;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:manipulation;
      padding:2px 0;
    }
    .editor-text:focus{outline:none}
    .file-editor{
      display:grid;
      gap:10px;
      margin-top:8px;
    }
    .file-preview-box{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--surface-muted);
      padding:12px;
      overflow:hidden;
    }
    .file-preview-box img,.file-preview-box video,.file-preview-box iframe{
      max-width:100%;
      width:100%;
      border:0;
      border-radius:12px;
      display:block;
    }
    .file-preview-box a{word-break:break-all}
    .file-drop{
      border:1px dashed var(--line);
      border-radius:16px;
      padding:12px;
      background:var(--surface-muted);
      color:var(--muted);
    }
    .file-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .file-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      background:var(--surface);
      border:1px solid var(--line);
      font-size:.88rem;
      font-weight:800;
      color:var(--muted);
    }
    .rich-editor{
      min-height:180px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:var(--surface);
      line-height:1.8;
      outline:none;
    }
    .rich-editor:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(95,99,242,.12);
    }
    .bottom-add-bar{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(720px, calc(100% - 48px));
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      padding:0;
      background:transparent;
      border:0;
      border-radius:0;
      box-shadow:none;
      z-index:50;
      pointer-events:auto;
      backdrop-filter:none;
    }
    .add-block-btn{
      min-height:44px;
      border-radius:999px;
      padding:0 18px;
      font-weight:800;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      width:min(680px, calc(100% - 64px));
      display:block;
      margin:0 auto;
      text-align:center;
    }
    .home-gear-btn{
      position:fixed;
      top:16px;
      right:16px;
      z-index:90;
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:var(--surface-soft);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      color:var(--ink);
      backdrop-filter: blur(12px);
    }
    dialog{
      width:min(760px, calc(100% - 24px));
      border:0;
      border-radius:26px;
      padding:0;
      box-shadow:var(--shadow);
      background:var(--surface-dialog);
      color:var(--ink);
    }
    dialog::backdrop{
      background:rgba(15,23,42,.42);
      backdrop-filter:blur(4px);
    }
    .dialog-body{padding:22px}
    .qr-box{
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      margin:10px auto 16px;
      border-radius:20px;
      background:var(--surface-muted);
      color:var(--muted);
      overflow:hidden;
    }
    .share-url{
      word-break:break-all;
      background:var(--surface-muted);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .tab,.choice-card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:9px 14px;
      font-weight:800;
      color:var(--ink);
    }
    .tab.active{
      color:#fff;
      background:var(--accent);
      border-color:var(--accent);
    }
    .tab:disabled{opacity:.45;cursor:not-allowed}
    .id-pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      color:var(--ink);
    }
    .notice{
      background:color-mix(in srgb, var(--brand) 14%, var(--surface));
      color:color-mix(in srgb, var(--brand) 55%, var(--ink));
      border-radius:16px;
      padding:12px;
      line-height:1.7;
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--muted);
      font-weight:800;
      font-size:.88rem;
    }
    .status-pill.good{color:#0f766e;background:#ecfdf5;border-color:#a7f3d0}
    .status-pill.warn{color:#92400e;background:#fffbeb;border-color:#fcd34d}
    .status-pill.bad{color:#991b1b;background:#fef2f2;border-color:#fecaca}
    .boot-wrap{
      display:grid;
      place-items:center;
      min-height:70vh;
    }
    .boot-card{
      width:min(640px,100%);
      background:var(--surface-soft);
      border:1px solid color-mix(in srgb, var(--surface) 76%, transparent);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:left;
    }
    .loader-line{
      display:flex;
      align-items:center;
      gap:14px;
      margin:18px 0 8px;
    }
    .loader{
      width:28px;
      height:28px;
      position:relative;
      display:inline-block;
    }
    .loader span{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--brand);
      left:50%;
      top:50%;
      transform-origin:-10px -10px;
      animation:orbit 1.1s linear infinite;
    }
    .loader span:nth-child(1){animation-delay:0s}
    .loader span:nth-child(2){animation-delay:.12s}
    .loader span:nth-child(3){animation-delay:.24s}
    .loader span:nth-child(4){animation-delay:.36s}
    @keyframes orbit{
      0%{transform:rotate(0deg) translate(10px) scale(1)}
      50%{transform:rotate(180deg) translate(10px) scale(.75);opacity:.65}
      100%{transform:rotate(360deg) translate(10px) scale(1)}
    }
    .choice-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      margin-top:14px;
    }
    .choice-card{
      border-radius:22px;
      padding:18px;
      text-align:left;
      min-height:92px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .choice-card strong{display:block;font-size:1.1rem;margin-bottom:4px}
    .choice-card span{display:block;color:var(--muted);font-size:.92rem;line-height:1.6}
    .split-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .mini-note{
      color:var(--muted);
      font-size:.9rem;
      line-height:1.65;
    }
    @media (max-width:820px){
      .hero,.editor-layout,.split-grid{grid-template-columns:1fr}
      .editor-top,.viewer-top{
        align-items:stretch;
        flex-direction:column;
      }
      .toolbar .btn{flex:1}
      .bottom-add-bar{
        border-radius:24px;
        align-items:center;
        flex-direction:column;
      }
      .home-gear-btn{
        top:12px;
        right:12px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>

  <dialog id="homeSettingsDialog">
    <div class="dialog-body">
      <h2>画面設定</h2>
      <p>下の「＋ 追加」バーの透過度を変えられます。</p>
      <div class="field">
        <label for="addBarOpacityRange">＋追加の透過度：<span id="addBarOpacityValue">92%</span></label>
        <input id="addBarOpacityRange" type="range" min="0" max="100" step="1" />
      </div>
      <div class="toolbar">
        <button class="btn" id="homeSettingsCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="addTypeDialog">
    <div class="dialog-body">
      <h2>追加するブロック</h2>
      <p>テキストかファイルを選べます。</p>
      <div class="choice-grid">
        <button class="choice-card" data-add-type="text" type="button">
          <strong>テキスト</strong>
          <span>いつも通りの文字ブロック。色やサイズ、ファイルリンクも使えます。</span>
        </button>
        <button class="choice-card" data-add-type="file" type="button">
          <strong>ファイル</strong>
          <span>アップロードや貼り付けで入れられるファイルブロックです。</span>
        </button>
      </div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="addTypeCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="siteSettingsDialog">
    <div class="dialog-body">
      <h2>設定</h2>
      <p>ここでは公開範囲や共同編集Keyをまとめて管理できます。</p>
      <div class="field">
        <label>
          <input id="sitePublicToggle" type="checkbox" />
          公開する
        </label>
      </div>
      <div class="field">
        <label for="siteKeyInput">共同編集Key</label>
        <input id="siteKeyInput" placeholder="例：abc123" />
      </div>
      <div class="toolbar">
        <button class="btn" id="siteClearKeyBtn" type="button">Keyを消す</button>
        <button class="btn danger" id="siteDeleteBtn" type="button">サイト削除</button>
      </div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="siteSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="siteSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="blockSettingsDialog">
    <div class="dialog-body">
      <h2>ブロック設定</h2>
      <p>表示方法を調整できます。</p>
      <div class="field">
        <label>
          <input id="blockVisibleToggle" type="checkbox" />
          表示する
        </label>
      </div>
      <div class="field">
        <label>
          <input id="blockWrapToggle" type="checkbox" />
          文字を折り返す
        </label>
      </div>
      <div class="field">
        <label>
          <input id="blockHeightToggle" type="checkbox" />
          縦の大きさを指定する
        </label>
      </div>
      <div class="field hidden" id="blockRowsField">
        <label for="blockRowsInput">行数</label>
        <input id="blockRowsInput" type="number" min="1" max="50" step="1" />
      </div>
      <div class="field hidden" id="filePreviewField">
        <label>
          <input id="filePreviewToggle" type="checkbox" />
          ファイルをプレビュー
        </label>
        <p class="mini-note">ONなら、ファイルリンクを押したときにポップアップ表示になります。</p>
      </div>
      <div class="toolbar">
        <button class="btn" id="blockSettingsCancelBtn" type="button">キャンセル</button>
        <button class="btn primary" id="blockSettingsSaveBtn" type="button">保存して閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="mergeDialog">
    <div class="dialog-body">
      <h2>ID統合</h2>
      <p>現在の自分の表示IDを、別のIDにまとめます。今のサイト一覧表示もそのIDへ移ります。</p>
      <div class="field">
        <label for="mergeTargetInput">統合先ID</label>
        <input id="mergeTargetInput" placeholder="例：abcd1234" />
      </div>
      <div class="toolbar">
        <button class="btn" id="mergeCancelBtn" type="button">キャンセル</button>
        <button class="btn danger" id="mergeExecuteBtn" type="button">実行</button>
      </div>
    </div>
  </dialog>

  <dialog id="idDialog">
    <div class="dialog-body">
      <h2>自分のID</h2>
      <p>IDは作成したサイトの持ち主判定に使います。普段は伏せて表示します。</p>
      <button class="id-pill" id="ownerIdBtn" type="button">ID: ••••</button>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyIdBtn" type="button">IDコピー</button>
        <button class="btn danger" id="mergeIdBtn" type="button">ID統合</button>
        <button class="btn" id="closeIdBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="shareDialog">
    <div class="dialog-body">
      <h2>共有</h2>
      <div class="tabs" id="shareTabs">
        <button class="tab active" data-share-tab="view" type="button">閲覧用</button>
        <button class="tab" data-share-tab="edit" type="button">共同編集用</button>
      </div>
      <p class="notice" id="shareNotice">共有リンクを確認できます。</p>
      <div class="qr-box" id="qrBox">生成中…</div>
      <div class="share-url" id="shareUrl"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" id="copyShareBtn" type="button">URLコピー</button>
        <button class="btn primary" id="webShareBtn" type="button">共有する</button>
        <button class="btn" id="closeShareBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <dialog id="filePreviewDialog">
    <div class="dialog-body">
      <h2 id="filePreviewTitle">ファイルプレビュー</h2>
      <div class="file-preview-box" id="filePreviewBody" style="margin-top:12px"></div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn primary" id="filePreviewDownloadBtn" type="button">ダウンロード</button>
        <button class="btn" id="filePreviewCloseBtn" type="button">閉じる</button>
      </div>
    </div>
  </dialog>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
    import {
      getFirestore,
      collection,
      getDocs,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc,
      doc,
      arrayUnion
    } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCYRh2cUMa4ecUmU9tpOT_ExrZcsYdVyHI",
      authDomain: "createwebsite-274dd.firebaseapp.com",
      projectId: "createwebsite-274dd",
      storageBucket: "createwebsite-274dd.firebasestorage.app",
      messagingSenderId: "646970295160",
      appId: "1:646970295160:web:a3f9b6f07c067a1782be8d",
      measurementId: "G-RN71HFCTGL"
    };

    const COLLECTION = 'websites';
    const OWNER_COOKIE = 'createwebsiteCreatorId';
    const ADD_BAR_OPACITY_KEY = 'createwebsite:addBarOpacity:v1';

    const appRoot = document.getElementById('app');
    const homeSettingsDialog = document.getElementById('homeSettingsDialog');
    const addTypeDialog = document.getElementById('addTypeDialog');
    const addBarOpacityRange = document.getElementById('addBarOpacityRange');
    const addBarOpacityValue = document.getElementById('addBarOpacityValue');
    const siteSettingsDialog = document.getElementById('siteSettingsDialog');
    const sitePublicToggle = document.getElementById('sitePublicToggle');
    const siteKeyInput = document.getElementById('siteKeyInput');
    const siteDeleteBtn = document.getElementById('siteDeleteBtn');
    const siteClearKeyBtn = document.getElementById('siteClearKeyBtn');
    const blockSettingsDialog = document.getElementById('blockSettingsDialog');
    const blockVisibleToggle = document.getElementById('blockVisibleToggle');
    const blockWrapToggle = document.getElementById('blockWrapToggle');

    const state = {
      db: null,
      uid: '',
      ready: false,
      mode: 'loading',
      homeSites: [],
      homeTab: 'mine',
      homeSearch: '',
      current: null,
      currentSaved: false,

      moveBlockId: null,

    let longPressTimer = null;
    let longPressCandidateId = null;

    function uid8() {
      if (crypto?.randomUUID) return crypto.randomUUID().replace(/-/g, '').slice(0, 8);
      return Math.random().toString(36).slice(2, 10);
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function htmlToPlainText(html) {
      const div = document.createElement('div');
      div.innerHTML = String(html ?? '');
      return div.innerText || div.textContent || '';
    }

    function sanitizeRichHtml(value) {
      const template = document.createElement('template');
      template.innerHTML = String(value ?? '');

      template.content.querySelectorAll('*').forEach((node) => {
        if (!['BR', 'STRONG', 'B', 'SPAN', 'A', 'IMG', 'VIDEO', 'IFRAME'].includes(node.tagName)) {
          node.replaceWith(...node.childNodes);
          return;
        }

        if (node.tagName === 'SPAN') {
          const color = node.style.color;
          const fontSize = node.style.fontSize;
          node.removeAttribute('style');
          if (color) node.style.color = color;
          if (fontSize) node.style.fontSize = fontSize;
        } else if (node.tagName === 'A') {
          const href = node.getAttribute('href') || '';
          const target = node.getAttribute('target') || '';
          const rel = node.getAttribute('rel') || '';
          node.replaceWith(node.cloneNode(true));
          const clone = template.content.querySelector('a[href="' + CSS.escape(href) + '"]');
          if (clone) {
            clone.setAttribute('href', href);
            if (target) clone.setAttribute('target', target);
            if (rel) clone.setAttribute('rel', rel);
          }
        } else if (node.tagName === 'IMG') {
          const src = node.getAttribute('src') || '';
          node.setAttribute('src', src);
          node.setAttribute('alt', node.getAttribute('alt') || '');
          node.removeAttribute('onerror');
        } else if (node.tagName === 'VIDEO' || node.tagName === 'IFRAME') {
          [...node.attributes].forEach((attr) => {
            if (!['src', 'controls', 'allow', 'allowfullscreen', 'title', 'loading'].includes(attr.name)) {
              node.removeAttribute(attr.name);
            }
          });
        } else {
          [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
        }
      });

      return template.innerHTML;
    }

    function isImageMime(mime) {
      return String(mime || '').startsWith('image/');
    }

    function isTextLikeMime(mime) {
      return String(mime || '').startsWith('text/') || ['application/json', 'application/xml', 'application/javascript'].includes(String(mime || ''));
    }

    function getStandaloneStyleCommand(input) {
      const text = String(input ?? '').replace(/\r\n?/g, '\n');
      const colorMatch = text.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
      if (colorMatch) return { type: 'color', value: `#${colorMatch[1]}` };
      const sizeMatch = text.match(/^#(\d{1,3})$/);
      if (sizeMatch) return { type: 'size', value: String(Math.max(1, Math.min(256, Number(sizeMatch[1]) || 16))) };
      return null;
    }

    function linkifyPlainText(text) {
      const safe = esc(text);
      return safe.replace(/(https?:\/\/[^\s<]+)/g, (m) => `<a href="${esc(m)}" target="_blank" rel="noopener noreferrer">${esc(m)}</a>`);
    }

    function parseInlineFormatted(text) {
      const src = String(text ?? '').replace(/\r\n?/g, '\n');
      let out = '';
      let i = 0;

      const pushPlain = (plain) => {
        if (!plain) return;
        const parts = String(plain).split('\n');
        for (let j = 0; j < parts.length; j += 1) {
          if (j > 0) out += '<br>';
          out += linkifyPlainText(parts[j]);
        }
      };

      while (i < src.length) {
        const rest = src.slice(i);

        const fileMatch = rest.match(/^file\(([^)\n]+)\)'([^']*)'/);
        if (fileMatch) {
          out += `<a href="#" data-file-link="${esc(fileMatch[1].trim())}">${parseInlineFormatted(fileMatch[2])}</a>`;
          i += fileMatch[0].length;
          continue;
        }

        const colorMatch = rest.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})'([^']*)'/);
        if (colorMatch) {
          out += `<span style="color:#${colorMatch[1]}">${parseInlineFormatted(colorMatch[2])}</span>`;
          i += colorMatch[0].length;
          continue;
        }

        const sizeMatch = rest.match(/^#(\d{1,3})'([^']*)'/);
        if (sizeMatch) {
          const px = Math.max(1, Math.min(256, Number(sizeMatch[1]) || 16));
          out += `<span style="font-size:${px}px">${parseInlineFormatted(sizeMatch[2])}</span>`;
          i += sizeMatch[0].length;
          continue;
        }

        const plainStop = src.slice(i).search(/file\(|#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6}|\d{1,3})'/);
        if (plainStop === -1) {
          pushPlain(src.slice(i));
          break;
        }
        pushPlain(src.slice(i, i + plainStop));
        i += plainStop;
      }

      return out;
    }

    function detectPastedContentKind(text) {
      const value = String(text ?? '').trim();
      if (!value) return 'text';
      if (/^\s*<(!doctype|html|body|div|span|p|a|img|svg|table|ul|ol|li|section|article|header|footer|main|h1|h2|h3|h4|h5|h6)\b/i.test(value) || /<\/[a-z][\s\S]*>/i.test(value)) return 'html';
      if (/^\s*https?:\/\/\S+\s*$/i.test(value)) return 'url';
      return 'text';
    }

    function fileBlockToHtml(block) {
      if (!block) return '';
      const kind = String(block.fileKind || 'text');
      const text = String(block.fileText || '');
      const dataUrl = String(block.fileDataUrl || '');
      if (kind === 'html') return sanitizeRichHtml(text);
      if (kind === 'url') {
        const url = text.trim();
        if (!url) return '';
        return `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`;
      }
      if (kind === 'binary') {
        if (isImageMime(block.fileMime) && dataUrl) {
          return `<img src="${esc(dataUrl)}" alt="${esc(block.fileName || 'image')}" style="max-width:100%;border-radius:14px;display:block" />`;
        }
        if (dataUrl && block.fileMime === 'application/pdf') {
          return `<iframe src="${esc(dataUrl)}" title="${esc(block.fileName || 'PDF')}" style="width:100%;height:420px;border:0;border-radius:14px"></iframe>`;
        }
        return `<div class="file-drop">このファイルはプレビュー表示できません。ファイル名を押すとダウンロードできます。</div>`;
      }
      const plain = text || '';
      return parseInlineFormatted(plain);
    }

    function safeJson(value) {
      return JSON.stringify(value).replace(/</g, '\\u003c');
    }

    function normalizeBlockData(block = {}) {
      const type = block.type === 'file' ? 'file' : 'text';
      const common = {
        id: block.id || uid8(),
        type,
        visible: block.visible !== false,
        wrap: block.wrap !== false,
        heightEnabled: block.heightEnabled === true,
        rows: Math.max(1, Math.min(50, Number(block.rows || 3) || 3))
      };

      if (type === 'file') {
        const fileName = String(block.fileName || block.name || block.title || 'file').trim() || 'file';
        const fileText = String(block.fileText ?? block.text ?? block.source ?? '').replace(/\r\n?/g, '\n');
        const fileKind = block.fileKind || detectPastedContentKind(fileText);
        return {
          ...common,
          fileName,
          filePreview: block.filePreview !== false,
          fileKind,
          fileText,
          fileDataUrl: String(block.fileDataUrl || ''),
          fileMime: String(block.fileMime || ''),
          source: fileText,
          html: fileBlockToHtml({ fileKind, fileText, fileDataUrl: block.fileDataUrl, fileMime: block.fileMime, fileName })
        };
      }

      const source = String(block.source ?? block.text ?? block.html ?? '').replace(/\r\n?/g, '\n');
      const html = typeof block.html === 'string' && block.html.trim()
        ? sanitizeRichHtml(block.html)
        : parseInlineFormatted(source);

      return {
        ...common,
        source,
        html
      };
    }

    function normalizeSite(siteId, data = {}) {
      return {
        siteId: siteId || data.siteId || uid8(),
        title: data.title || '無題のサイト',
        key: data.key || '',
        ownerUid: data.ownerUid || '',
        creatorId: data.creatorId || creatorId(),
        collaborators: Array.isArray(data.collaborators) ? data.collaborators : [],
        blocks: Array.isArray(data.blocks) ? data.blocks.map(normalizeBlockData) : [],
        isPublic: data.isPublic !== false,
        collaborative: Boolean(data.collaborative || data.key),
        createdAt: data.createdAt || Date.now(),
        updatedAt: data.updatedAt || Date.now()
      };
    }

    function blockHeightStyle(block) {
      if (!block.heightEnabled) return '';
      const rows = Math.max(1, Math.min(50, Number(block.rows || 3) || 3));
      return `min-height: calc(${rows} * 1.8em + 28px);`;
    }

    function isMine(site) {
      return Boolean(site && site.ownerUid && site.ownerUid === state.uid);
    }

    function isCollaborator(site) {
      return Boolean(site && Array.isArray(site.collaborators) && site.collaborators.includes(state.uid));
    }

    function isCurrentCreator() {
      return Boolean(state.current && state.current.creatorId === creatorId());
    }

    function canEditCurrent() {
      const site = state.current;
      if (!site) return false;
      if (site.key && state.currentAccess === 'key') return true;
      return isMine(site) || isCollaborator(site);
    }

    function currentShareUrl() {
      if (!state.currentSaved || !state.current) return '';
      const key = state.shareMode === 'edit' && state.current.key ? state.current.key : null;
      return siteUrl(state.current.siteId, key);
    }

    function siteSearchText(site) {
      const blockText = (site.blocks || [])
        .filter((b) => b.visible !== false)
        .map((b) => {
          if (b.type === 'file') return `${b.fileName || ''} ${b.fileText || ''}`;
          return String(b.source || htmlToPlainText(b.html || '')).replace(/<[^>]+>/g, ' ');
        })
        .join(' ');
      return `${site.title || ''} ${blockText}`.toLowerCase();
    }

    function filterSites(list, query) {
      const q = String(query || '').trim().toLowerCase();
      if (!q) return list.slice();
      const terms = q.split(/\s+/).filter(Boolean);
      return list.filter((site) => {
        const blob = siteSearchText(site);
        return terms.every((term) => blob.includes(term));
      });
    }

    function mineSites() {
      return state.homeSites
        .filter((site) => isMine(site) || isCollaborator(site))
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function publicSites() {
      return state.homeSites
        .filter((site) => site.isPublic !== false)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    }

    function syncCurrentUrl() {
      if (!state.currentSaved || !state.current) return;
      const key = state.currentAccess === 'key' && state.current.key ? state.current.key : null;
      history.replaceState(null, '', siteUrl(state.current.siteId, key));
    }

    function basePageUrl() {
      return `${location.origin}${location.pathname.replace(/index\.html$/, '')}`;
    }

    function siteUrl(siteId, key = null) {
      if (!siteId) return basePageUrl();
      return `${basePageUrl()}#/${siteId}${key ? `/${key}` : ''}`;
    }

    function parseRoute() {
      const hash = decodeURI(location.hash || '');
      if (!hash.startsWith('#/')) return { name: 'home', siteId: null, key: null };
      const parts = hash.slice(2).split('/');
      const siteId = parts[0] || null;
      const key = parts[1] || null;
      if (siteId === 'create') return { name: 'create', siteId: null, key: null };
      return { name: 'site', siteId, key };
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split('; ') : [];
      for (const part of parts) {
        const idx = part.indexOf('=');
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : '');
      }
      return '';
    }

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function creatorId() {
      let id = getCookie(OWNER_COOKIE);
      if (!id) {
        id = uid8();
        setCookie(OWNER_COOKIE, id);
      }
      return id;
    }

    function setCreatorId(newId) {
      const normalized = String(newId || '').trim().slice(0, 32);
      if (!normalized) return false;
      setCookie(OWNER_COOKIE, normalized);
      return true;
    }

    function isDarkMode() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function addBlockButtonStyle() {
      const alpha = Math.max(0, Math.min(1, Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92));
      if (isDarkMode()) return `background:rgba(17,24,39,${alpha});color:#fff;border:1px solid rgba(255,255,255,.12);`;
      return `background:rgba(255,255,255,${alpha});color:#111827;border:1px solid rgba(17,24,39,.08);`;
    }

    function persistAddBarOpacity(value) {
      const clamped = Math.max(0, Math.min(1, Number.isFinite(Number(value)) ? Number(value) : 0.92));
      state.addBarOpacity = clamped;
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(clamped));
      updateAddBarOpacityLabel();
      if (state.mode === 'editor') renderApp();
    }

    function updateAddBarOpacityLabel() {
      const current = Number.isFinite(Number(state.addBarOpacity)) ? Number(state.addBarOpacity) : 0.92;
      const percent = Math.round(current * 100);
      addBarOpacityValue.textContent = `${percent}%`;
      addBarOpacityRange.value = String(percent);
    }

    function drawViewerScreen() {
      const site = state.current;
      const blocks = (site?.blocks || [])
        .filter((block) => block.visible !== false)
        .map((block) => {
          const normalized = normalizeBlockData(block);
          if (normalized.type === 'file') {
            return `
              <article class="block" style="${blockHeightStyle(normalized)}">
                <div class="block-head">
                  <div style="font-weight:900">${esc(normalized.fileName || 'ファイル')}</div>
                  <div class="toolbar">
                    <button class="btn small" data-file-open="${esc(normalized.id)}" type="button">${normalized.filePreview ? '開く' : 'ダウンロード'}</button>
                    <button class="btn small" data-file-download="${esc(normalized.id)}" type="button">保存</button>
                  </div>
                </div>
                <div class="file-preview-box">${fileBlockToHtml(normalized) || '<div class="file-drop">プレビューなし</div>'}</div>
              </article>
            `;
          }
          return `
            <article class="block" style="${blockHeightStyle(normalized)}">
              <div class="rendered-text${normalized.wrap === false ? ' no-wrap' : ''}">${normalized.html || ''}</div>
            </article>
          `;
        }).join('');

      const statusHtml = canEditCurrent()
        ? `<span class="status-pill good">${state.currentAccess === 'key' ? '共同編集モード' : '編集可能'}</span>`
        : `<span class="status-pill warn">閲覧モード</span>`;

      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
            <div class="toolbar" style="justify-content:flex-end">
              ${statusHtml}
              <button class="btn" id="viewerShareBtn" type="button">共有</button>
              <button class="btn primary" id="viewerEditBtn" type="button" ${canEditCurrent() ? '' : 'hidden'}>編集する</button>
            </div>
          </div>
          <h2>${esc(site?.title || 'サイト')}</h2>
          <div class="canvas" style="margin-top:14px">
            ${blocks || '<div class="empty">本文がありません。</div>'}
          </div>
        </div>
      `;
    }

    function drawEditorScreen() {
      const site = state.current;
      const canShowSiteSettings = isCurrentCreator();
      const blocks = (site?.blocks || []).map((block, index) => {
        const normalized = normalizeBlockData(block);
        return normalized.type === 'file'
          ? renderFileBlockCard(normalized, index)
          : renderTextBlockCard(normalized, index);
      }).join('');

      const backLabel = state.currentSaved ? '← 戻る' : '← 一覧へ';

      appRoot.innerHTML = `
        <div class="editor-top">
          <div>
            <button class="btn ghost" id="backBtn" type="button">${backLabel}</button>
            <h2 id="editorHeading">${esc(site?.title || '無題のサイト')}</h2>
          </div>
          <div class="toolbar">
            ${canShowSiteSettings ? '<button class="btn" id="siteSettingsBtn" type="button">⚙️ 設定</button>' : ''}
            <button class="btn" id="shareBtn" type="button">共有</button>
            <button class="btn primary" id="saveBtn" type="button">保存</button>
          </div>
        </div>

        <div class="editor-layout">
          <section class="panel">
            <h3>サイト</h3>
            <div class="field">
              <label for="titleInput">サイトタイトル</label>
              <input id="titleInput" placeholder="例：自己紹介" value="${esc(site?.title || '')}">
            </div>
          </section>

          <section class="panel">
            <div class="toolbar" style="justify-content:space-between;margin-bottom:12px">
              <h3>本文</h3>
            </div>
            <div class="canvas" id="blockCanvas">${blocks || '<div class="empty">下の「＋ 追加」から本文を追加してください。</div>'}</div>
          </section>
        </div>

        <div class="bottom-add-bar" id="bottomAddBar">
          <button class="add-block-btn" id="addBlockBtn" type="button" style="${addBlockButtonStyle()}">＋ 追加</button>
        </div>
      `;
    }

    function drawMissingScreen(message = 'このリンクのサイトは見つかりませんでした。') {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>サイトが見つかりません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">${esc(message)}</div>
          </div>
        </div>
      `;
    }

    function drawDeniedScreen() {
      appRoot.innerHTML = `
        <div class="panel">
          <div class="viewer-top">
            <button class="btn ghost" id="viewerHomeBtn" type="button">← 一覧へ</button>
          </div>
          <h2>アクセスできません</h2>
          <div class="canvas" style="margin-top:14px">
            <div class="empty">このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。</div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      if (state.mode === 'loading') drawLoadingScreen();
      else if (state.mode === 'home') drawHomeScreen();
      else if (state.mode === 'viewer') drawViewerScreen();
      else if (state.mode === 'editor') drawEditorScreen();
      else if (state.mode === 'missing') drawMissingScreen();
      else if (state.mode === 'denied') drawDeniedScreen();
      else if (state.mode === 'boot-failed') drawBootErrorScreen();
    }

    function setCurrentSite(site, saved = true) {
      state.current = site ? structuredClone(normalizeSite(site.siteId, site)) : null;
      if (state.current) state.current.blocks = (state.current.blocks || []).map(normalizeBlockData);
      state.currentSaved = !!saved;
      state.editingBlockId = null;
      state.moveBlockId = null;
    }

    function createDraftSite() {
      const id = uid8();
      return normalizeSite(id, {
        siteId: id,
        title: '無題のサイト',
        ownerUid: state.uid,
        creatorId: creatorId(),
        key: '',
        blocks: [
          { id: uid8(), type: 'text', source: "こんにちは\n#ff0000'赤文字'\nfile(あ)'こちら'を押してね", visible: true, wrap: true, heightEnabled: false, rows: 3 },
          { id: uid8(), type: 'file', fileName: 'あ', filePreview: true, fileKind: 'text', fileText: 'ここにファイル内容を入れます', fileDataUrl: '', fileMime: 'text/plain', visible: true, wrap: true, heightEnabled: false, rows: 3 }
        ],
        isPublic: true,
        collaborative: false,
        collaborators: [],
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    function openNewDraft() {
      if (!state.ready) return;
      const draft = createDraftSite();
      openEditorScreen(draft, false, 'owner', false);
      location.hash = '#/create';
    }

    function openEditorScreen(site, saved = true, access = 'view', sync = true) {
      setCurrentSite(site, saved);
      state.currentAccess = access;
      state.mode = 'editor';
      renderApp();
      if (sync) syncCurrentUrl();
      focusBlockByIdIfNeeded();
    }

    function openViewerScreen(site, access = 'view', sync = true) {
      setCurrentSite(site, true);
      state.currentAccess = access;
      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function focusBlockByIdIfNeeded() {
      if (!state.editingBlockId) return;
      const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(state.editingBlockId)}"]`);
      if (!el) return;
      requestAnimationFrame(() => {
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function placeCaretAtEnd(el) {
      if (!el) return;
      const selection = window.getSelection();
      if (!selection) return;
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function openBlockSettingsModal(blockId = null) {
      if (!state.current) return;
      state.pendingBlockSettingsId = blockId;
      const target = blockId ? state.current.blocks.find((b) => b.id === blockId) : null;
      if (!target) return;
      blockVisibleToggle.checked = target.visible !== false;
      blockWrapToggle.checked = target.wrap !== false;
      blockHeightToggle.checked = target.heightEnabled === true;
      blockRowsInput.value = String(Math.max(1, Math.min(50, Number(target.rows || 3) || 3)));
      blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
      filePreviewField.classList.toggle('hidden', target.type !== 'file');
      if (target.type === 'file') filePreviewToggle.checked = target.filePreview !== false;
      if (!blockSettingsDialog.open) blockSettingsDialog.showModal();
    }

    function openSiteSettingsModal() {
      if (!state.current || !isCurrentCreator()) return;
      sitePublicToggle.checked = state.current.isPublic !== false;
      siteKeyInput.value = state.current.key || '';
      siteDeleteBtn.classList.toggle('hidden', !isCurrentCreator());
      siteClearKeyBtn.classList.toggle('hidden', !isCurrentCreator());
      if (!siteSettingsDialog.open) siteSettingsDialog.showModal();
    }

    function openHomeSettingsModal() {
      updateAddBarOpacityLabel();
      if (!homeSettingsDialog.open) homeSettingsDialog.showModal();
    }

    function openMergeModal() {
      mergeTargetInput.value = '';
      if (!mergeDialog.open) mergeDialog.showModal();
      requestAnimationFrame(() => mergeTargetInput.focus());
    }

    function showShareModal() {
      if (!state.current) {
        alert('先にサイトを開いてください。');
        return;
      }
      if (!state.currentSaved) {
        alert('先に保存してね。');
        return;
      }
      state.shareMode = 'view';
      shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.shareTab === 'view'));
      const editBtn = shareTabs.querySelector('[data-share-tab="edit"]');
      if (editBtn) editBtn.disabled = !state.current.key;
      syncShareDialog();
      if (!shareDialog.open) shareDialog.showModal();
    }

    function syncShareDialog() {
      const url = currentShareUrl();
      shareUrlEl.textContent = url || '保存後に共有リンクが出るよ';
      if (!state.current) shareNoticeEl.textContent = '先にサイトを開いてください。';
      else if (!state.currentSaved) shareNoticeEl.textContent = '先に保存してね。';
      else if (state.shareMode === 'edit' && !state.current.key) shareNoticeEl.textContent = '共同編集Keyが未設定です。';
      else if (state.shareMode === 'edit') shareNoticeEl.textContent = 'このリンクを開くと共同編集者として追加されます。';
      else shareNoticeEl.textContent = 'このリンクは閲覧用です。';

      qrBox.innerHTML = '生成中…';
      setTimeout(() => {
        qrBox.innerHTML = '';
        if (window.QRCode && url) new QRCode(qrBox, { text: url, width: 200, height: 200 });
        else qrBox.textContent = 'QRライブラリを読み込めませんでした';
      }, 120);
    }

    async function loadAllSites() {
      if (!state.db) return [];
      const snapshot = await getDocs(collection(state.db, COLLECTION));
      state.homeSites = snapshot.docs.map((d) => normalizeSite(d.id, d.data() || {}));
      return state.homeSites;
    }

    async function loadSiteById(siteId) {
      if (!state.db || !siteId) return null;
      const snap = await getDoc(doc(state.db, COLLECTION, siteId));
      if (!snap.exists()) return null;
      const site = normalizeSite(snap.id, snap.data() || {});
      site.blocks = (site.blocks || []).map(normalizeBlockData);
      return site;
    }

    function showMissingSite(message) {
      state.current = {
        siteId: 'missing',
        title: 'サイトが見つかりません',
        blocks: [{ id: 'missing', type: 'text', source: '', html: message || 'このリンクのサイトは見つかりませんでした。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'missing';
      renderApp();
    }

    function showDeniedSite() {
      state.current = {
        siteId: 'denied',
        title: 'アクセスできません',
        blocks: [{ id: 'denied', type: 'text', source: '', html: 'このサイトは非公開です。正しい閲覧リンクか共同編集Keyが必要です。', visible: true, wrap: true, heightEnabled: false, rows: 3 }]
      };
      state.currentSaved = true;
      state.mode = 'denied';
      renderApp();
    }

    async function saveHomeSettings() {
      localStorage.setItem(ADD_BAR_OPACITY_KEY, String(state.addBarOpacity));
      if (homeSettingsDialog.open) homeSettingsDialog.close();
      if (state.mode === 'editor') renderApp();
    }

    async function saveSiteSettings() {
      if (!state.current || !state.db || !isCurrentCreator()) return;

      state.current.isPublic = !!sitePublicToggle.checked;
      state.current.key = String(siteKeyInput.value || '').trim();
      state.current.collaborative = Boolean(state.current.key);
      state.current.updatedAt = Date.now();

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        isPublic: state.current.isPublic,
        key: state.current.key,
        collaborative: state.current.collaborative,
        updatedAt: state.current.updatedAt
      }, { merge: true });

      await loadAllSites();
      if (siteSettingsDialog.open) siteSettingsDialog.close();
      renderApp();
      syncCurrentUrl();
    }

    async function clearSiteKey() {
      if (!state.current || !state.db || !isCurrentCreator()) return;
      siteKeyInput.value = '';
      state.current.key = '';
      state.current.collaborative = false;
      state.current.updatedAt = Date.now();
      await setDoc(doc(state.db, COLLECTION, state.current.siteId), { key: '', collaborative: false, updatedAt: state.current.updatedAt }, { merge: true });
      await loadAllSites();
      renderApp();
      syncCurrentUrl();
    }

    async function deleteCurrentSite() {
      if (!state.current || !state.db || !isCurrentCreator()) return;
      const ok = confirm('このサイトを削除しますか？');
      if (!ok) return;
      await deleteDoc(doc(state.db, COLLECTION, state.current.siteId));
      state.current = null;
      state.currentSaved = false;
      state.currentAccess = 'view';
      location.hash = '';
      state.mode = 'home';
      await loadAllSites();
      renderApp();
    }

    function saveBlockSettings() {
      if (!state.current || !state.db || !state.pendingBlockSettingsId) return;
      const target = state.current.blocks.find((b) => b.id === state.pendingBlockSettingsId);
      if (!target) return;
      target.visible = !!blockVisibleToggle.checked;
      target.wrap = !!blockWrapToggle.checked;
      target.heightEnabled = !!blockHeightToggle.checked;
      target.rows = target.heightEnabled ? Math.max(1, Math.min(50, Number(blockRowsInput.value || 3) || 3)) : (target.rows || 3);
      if (target.type === 'file') target.filePreview = !!filePreviewToggle.checked;
      state.current.updatedAt = Date.now();

      setDoc(doc(state.db, COLLECTION, state.current.siteId), {
        blocks: state.current.blocks.map((b) => normalizeBlockData(b)),
        updatedAt: state.current.updatedAt
      }, { merge: true }).then(async () => {
        await loadAllSites();
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        renderApp();
      });
    }

    async function executeIdMerge() {
      if (!state.db) return;
      const target = String(mergeTargetInput.value || '').trim();
      if (!target) {
        alert('統合先IDを入れてね');
        return;
      }
      const oldId = creatorId();
      if (target === oldId) {
        alert('同じIDだよ');
        return;
      }
      const snapshot = await getDocs(collection(state.db, COLLECTION));
      const matches = snapshot.docs.filter((d) => {
        const data = d.data() || {};
        return data.creatorId === oldId;
      });
      if (!matches.length) {
        setCreatorId(target);
        await loadAllSites();
        renderApp();
        if (mergeDialog.open) mergeDialog.close();
        return;
      }
      await Promise.all(matches.map((d) => setDoc(doc(state.db, COLLECTION, d.id), { creatorId: target }, { merge: true })));
      setCreatorId(target);
      if (state.current && state.current.creatorId === oldId) state.current.creatorId = target;
      await loadAllSites();
      renderApp();
      if (mergeDialog.open) mergeDialog.close();
      alert('IDを統合しました。');
    }

    async function saveCurrentSite() {
      if (!state.current || !state.db) {
        alert('先にサイトを作ってね');
        return;
      }

      const titleInput = document.getElementById('titleInput');
      const title = String(titleInput?.value || '').trim() || '無題のサイト';

      state.current.title = title;
      state.current.updatedAt = Date.now();
      state.current.ownerUid = state.current.ownerUid || state.uid;
      state.current.creatorId = state.current.creatorId || creatorId();
      state.current.blocks = (state.current.blocks || []).map(normalizeBlockData);

      const payload = {
        ...state.current,
        blocks: state.current.blocks.map((b) => normalizeBlockData(b)),
        collaborators: Array.isArray(state.current.collaborators) ? state.current.collaborators : [],
        updatedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, state.current.siteId), payload, { merge: true });
      state.currentSaved = true;
      state.current = normalizeSite(state.current.siteId, payload);
      await loadAllSites();
      state.mode = 'editor';
      renderApp();
      syncCurrentUrl();
      alert('保存しました。');
    }

    async function openSiteById(siteId, key = null, sync = true) {
      if (!state.ready) return;
      const site = await loadSiteById(siteId);
      if (!site) {
        showMissingSite();
        return;
      }

      if (key && site.key && key === site.key) {
        try {
          await updateDoc(doc(state.db, COLLECTION, site.siteId), {
            collaborators: arrayUnion(state.uid),
            collaborative: true
          });
          site.collaborators = Array.from(new Set([...(site.collaborators || []), state.uid]));
          site.collaborative = true;
          state.currentAccess = 'key';
        } catch (error) {
          console.error(error);
          state.currentAccess = 'key';
          alert('共同編集者の登録に失敗しました。Firestoreルールを確認してね。');
        }
      } else if (isMine(site)) {
        state.currentAccess = 'owner';
      } else if (isCollaborator(site)) {
        state.currentAccess = 'collaborator';
      } else {
        state.currentAccess = 'view';
      }

      state.current = site;
      state.currentSaved = true;
      if (site.isPublic === false && !canEditCurrent()) {
        showDeniedSite();
        return;
      }
      state.mode = 'viewer';
      renderApp();
      if (sync) syncCurrentUrl();
    }

    function reloadHomeSites() {
      loadAllSites().then(() => {
        if (state.mode === 'home') renderApp();
      });
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      longPressCandidateId = null;
    }

    function handleLongPressCandidate(blockId) {
      if (!blockId || !state.current || state.mode !== 'editor') return;
      if (state.moveBlockId === blockId) return;
      state.moveBlockId = blockId;
      renderApp();
    }

    function moveBlockBefore(fromId, toId) {
      if (!state.current || fromId === toId) return;
      const fromIndex = state.current.blocks.findIndex((b) => b.id === fromId);
      const toIndex = state.current.blocks.findIndex((b) => b.id === toId);
      if (fromIndex < 0 || toIndex < 0) return;
      const [item] = state.current.blocks.splice(fromIndex, 1);
      const adjustedToIndex = fromIndex < toIndex ? toIndex - 1 : toIndex;
      state.current.blocks.splice(adjustedToIndex, 0, item);
      state.currentSaved = false;
      state.moveBlockId = null;
      renderApp();
    }

    function focusBlockEditor(blockId) {
      requestAnimationFrame(() => {
        const el = appRoot.querySelector(`[data-editor-block="${CSS.escape(blockId)}"]`);
        if (!el) return;
        el.focus?.();
        placeCaretAtEnd(el);
      });
    }

    function addNewBlock(type = 'text') {
      if (!state.current) return;
      const block = type === 'file'
        ? normalizeBlockData({
            id: uid8(),
            type: 'file',
            fileName: 'file',
            filePreview: true,
            fileKind: 'text',
            fileText: '',
            fileDataUrl: '',
            fileMime: '',
            visible: true,
            wrap: true,
            heightEnabled: false,
            rows: 3
          })
        : normalizeBlockData({
            id: uid8(),
            type: 'text',
            source: '',
            visible: true,
            wrap: true,
            heightEnabled: false,
            rows: 3
          });

      state.current.blocks.push(block);
      state.currentSaved = false;
      renderApp();
      state.editingBlockId = block.id;
      focusBlockEditor(block.id);
    }

    function updateEditableTextBlockFromDom(blockId, element) {
      if (!state.current || !blockId || !element) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId);
      if (idx < 0) return;
      const raw = element.innerText.replace(/\r/g, '');
      const html = parseInlineFormatted(raw);
      state.current.blocks[idx].source = raw;
      state.current.blocks[idx].html = html || '<br>';
      state.currentSaved = false;
      const selectionKeep = document.activeElement === element;
      const nextHtml = html || '<br>';
      if (element.innerHTML !== nextHtml) {
        element.innerHTML = nextHtml;
        if (selectionKeep) placeCaretAtEnd(element);
      }
    }

    function updateFileBlockField(blockId, field, value) {
      if (!state.current || !blockId) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId);
      if (idx < 0) return;
      const block = state.current.blocks[idx];
      if (field === 'fileName') block.fileName = String(value || '').trim() || 'file';
      if (field === 'fileText') {
        block.fileText = String(value ?? '').replace(/\r\n?/g, '\n');
        block.fileKind = detectPastedContentKind(block.fileText);
        block.fileDataUrl = '';
        block.fileMime = block.fileKind === 'html' ? 'text/html' : block.fileKind === 'url' ? 'text/plain' : 'text/plain';
      }
      block.html = fileBlockToHtml(block);
      block.source = block.fileText;
      state.currentSaved = false;
    }

    function cloneBlockFromCurrent(blockId) {
      return state.current?.blocks.find((b) => b.id === blockId) || null;
    }

    function setBlockRenderedHtml(blockId) {
      if (!state.current) return;
      const block = state.current.blocks.find((b) => b.id === blockId);
      if (!block) return;
      block.html = block.type === 'file' ? fileBlockToHtml(block) : parseInlineFormatted(block.source || '');
    }

    async function readFileAsDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('read error'));
        reader.readAsDataURL(file);
      });
    }

    async function readFileAsText(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('read error'));
        reader.readAsText(file);
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'download';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function dataUrlToBlob(dataUrl) {
      const res = await fetch(dataUrl);
      return await res.blob();
    }

    async function downloadFileBlock(block) {
      if (!block) return;
      const fileName = String(block.fileName || 'file').trim() || 'file';
      let blob;

      if (block.fileDataUrl) {
        try {
          blob = await dataUrlToBlob(block.fileDataUrl);
        } catch {
          blob = new Blob([block.fileText || ''], { type: block.fileMime || 'application/octet-stream' });
        }
      } else if (block.fileKind === 'html') {
        blob = new Blob([block.fileText || ''], { type: 'text/html;charset=utf-8' });
      } else if (block.fileKind === 'url') {
        blob = new Blob([block.fileText || ''], { type: 'text/plain;charset=utf-8' });
      } else {
        blob = new Blob([block.fileText || ''], { type: 'text/plain;charset=utf-8' });
      }

      downloadBlob(blob, fileName);
    }

    function openFilePreviewModal(block) {
      if (!block) return;
      state.filePreviewTarget = block.id;
      filePreviewTitle.textContent = block.fileName || 'ファイル';
      filePreviewDownloadBtn.onclick = () => downloadFileBlock(block);

      const html = fileBlockToHtml(block);
      if (block.fileKind === 'binary' && isImageMime(block.fileMime) && block.fileDataUrl) {
        filePreviewBody.innerHTML = `<img src="${esc(block.fileDataUrl)}" alt="${esc(block.fileName || 'image')}" style="max-width:100%;border-radius:14px;display:block" />`;
      } else if (block.fileKind === 'binary' && block.fileMime === 'application/pdf' && block.fileDataUrl) {
        filePreviewBody.innerHTML = `<iframe src="${esc(block.fileDataUrl)}" title="${esc(block.fileName || 'PDF')}" style="width:100%;height:520px;border:0;border-radius:14px"></iframe>`;
      } else {
        filePreviewBody.innerHTML = html || '<div class="file-drop">プレビューできる内容がありません。</div>';
      }

      if (!filePreviewDialog.open) filePreviewDialog.showModal();
    }

    function getFileBlockByName(name) {
      const target = String(name || '').trim();
      if (!state.current || !target) return null;
      return state.current.blocks.find((b) => b.type === 'file' && String(b.fileName || '').trim() === target) || null;
    }

    function handleFileLinkClick(name) {
      const block = getFileBlockByName(name);
      if (!block) {
        alert(`ファイル「${name}」が見つからないよ`);
        return;
      }
      if (block.filePreview) openFilePreviewModal(block);
      else downloadFileBlock(block);
    }

    async function handleFileUpload(blockId, file) {
      if (!state.current || !file) return;
      const idx = state.current.blocks.findIndex((b) => b.id === blockId);
      if (idx < 0) return;
      const block = state.current.blocks[idx];
      if (block.type !== 'file') return;

      block.fileName = file.name || block.fileName || 'file';
      block.fileMime = file.type || '';
      if (isTextLikeMime(file.type) || /\.(txt|md|html?|json|csv|xml|js|css|ts|tsx|jsx|py|yml|yaml|log)$/i.test(file.name || '')) {
        const text = await readFileAsText(file);
        block.fileText = text;
        block.fileKind = detectPastedContentKind(text);
        block.fileDataUrl = '';
        if (block.fileKind === 'html') block.fileMime = 'text/html';
        else if (block.fileKind === 'url') block.fileMime = 'text/plain';
        else block.fileMime = file.type || 'text/plain';
      } else {
        block.fileDataUrl = await readFileAsDataUrl(file);
        block.fileText = '';
        block.fileKind = 'binary';
      }
      block.html = fileBlockToHtml(block);
      state.currentSaved = false;
      renderApp();
      state.editingBlockId = block.id;
      focusBlockEditor(block.id);
    }

    async function pasteClipboardToFileBlock(blockId) {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) {
          alert('クリップボードに文字がないよ');
          return;
        }
        const idx = state.current?.blocks.findIndex((b) => b.id === blockId) ?? -1;
        if (idx < 0) return;
        const block = state.current.blocks[idx];
        if (block.type !== 'file') return;
        block.fileText = String(text).replace(/\r\n?/g, '\n');
        block.fileKind = detectPastedContentKind(block.fileText);
        block.fileDataUrl = '';
        block.fileMime = block.fileKind === 'html' ? 'text/html' : 'text/plain';
        block.html = fileBlockToHtml(block);
        state.currentSaved = false;
        renderApp();
      } catch {
        alert('クリップボードを読めなかったよ');
      }
    }

    async function handleClick(event, target) {
      const fileLink = target.closest('[data-file-link]');
      if (fileLink) {
        event.preventDefault();
        handleFileLinkClick(fileLink.getAttribute('data-file-link') || '');
        return;
      }

      const fileOpen = target.closest('[data-file-open]');
      if (fileOpen) {
        const block = cloneBlockFromCurrent(fileOpen.getAttribute('data-file-open') || '');
        if (block) {
          if (block.filePreview) openFilePreviewModal(block);
          else downloadFileBlock(block);
        }
        return;
      }

      const fileDownload = target.closest('[data-file-download]');
      if (fileDownload) {
        const block = cloneBlockFromCurrent(fileDownload.getAttribute('data-file-download') || '');
        if (block) await downloadFileBlock(block);
        return;
      }

      const openSiteBtn = target.closest('[data-open-site]');
      if (openSiteBtn) {
        const siteId = openSiteBtn.getAttribute('data-open-site');
        if (siteId) openSiteById(siteId, null, true);
        return;
      }

      const blockActionBtn = target.closest('[data-block-action]');
      if (blockActionBtn && state.mode === 'editor') {
        const action = blockActionBtn.getAttribute('data-block-action');
        const blockId = blockActionBtn.getAttribute('data-block-id');
        if (!state.current || !blockId) return;
        if (action === 'settings') openBlockSettingsModal(blockId);
        return;
      }

      const addTypeBtn = target.closest('[data-add-type]');
      if (addTypeBtn) {
        const type = addTypeBtn.getAttribute('data-add-type') || 'text';
        state.pendingAddType = type;
        if (addTypeDialog.open) addTypeDialog.close();
        addNewBlock(type);
        return;
      }

      const fileActionBtn = target.closest('[data-file-action]');
      if (fileActionBtn) {
        const action = fileActionBtn.getAttribute('data-file-action');
        const blockId = fileActionBtn.getAttribute('data-block-id');
        if (!blockId) return;
        if (action === 'paste-clipboard') {
          await pasteClipboardToFileBlock(blockId);
          return;
        }
        if (action === 'preview') {
          const block = cloneBlockFromCurrent(blockId);
          if (block) openFilePreviewModal(block);
          return;
        }
        if (action === 'clear-file') {
          const idx = state.current?.blocks.findIndex((b) => b.id === blockId) ?? -1;
          if (idx < 0 || !state.current) return;
          const block = state.current.blocks[idx];
          block.fileText = '';
          block.fileDataUrl = '';
          block.fileMime = '';
          block.fileKind = 'text';
          block.html = '';
          state.currentSaved = false;
          renderApp();
          state.editingBlockId = block.id;
          focusBlockEditor(block.id);
          return;
        }
      }

      const editorBlock = target.closest('[data-editor-block]');
      const editorCard = target.closest('[data-editor-block-card]');

      if (state.mode === 'editor' && editorCard) {
        const blockId = editorCard.getAttribute('data-editor-block-card');
        if (state.moveBlockId) {
          if (state.moveBlockId === blockId) {
            state.moveBlockId = null;
            renderApp();
            return;
          }
          moveBlockBefore(state.moveBlockId, blockId);
          return;
        }
        if (editorBlock) {
          editorBlock.focus?.();
          return;
        }
      }

      if (target.closest('#newSiteBtn')) {
        openNewDraft();
        return;
      }

      if (target.closest('#showIdBtn')) {
        ownerIdBtn.textContent = 'ID: ••••';
        if (!idDialog.open) idDialog.showModal();
        return;
      }

      if (target.closest('#homeSettingsBtn')) {
        openHomeSettingsModal();
        return;
      }

      if (target.closest('#viewerHomeBtn') || target.closest('#backBtn') || target.closest('#bootHomeBtn')) {
        if (state.mode === 'editor' && !state.currentSaved) {
          if (!confirm('保存していない内容があるけど戻る？')) return;
        }
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        location.hash = '';
        state.mode = 'home';
        renderApp();
        reloadHomeSites();
        return;
      }

      if (target.closest('#bootRetryBtn')) {
        location.reload();
        return;
      }

      if (target.closest('#viewerEditBtn')) {
        if (!state.current) return;
        if (canEditCurrent()) {
          state.mode = 'editor';
          renderApp();
          syncCurrentUrl();
        } else {
          const entered = prompt('Key を入力して編集', '');
          if (entered === null) return;
          if ((entered || '').trim() === (state.current.key || '')) {
            state.currentAccess = 'key';
            state.mode = 'editor';
            renderApp();
            syncCurrentUrl();
          } else {
            alert('Key が違うよ');
          }
        }
        return;
      }

      if (target.closest('#siteSettingsBtn')) {
        if (!canEditCurrent() || !isCurrentCreator()) {
          alert('作成者だけが設定できます。');
          return;
        }
        openSiteSettingsModal();
        return;
      }

      if (target.closest('#viewerShareBtn') || target.closest('#shareBtn')) {
        showShareModal();
        return;
      }

      if (target.closest('#saveBtn')) {
        saveCurrentSite();
        return;
      }

      if (target.closest('#addBlockBtn')) {
        if (!addTypeDialog.open) addTypeDialog.showModal();
        return;
      }

      if (target.closest('#siteSettingsCancelBtn')) {
        if (siteSettingsDialog.open) siteSettingsDialog.close();
        return;
      }

      if (target.closest('#siteSettingsSaveBtn')) {
        saveSiteSettings();
        return;
      }

      if (target.closest('#siteClearKeyBtn')) {
        clearSiteKey();
        return;
      }

      if (target.closest('#siteDeleteBtn')) {
        deleteCurrentSite();
        return;
      }

      if (target.closest('#blockSettingsCancelBtn')) {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
        return;
      }

      if (target.closest('#blockSettingsSaveBtn')) {
        saveBlockSettings();
        return;
      }

      if (target.closest('#homeSettingsCloseBtn')) {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
        return;
      }

      if (target.closest('#addTypeCloseBtn')) {
        if (addTypeDialog.open) addTypeDialog.close();
        return;
      }

      if (target.closest('#copyIdBtn')) {
        navigator.clipboard.writeText(creatorId()).then(() => alert('IDをコピーしました')).catch(() => prompt('コピーできない場合はこれを使ってね', creatorId()));
        return;
      }

      if (target.closest('#closeIdBtn')) {
        if (idDialog.open) idDialog.close();
        return;
      }

      if (target.closest('#mergeIdBtn')) {
        openMergeModal();
        return;
      }

      if (target.closest('#mergeCancelBtn')) {
        if (mergeDialog.open) mergeDialog.close();
        return;
      }

      if (target.closest('#mergeExecuteBtn')) {
        executeIdMerge();
        return;
      }

      if (target.closest('#closeShareBtn')) {
        if (shareDialog.open) shareDialog.close();
        return;
      }

      if (target.closest('#copyShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        navigator.clipboard.writeText(url).then(() => alert('コピーしました')).catch(() => prompt('コピーできないときはこれを使ってね', url));
        return;
      }

      if (target.closest('#webShareBtn')) {
        const url = currentShareUrl();
        if (!url) {
          alert('先に保存してね。');
          return;
        }
        if (navigator.share) {
          navigator.share({ title: state.current?.title || 'CreateWebsite', url }).catch(() => {});
        } else {
          alert('このブラウザはWeb Share APIに対応していません。');
        }
        return;
      }

      if (target.closest('#filePreviewCloseBtn')) {
        if (filePreviewDialog.open) filePreviewDialog.close();
        state.filePreviewTarget = null;
        return;
      }

      const tabBtn = target.closest('[data-home-tab]');
      if (tabBtn) {
        state.homeTab = tabBtn.getAttribute('data-home-tab') || 'mine';
        renderApp();
        return;
      }

      const shareTab = target.closest('[data-share-tab]');
      if (shareTab) {
        if (shareTab.disabled) return;
        state.shareMode = shareTab.getAttribute('data-share-tab') || 'view';
        shareTabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === shareTab));
        syncShareDialog();
        return;
      }

      if (target.closest('#homeRefreshBtn')) {
        reloadHomeSites();
      }
    }

    function handleInput(event) {
      const target = event.target;
      if (!target) return;

      if (target.id === 'homeSearchInput') {
        state.homeSearch = target.value;
        renderApp();
        return;
      }

      if (target.id === 'addBarOpacityRange') {
        persistAddBarOpacity(Number(target.value) / 100);
        return;
      }

      if (target.id === 'titleInput' && state.current) {
        state.current.title = target.value;
        const heading = document.getElementById('editorHeading');
        if (heading) heading.textContent = target.value || '無題のサイト';
        state.currentSaved = false;
        return;
      }

      if (target.id === 'sitePublicToggle' && state.current) {
        state.current.isPublic = !!target.checked;
        state.currentSaved = false;
        return;
      }

      if (target.id === 'siteKeyInput' && state.current) {
        state.current.key = target.value;
        state.current.collaborative = Boolean(String(target.value || '').trim());
        state.currentSaved = false;
        return;
      }

      if (target.id === 'blockHeightToggle') {
        blockRowsField.classList.toggle('hidden', !blockHeightToggle.checked);
        return;
      }

      if (target.id === 'blockRowsInput') return;

      if (target.id === 'filePreviewToggle') return;

      const textEditor = target.closest('[data-editor-block]');
      if (state.mode === 'editor' && textEditor) {
        const blockId = textEditor.getAttribute('data-editor-block');
        updateEditableTextBlockFromDom(blockId, textEditor);
        return;
      }

      const blockField = target.closest('[data-block-field]');
      if (blockField && state.mode === 'editor') {
        const blockId = blockField.getAttribute('data-block-id');
        const field = blockField.getAttribute('data-block-field');
        if (blockId && field) updateFileBlockField(blockId, field, target.value);
      }
    }

    function handleChange(event) {
      const target = event.target;
      if (!target) return;

      if (target.matches('[data-file-upload]')) {
        const blockId = target.getAttribute('data-file-upload');
        const file = target.files && target.files[0];
        if (blockId && file) handleFileUpload(blockId, file);
        target.value = '';
      }
    }

    function handlePointerDown(event) {
      if (state.mode !== 'editor') return;
      const card = event.target.closest('[data-editor-block-card]');
      if (!card) return;
      if (event.target.closest('[data-block-action]') || event.target.closest('[data-file-action]') || event.target.closest('[data-block-field]')) return;
      const blockId = card.getAttribute('data-editor-block-card');
      if (!blockId) return;
      clearLongPressTimer();
      longPressCandidateId = blockId;
      longPressTimer = setTimeout(() => {
        handleLongPressCandidate(blockId);
      }, 500);
    }

    function handlePointerUp() {
      clearLongPressTimer();
    }

    function handleKeyDown(event) {
      if (event.key === 'Escape' && state.moveBlockId) {
        state.moveBlockId = null;
        renderApp();
      }
    }

    blockSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (blockSettingsDialog.open) blockSettingsDialog.close();
        state.pendingBlockSettingsId = null;
      }
    });

    homeSettingsDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (homeSettingsDialog.open) homeSettingsDialog.close();
      }
    });

    addTypeDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && addTypeDialog.open) addTypeDialog.close();
    });

    filePreviewDialog.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && filePreviewDialog.open) filePreviewDialog.close();
    });

    window.addEventListener('hashchange', async () => {
      const route = parseRoute();
      if (!state.ready) return;

      if (route.name === 'home') {
        state.current = null;
        state.currentSaved = false;
        state.currentAccess = 'view';
        state.moveBlockId = null;
        state.mode = 'home';
        renderApp();
        return;
      }

      if (route.name === 'create') {
        openNewDraft();
        return;
      }

      if (route.name === 'site') {
        await openSiteById(route.siteId, route.key || null, false);
      }
    });

    async function initFirebase() {
      if (!firebaseConfig.apiKey || !firebaseConfig.authDomain || !firebaseConfig.projectId || !firebaseConfig.appId) {
        state.ready = false;
        state.authError = 'Firebase設定がありません。firebaseConfig を入れてください。';
        state.mode = 'boot-failed';
        renderApp();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        state.db = getFirestore(app);
        const auth = getAuth(app);

        const cred = await signInAnonymously(auth);
        state.uid = cred.user?.uid || auth.currentUser?.uid || '';
        state.ready = true;
        state.authError = '';

        await loadAllSites();

        const route = parseRoute();
        if (route.name === 'site') {
          await openSiteById(route.siteId, route.key || null, false);
        } else if (route.name === 'create') {
          openNewDraft();
        } else {
          state.mode = 'home';
          renderApp();
        }
      } catch (error) {
        console.error(error);
        const code = error?.code || '';
        if (code === 'auth/configuration-not-found') {
          state.authError = 'Firebase Authentication の匿名ログインが未設定か、Auth 側の設定が足りません。';
        } else if (code === 'auth/operation-not-allowed') {
          state.authError = 'Firebase Authentication の匿名ログインが無効です。Auth で Anonymous を有効にしてください。';
        } else if (code === 'auth/network-request-failed') {
          state.authError = 'ネットワークに接続できません。通信許可とブラウザ設定を確認してください。';
        } else {
          state.authError = `Firebase接続に失敗しました。${code ? `(${code})` : ''}`;
        }
        state.ready = false;
        state.mode = 'boot-failed';
        renderApp();
      }
    }

    document.addEventListener('click', (event) => handleClick(event, event.target));
    document.addEventListener('input', handleInput);
    document.addEventListener('change', handleChange);
    document.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointerup', handlePointerUp);
    document.addEventListener('pointercancel', handlePointerUp);
    document.addEventListener('keydown', handleKeyDown);

    function bootstrap() {
      updateAddBarOpacityLabel();
      state.mode = 'loading';
      renderApp();
      initFirebase();
    }

    bootstrap();
  </script>
</body>
</html>
